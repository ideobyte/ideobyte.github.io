<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/data/favicon/padres/favicon-96x96.png" sizes="96x96">
<link rel="icon" type="image/svg+xml" href="/data/favicon/padres/favicon.svg">
<link rel="shortcut icon" href="/data/favicon/padres/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/data/favicon/padres/apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="ideo.zip">
<link rel="manifest" href="/data/favicon/padres/site.webmanifest">
<title>Padres Dashboard</title>

<!-- Preconnect to the API host so the first fetch isn't paying for DNS+TLS handshake -->
<link rel="preconnect" href="https://statsapi.mlb.com" crossorigin>
<!-- Preconnect for Google Fonts (font CSS + actual font files are on different hosts) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@800&family=IBM+Plex+Mono:wght@400;700&display=swap">

<style>
  @font-face {
    font-family: 'RTDyansBasic';
    src: url('/fonts/RTDyansBasic.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --brown: #2D1A0E;
    --brown-mid: #4A2C17;
    --gold: #C8922A;
    --gold-bright: #E8B84B;
    --gold-pale: #F5D98A;
    --cream: #F5EDD8;
    --cream-muted: rgba(245,237,216,0.5);
    --yes: #7EB648;
    --no: #C0392B;
    --live: #E8B84B;
    --gold-line-strong: rgba(200,146,42,0.3);
    --gold-line-mid:    rgba(200,146,42,0.25);
    --gold-line-soft:   rgba(200,146,42,0.2);
    --gold-line-faint:  rgba(200,146,42,0.15);
    --gold-line-ghost:  rgba(200,146,42,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 150%; }

  body {
    background: var(--brown);
    color: var(--cream);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.67rem 1.33rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Background decorations are non-interactive overlays */
  body::before, body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
  }
  body::before {
    background: repeating-linear-gradient(-50deg, transparent, transparent 55px, rgba(200,146,42,0.06) 55px, rgba(200,146,42,0.06) 57px);
  }
  body::after {
    background: radial-gradient(ellipse at 50% 0%, rgba(200,146,42,0.1) 0%, transparent 60%);
  }

  /* ── Shared corner decorations ───────────────────────────────────
     The original had three different class names (.panel-corner, .gpc,
     .card-corner) doing the exact same thing. Unified. */
  .corner {
    position: absolute;
    width: 0.53rem;
    height: 0.53rem;
    border-color: var(--gold-bright);
    border-style: solid;
  }
  .corner.tl { top: .31rem;    left: .31rem;   border-width: 1.5px 0 0 1.5px; }
  .corner.tr { top: .31rem;    right: .31rem;  border-width: 1.5px 1.5px 0 0; }
  .corner.bl { bottom: .31rem; left: .31rem;   border-width: 0 0 1.5px 1.5px; }
  .corner.br { bottom: .31rem; right: .31rem;  border-width: 0 1.5px 1.5px 0; }

  /* ── Header ────────────────────────────────────────────────── */
  .header {
    text-align: center;
    margin-bottom: 1.6rem;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.4s ease both;
  }
  .header-eyebrow { font-family: 'RTDyansBasic', sans-serif; font-size: 0.8rem; letter-spacing: 0.2rem; color: var(--gold-bright); margin-bottom: 0.18rem; }
  .header-title   { font-family: 'Bebas Neue', sans-serif; font-size: 2.27rem; letter-spacing: 0.33rem; line-height: 1; color: var(--cream); }
  .header-date    { font-size: 0.49rem; letter-spacing: 0.2rem; color: var(--cream-muted); margin-top: 0.44rem; }
  .header-divider { width: 2.67rem; height: 2px; background: var(--gold); margin: 0.62rem auto 0; }

  /* ── Top bar ────────────────────────────────────────────────── */
  .top-bar {
    width: 100%;
    max-width: 73.33rem;
    display: flex;
    align-items: center;
    padding-bottom: 0.6rem;
    position: relative;
    z-index: 10;
  }
  .home-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    background: none;
    border: 1px solid rgba(200,146,42,0.4);
    color: var(--gold-bright);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.4rem;
    letter-spacing: 0.15rem;
    padding: 0.35rem 0.65rem;
    border-radius: 3px;
    text-decoration: none;
    text-transform: uppercase;
    transition: background-color 0.2s, border-color 0.2s;
  }
  .home-btn:hover {
    background: rgba(200,146,42,0.1);
    border-color: var(--gold-bright);
  }

  /* ── Bottom row (game panel + standings) ───────────────────── */
  .bottom-row {
    display: flex;
    align-items: stretch;
    gap: 1rem;
    width: 100%;
    max-width: 73.33rem;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease 0.2s both;
    justify-content: center;
  }
  .bottom-left, .bottom-right {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
  }
  .bottom-left { flex-shrink: 0; }
  .bottom-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 0.6rem;
    letter-spacing: 0.4rem;
    color: var(--gold-bright);
    white-space: nowrap;
    margin-bottom: 0.6rem;
    text-align: center;
    text-transform: uppercase;
  }

  /* ── Promo grid ────────────────────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0.71rem;
    width: 100%;
    max-width: 73.33rem;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease 0.1s both;
  }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(1.07rem); } to { opacity: 1; transform: translateY(0); } }

  .matchup-line {
    font-size: 0.44rem;
    letter-spacing: 0.09rem;
    color: var(--cream-muted);
    margin-top: 0.4rem;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .matchup-line .matchup-live { color: var(--gold-bright); }

  .promo-heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.25rem;
    color: var(--gold-bright);
    text-align: center;
    width: 100%;
    max-width: 73.33rem;
    position: relative;
    z-index: 1;
    margin: 1.4rem 0 0.8rem;
    animation: fadeUp 0.5s ease 0.15s both;
  }

  /* ── NL West panel + standings ─────────────────────────────── */
  .nlwest-panel {
    width: 100%;
    background: var(--brown-mid);
    border: 2px solid var(--gold);
    border-radius: 6px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease 0.25s both;
    margin-bottom: 1.6rem;
    flex: 1;
    overflow: hidden;
  }

  /* When showing stats, panel has a fixed height set by JS */
  .nlwest-panel.stats-open {
    flex: none;
    overflow: hidden;
  }

  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table thead tr { border-bottom: 1px solid var(--gold-line-strong); }
  .standings-table th {
    font-size: 0.5rem;
    letter-spacing: 0.15rem;
    color: var(--cream-muted);
    text-transform: uppercase;
    padding: 0.35rem 0.8rem;
    text-align: left;
    font-weight: 400;
    border-right: 1px solid var(--gold-line-mid);
  }
  .standings-table th:last-child { border-right: none; }
  .standings-table th.num { text-align: center; }
  .standings-table tbody tr {
    border-bottom: 1px solid var(--gold-line-ghost);
    transition: background-color 0.15s;
    cursor: pointer;
  }
  .standings-table tbody tr:last-child { border-bottom: none; }
  .standings-table tbody tr:hover { background: rgba(200,146,42,0.05); }
  .standings-table tbody tr.padres-row { background: rgba(200,146,42,0.07); }
  .standings-table td {
    padding: 0.3rem 0.8rem;
    vertical-align: middle;
    border-right: 1px solid var(--gold-line-faint);
  }
  .standings-table td:last-child { border-right: none; }
  .standings-table td.num { text-align: center; }

  .rank-num       { font-family: 'Bebas Neue', sans-serif; font-size: 0.6rem; color: var(--cream-muted); width: 1.2rem; text-align: center; }
  .team-name-cell { display: flex; align-items: center; gap: 0.5rem; }
  .team-abbr      { font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; letter-spacing: 0.05rem; color: var(--cream); min-width: 2.2rem; }
  .team-abbr.padres { color: var(--gold-bright); }
  .team-full { font-size: 0.62rem; color: var(--cream); letter-spacing: 0.03rem; white-space: nowrap; }
  .record, .gb, .pct { font-size: 0.65rem; color: var(--cream); }

  .next-game-cell { text-align: right; width: 28%; padding: 0.3rem 1.4rem 0.3rem 0; }
  .next-game-th   { font-size: 0.5rem; letter-spacing: 0.2rem; color: var(--cream-muted); font-weight: 400; text-transform: uppercase; }
  .game-live { display: inline-flex; align-items: center; gap: 0.3rem; }
  .live-dot {
    display: inline-block;
    width: 0.31rem;
    height: 0.31rem;
    background: var(--live);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1;   transform: scale(1); }
    50%      { opacity: .35; transform: scale(.65); }
  }

  /* Score line: ABB R – R ABB */
  .game-scoreline { font-family: 'Bebas Neue', sans-serif; font-size: 0.72rem; color: var(--gold-bright); letter-spacing: 0.06rem; }
  .game-scoreline.final-w { color: var(--yes); }
  .game-scoreline.final-l { color: var(--no); }
  /* Replaces inline style="color:..." per cell */
  .score-team-won  { color: var(--cream); }
  .score-team-lost { color: var(--no); }
  .score-dash      { color: var(--cream-muted); }

  .game-sub  { font-size: 0.5rem;  color: rgba(245,237,216,0.75); letter-spacing: 0.04rem; margin-top: 0.1rem; }
  .game-time { font-size: 0.56rem; color: var(--cream); letter-spacing: 0.04rem; }
  .no-game   { font-size: 0.38rem; color: rgba(245,237,216,0.25); letter-spacing: 0.04rem; }

  /* ── Promo cards ───────────────────────────────────────────── */
  .card {
    background: var(--brown-mid);
    border: 2px solid var(--gold);
    border-radius: 6px;
    padding: 0.82rem 1.07rem 0.72rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    gap: 0.35rem;
  }
  .card-brand-block   { display: flex; flex-direction: column; align-items: center; gap: 0.12rem; }
  .card-icon          { font-size: 1.3rem; line-height: 1; }
  .card-brand         { font-family: 'Bebas Neue', sans-serif; font-size: 0.7rem; letter-spacing: 0.18rem; color: var(--gold-bright); }
  .card-trigger-label { font-size: 0.4rem; letter-spacing: 0.2rem; color: var(--cream-muted); text-transform: uppercase; }
  .card-trigger       { font-family: 'Bebas Neue', sans-serif; font-size: 0.89rem; letter-spacing: 0.09rem; color: var(--cream); line-height: 1.2; }
  .card-divider       { width: 100%; height: 1px; background: var(--gold-line-soft); }

  .result-area {
    width: 100%;
    padding: 0.53rem 0.62rem;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.15rem;
  }
  .result-area.yes     { background: rgba(126,182,72,0.12); border: 1px solid var(--yes); }
  .result-area.no      { background: rgba(192,57,43,0.12);  border: 1px solid var(--no); }
  .result-area.live    { background: rgba(232,184,75,0.08); border: 1px solid var(--live); }
  .result-area.nogame  { background: rgba(200,146,42,0.08); border: 1px solid var(--gold); }
  .result-area.loading { background: transparent;            border: 1px solid var(--gold-line-soft); }

  .result-stat        { font-family: 'Bebas Neue', sans-serif; font-size: 1.65rem; line-height: 1; color: var(--gold-bright); }
  .result-stat-label  { font-size: 0.4rem; letter-spacing: 0.2rem; color: var(--cream-muted); text-transform: uppercase; }
  .result-game-label  { font-family: 'Bebas Neue', sans-serif; font-size: 1.65rem; line-height: 1; color: var(--gold-bright); word-break: break-word; }
  .result-verdict     { font-family: 'Bebas Neue', sans-serif; font-size: 0.88rem; letter-spacing: 0.09rem; line-height: 1; }
  .result-verdict.yes    { color: var(--yes); }
  .result-verdict.no     { color: var(--no); }
  .result-verdict.live   { color: var(--live); font-size: 0.65rem; }
  .result-verdict.nogame { color: var(--gold-pale); font-size: 0.53rem; }
  .result-verdict .live-dot {
    margin-right: .22rem;
    vertical-align: middle;
    position: relative;
    top: -.04rem;
  }

  .result-sub      { font-size: 0.44rem; letter-spacing: 0.07rem; color: var(--cream-muted); }
  .result-sub span { color: var(--cream); font-weight: 700; }
  .card-reward     { font-size: 0.44rem; letter-spacing: 0.04rem; color: var(--cream-muted); line-height: 1.3; }
  .card-reward a   { color: var(--gold-bright); text-decoration: none; }
  .card-reward a:hover { text-decoration: underline; }

  .loading-blink {
    font-size: 0.53rem;
    letter-spacing: 0.2rem;
    color: var(--gold-bright);
    animation: blink 0.9s step-end infinite;
    padding: 0.35rem 0;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Game Panel ────────────────────────────────────────────── */
  .game-panel {
    background: var(--brown-mid);
    border: 2px solid var(--gold);
    border-radius: 6px;
    padding: 0.5rem 1rem 0.9rem;
    position: relative;
    width: 100%;
    flex: 1;
    margin-bottom: 1.6rem;
    display: flex;
    flex-direction: column;
  }

  .gp-body { display: flex; gap: 0; align-items: stretch; flex: 1; }

  .gp-left, .gp-mid, .gp-right { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .gp-left  { border-right: 1px solid var(--gold-line-soft); padding-right: 0.7rem; }
  .gp-mid   { align-items: center; padding: 0 0.6rem; }
  .gp-right { border-left:  1px solid var(--gold-line-soft); padding-left:  0.7rem; text-align: right; }

  .gp-team-header { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.08rem; line-height: 1; margin-bottom: 0.35rem; }
  .gp-team-header.padres { color: var(--gold-bright); }
  .gp-team-header.opp    { color: var(--cream); }
  .gp-team-score   { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; line-height: 1; color: var(--cream); }
  .gp-team-topline { display: flex; align-items: baseline; gap: 0.45rem; margin-bottom: 0.35rem; }
  .gp-right .gp-team-topline { justify-content: flex-end; }

  .gp-lineup { list-style: none; flex: 0; }
  .gp-lineup li {
    font-size: 0.6rem;
    line-height: 1.7;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .gp-lineup li.current-batter { color: var(--gold-bright); font-weight: 700; }
  .gp-lineup li .order-num { color: rgba(200,146,42,0.5); font-size: 0.45rem; margin-right: 0.2rem; }
  .gp-right .gp-lineup li .order-num { margin-right: 0; margin-left: 0.2rem; }
  .gp-lineup li .pos-tag { font-size: 0.4rem; color: rgba(200,146,42,0.55); margin-left: 0.2rem; }
  .gp-lineup li .sub-mark { font-size: 0.38rem; color: var(--yes); margin-left: 0.15rem; vertical-align: super; }
  .pos-tag { font-family: 'IBM Plex Mono', monospace; font-size: 0.4rem; color: rgba(200,146,42,0.55); }

  .gp-inning-block { text-align: center; margin-bottom: 0.3rem; }
  .gp-half-arrow   { font-size: 0.55rem; color: var(--gold-bright); line-height: 1; }
  .gp-inning-num   { font-family: 'Bebas Neue', sans-serif; font-size: 1.0rem; color: var(--cream); line-height: 1; letter-spacing: 0.05rem; }
  .gp-inning-word  { font-size: 0.33rem; letter-spacing: 0.18rem; color: var(--cream-muted); text-transform: uppercase; }

  .gp-live-badge,
  .gp-warmup-badge {
    display: flex;
    align-items: center;
    gap: 0.2rem;
    font-size: 0.38rem;
    letter-spacing: 0.12rem;
    margin-bottom: 0.1rem;
    justify-content: center;
  }
  .gp-live-badge   { color: var(--gold-bright); }
  .gp-warmup-badge { color: var(--cream-muted); }

  .gp-divider { height: 1px; background: var(--gold-line-soft); margin: 0.2rem 0; width: 100%; }

  .gp-diamond { flex-shrink: 0; margin: 0; }
  .gp-diamond svg { display: block; }

  .gp-outs-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
    margin-top: -0.9rem;
    margin-bottom: 0.35rem;
  }
  .gp-outs-label { font-size: 0.33rem; letter-spacing: 0.18rem; color: var(--cream-muted); text-transform: uppercase; padding-left: 0.3rem; }
  .outs-pips { display: flex; gap: 0.25rem; }
  .out-pip {
    width: 0.55rem;
    height: 0.55rem;
    border-radius: 50%;
    border: 1.5px solid rgba(200,146,42,0.75);
    background: transparent;
    transition: background-color 0.2s;
  }
  .out-pip.on { background: var(--no); border-color: var(--no); box-shadow: 0 0 0 1.5px #000; }

  .gp-center-score {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 0.15rem;
  }
  .gp-center-team {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.05rem;
    line-height: 1;
  }
  .gp-center-team.padres { color: var(--gold-bright); }
  .gp-center-team.opp    { color: var(--cream); }
  .gp-center-runs {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--cream);
    line-height: 1;
  }
  .gp-center-dash { color: var(--cream-muted); font-size: 1rem; position: relative; top: -0.25rem; }

  .gp-lineup-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.12rem;
    margin-bottom: 0.05rem;
  }
  .gp-lineup-name.padres { color: var(--gold-bright); }
  .gp-lineup-name.opp    { color: var(--cream); }
  .gp-right .gp-lineup-name { text-align: right; }

  .gp-inning-block-mid { display: flex; flex-direction: column; align-items: center; margin-top: 0.1rem; }
  .gp-half-arrow-sm    { font-size: 0.55rem; color: var(--gold-bright); line-height: 1; }
  .gp-inning-big       { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--cream); line-height: 1; letter-spacing: 0.05rem; }
  .gp-count-big        { font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; color: var(--gold-bright); line-height: 1.2; letter-spacing: 0.05rem; }
  .gp-last-pitch       { font-size: 0.5rem; color: var(--gold-pale); text-align: center; letter-spacing: 0.03rem; margin-top: 0.15rem; max-width: 9rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
  .gp-thread-link      { margin-top: 0.25rem; }
  .gp-thread-link a    { font-size: 0.45rem; color: var(--gold-bright); text-decoration: none; letter-spacing: 0.03rem; }
  .gp-thread-link a:hover { color: var(--cream); }

  .gp-pitcher-footer { padding-top: 0; border-top: 1px solid var(--gold-line-soft); }
  .gp-pitcher-name {
    font-size: 0.6rem;
    color: var(--cream);
    line-height: 1.7;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .gp-pitcher-name .pos-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.4rem;
    color: rgba(200,146,42,0.55);
    margin-left: 0.2rem;
  }
  .gp-right .gp-pitcher-name .pos-tag { margin-left: 0; margin-right: 0.2rem; }
  .gp-pitcher-stat { font-size: 0.45rem; color: var(--cream-muted); }
  .gp-right .gp-pitcher-footer { text-align: right; }

  .gp-next { text-align: center; padding: 0.8rem 0; width: 100%; }
  .gp-next-label { font-size: 0.4rem; letter-spacing: 0.2rem; color: var(--cream-muted); text-transform: uppercase; margin-bottom: 0.5rem; }
  .gp-next-teams { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.1rem; color: var(--cream); margin-bottom: 0.25rem; }

<script>
'use strict';

/* ── Constants ────────────────────────────────────────────────── */
const PADRES_ID = 135;

const STATS_API_V11 = 'https://statsapi.mlb.com/api/v1.1';

/* NL West — stable MLB team IDs + abbreviations */

/* Master ID → abbreviation map for non-NL-West teams (NL West come from NL_WEST). */

  108: 'LAA', 109: 'AZ',  110: 'BAL', 111: 'BOS', 112: 'CHC',
  113: 'CIN', 114: 'CLE', 115: 'COL', 116: 'DET', 117: 'HOU',

/* Reusable corner decoration markup (4 corners on every panel/card). */

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

/* Standings table markup (used both as initial render and when restoring

const STANDINGS_TABLE_HTML = `
  <table class="standings-table">
    <thead>

        <th class="team-th" style="width:35%">Team</th>
        <th class="num">W</th>
        <th class="num">L</th>
        <th class="num">PCT</th>

    <tbody id="standingsBody">
      <tr><td colspan="8" class="cell-loading">Loading standings...</td></tr>

/* ── Promo definitions ────────────────────────────────────────── */
const PROMOS = [
  {
    id: 'strikeouts', icon: '🐾', brand: 'Petco',
    trigger: 'K-9 or more strikeouts',
    reward: '25% off your total purchase at participating Petco locations with loyalty membership. Ask for "Padres K-9 Promotion" at checkout.',
    rewardLink: { text: 'Petco.com/PadresK9', href: 'https://www.petco.com/PadresK-9' },

      const ps = box.teams[side].teamStats?.pitching;
      if (ps?.strikeOuts !== undefined) return { value: ps.strikeOuts, label: 'Strikeouts' };
      const pitchers = box.teams[side].pitchers || [];

      let hrs = 0;

      return { value: hrs, label: 'Home Runs' };

  },
  {

    reward: "Free medium fries with $2 purchase the day after a Padres win. Only on the app at participating McDonald's locations.",
    stat: (box, side, isWin) => ({ value: isWin ? 1 : 0, label: isWin ? 'Win' : 'Loss' }),
    check: v => v === 1,
    liveMsg: (v, score) => score.padres > score.opp ? 'Currently winning' : score.padres < score.opp ? 'Currently losing' : 'Tied',
    isWinCard: true,
  },
  {
    id: 'stolenbase', icon: '🛵', brand: 'Uber Eats',
    trigger: 'Any Padres stolen base',
    reward: 'Look out for a special Uber Eats code for a deal on contactless delivery for restaurant takeout, groceries and more.',
    stat: (box, side) => {
      const bs = box.teams[side].teamStats?.batting;
      if (bs?.stolenBases !== undefined) return { value: bs.stolenBases, label: 'Stolen Bases' };
      const batters = box.teams[side].batters || [];
      const players = box.teams[side].players;
      let sb = 0;
      for (const pid of batters) sb += players[`ID${pid}`]?.stats?.batting?.stolenBases ?? 0;
      return { value: sb, label: 'Stolen Bases' };
    },
    check: v => v >= 1,
    liveMsg: v => v >= 1 ? 'Already stolen one!' : 'None yet',
  },
];

/* ── DOM cache ────────────────────────────────────────────────── */
const $ = {
  headerDate:    document.getElementById('headerDate'),
  grid:          document.getElementById('grid'),
  matchupLine:   document.getElementById('matchupLine'),
  get standingsBody() { return document.getElementById('standingsBody'); },
  gamePanel:     document.getElementById('gamePanel'),
  get nlwestPanel()   { return document.getElementById('nlwestPanel'); },
};

/* ── Helpers ──────────────────────────────────────────────────── */
function getPTOffset() {
  /* Pacific Time offset from UTC in hours (8 = PST, 7 = PDT).
     DST: 2nd Sunday of March 02:00 PT → 1st Sunday of November 02:00 PT. */
  const now = new Date();
  function nthSundayUTC(year, month, n) {
    const d = new Date(Date.UTC(year, month - 1, 1));
    let sundays = 0;
    while (sundays < n) {
      if (d.getUTCDay() === 0) sundays++;
      if (sundays < n) d.setUTCDate(d.getUTCDate() + 1);
    }
    return d;
  }
  const year = now.getUTCFullYear();
  const dstStart = nthSundayUTC(year, 3, 2);  // 2nd Sun March, 02:00 PT = 10:00 UTC
  const dstEnd   = nthSundayUTC(year, 11, 1); // 1st Sun November, 02:00 PT = 09:00 UTC
  dstStart.setUTCHours(10);
  dstEnd.setUTCHours(9);
  const isPDT = now >= dstStart && now < dstEnd;
  return isPDT ? 7 : 8;
}

function getLocalDateStr(offset = 0) {
  const now    = new Date();
  const ptMs   = now.getTime() - getPTOffset() * 3600000;
  const ptDate = new Date(ptMs);
  ptDate.setUTCDate(ptDate.getUTCDate() + offset);
  const y = ptDate.getUTCFullYear();
  const m = String(ptDate.getUTCMonth() + 1).padStart(2, '0');
  const d = String(ptDate.getUTCDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function formatDisplayDate(s) {
  const [y, m, day] = s.split('-');
  return `${MONTHS[parseInt(m, 10) - 1]} ${parseInt(day, 10)}, ${y}`;
}

/* Returns last name, respecting Jr./Sr./II/III/IV suffixes. */
function lastName(fullName) {
  if (!fullName) return '—';
  const parts = fullName.split(' ');
  if (parts.length >= 3 && NAME_SUFFIXES.has(parts[parts.length - 1].toLowerCase())) {
    return parts[parts.length - 2] + ' ' + parts[parts.length - 1];
  }
  return parts[parts.length - 1];
}

const ordinalSuffix = n => [, 'st', 'nd', 'rd'][n] || 'th';

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

/* ── Card rendering ───────────────────────────────────────────── */
function cardHTML(promo, state) {
  let resultHTML;

  if (state.status === 'loading') {
    resultHTML = '<div class="result-area loading"><div class="loading-blink">Loading ▋</div></div>';
  } else if (state.status === 'nogame') {
    resultHTML = '<div class="result-area nogame"><div class="result-verdict nogame">No game</div><div class="result-sub">Padres had the day off</div></div>';
  } else {
    const achieved = promo.check(state.value, state);
    const cls = state.status === 'live' ? 'live' : (achieved ? 'yes' : 'no');
    let verdictText, subText, topContent;

    if (state.status === 'live') {
      verdictText = promo.isWinCard
        ? promo.liveMsg(state.value, state.score)
        : (achieved ? 'Yes ✓' : 'In Progress');
      subText = `<span>${promo.liveMsg ? promo.liveMsg(state.value, state.score) : ''}</span>`;
      topContent = promo.isWinCard
        ? `<div class="result-game-label">${state.score.padres > state.score.opp ? 'Padres Lead!' : state.score.padres < state.score.opp ? 'Padres Trail' : 'Tied Game'}</div>`
        : `<div class="result-stat">${state.value}</div><div class="result-stat-label">${state.label}</div>`;
    } else {
      verdictText = achieved ? 'Yes ✓' : 'No ✗';
      subText = achieved ? '<span>Promo active today!</span>' : '<span>No promo today</span>';
      topContent = promo.isWinCard
        ? `<div class="result-game-label">${achieved ? 'Padres Won!' : 'Padres Lost :('}</div><div class="result-stat-label">${achieved ? 'Free Fries! 🍟' : 'No Free Fries for You'}</div>`
        : `<div class="result-stat">${state.value}</div><div class="result-stat-label">${state.label}</div>`;
    }

    const liveDot = state.status === 'live' ? '<span class="live-dot"></span>' : '';
    resultHTML = `<div class="result-area ${cls}">${topContent}<div class="result-verdict ${cls}">${liveDot}${verdictText}</div><div class="result-sub">${subText}</div></div>`;
  }

  const rewardLink = promo.rewardLink
    ? ` <a href="${promo.rewardLink.href}" target="_blank" rel="noopener">${promo.rewardLink.text}</a>`
    : '';

  return `<div class="card">${CORNERS_HTML}<div class="card-brand-block"><div class="card-icon">${promo.icon}</div><div class="card-brand">${promo.brand}</div></div><div class="card-trigger-label">Promo triggers on</div><div class="card-trigger">${promo.trigger}</div><div class="card-divider"></div>${resultHTML}<div class="card-reward">${promo.reward}${rewardLink}</div></div>`;
}

function renderAllCards(stateForPromo) {
  $.grid.innerHTML = PROMOS.map(p => cardHTML(p, stateForPromo(p))).join('');
}

/* ── Standings ────────────────────────────────────────────────── */
async function fetchNLWest() {
  const todayStr = getLocalDateStr(0);

  const [standData, schedData] = await Promise.all([
    fetchJSON(`${STATS_API}/standings?leagueId=104&season=${SEASON}&standingsTypes=regularSeason`),
    fetchJSON(`${STATS_API}/schedule?sportId=1&date=${todayStr}&gameType=R&hydrate=linescore`),
  ]);

  /* W/L map by team ID */
  const wlMap = {};
  for (const record of standData.records || []) {
    for (const tr of record.teamRecords || []) {
      const l10 = tr.records?.splitRecords?.find(s => s.type === 'lastTen');
      wlMap[tr.team.id] = {
        w: tr.wins,
        l: tr.losses,
        l10w: l10?.wins ?? '-',
        l10l: l10?.losses ?? '-',
        streak: tr.streak?.streakCode ?? '',
      };
    }
  }

  /* Build today-game map keyed by NL West team ID, and enrich the abbr
     map for any team appearing on the schedule, in one pass. */
  const todayGames = {};
  for (const dateObj of schedData.dates || []) {
    for (const g of dateObj.games || []) {
      const homeId = g.teams?.home?.team?.id;
      const awayId = g.teams?.away?.team?.id;
      const hAbbr  = g.teams?.home?.team?.abbreviation;
      const aAbbr  = g.teams?.away?.team?.abbreviation;
      if (homeId && hAbbr) ID_TO_ABBR[homeId] = hAbbr;
      if (awayId && aAbbr) ID_TO_ABBR[awayId] = aAbbr;

      if (!NL_WEST_IDS.has(homeId) && !NL_WEST_IDS.has(awayId)) continue;

      const startUTC = new Date(g.gameDate);
      const info = {
        state:         g.status?.abstractGameState,
        detailedState: g.status?.detailedState ?? '',
        localTime:     startUTC.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' }),
        homeId, awayId,
        homeRuns: g.teams?.home?.score ?? g.linescore?.teams?.home?.runs ?? 0,
        awayRuns: g.teams?.away?.score ?? g.linescore?.teams?.away?.runs ?? 0,
        inning:   g.linescore?.currentInning ?? null,
        half:     g.linescore?.inningHalf ?? null,
        homeAbbr: hAbbr || ID_TO_ABBR[homeId] || '???',
        awayAbbr: aAbbr || ID_TO_ABBR[awayId] || '???',
      };
      if (NL_WEST_IDS.has(homeId)) todayGames[homeId] = info;
      if (NL_WEST_IDS.has(awayId)) todayGames[awayId] = info;
    }
  }

  /* Sort NL West */
  const sorted = [...NL_WEST].sort((a, b) => {
    const wa = wlMap[a.id]?.w ?? 0, wb = wlMap[b.id]?.w ?? 0;
    const la = wlMap[a.id]?.l ?? 0, lb = wlMap[b.id]?.l ?? 0;
    return wb !== wa ? wb - wa : la - lb;
  });
  const leaderRec = wlMap[sorted[0].id] ?? { w: 0, l: 0 };

  const html = sorted.map((team, idx) => {
    const rec = wlMap[team.id] ?? { w: 0, l: 0 };
    const isPadres = team.id === PADRES_ID;

    let pct = '.000';
    const totalGames = rec.w + rec.l;
    if (totalGames > 0) {
      pct = (rec.w / totalGames).toFixed(3).replace(/^0/, '');
    }

    let gb = '—';
    if (idx > 0) {
      const n = ((leaderRec.w - rec.w) + (rec.l - leaderRec.l)) / 2;
      gb = n <= 0 ? '—' : (n % 1 === 0 ? String(n) : n.toFixed(1));
    }

    const gameCell = buildGameCell(todayGames[team.id], team.id);

    const streakCode = rec.streak ?? '';
    const streakClass = streakCode.startsWith('W') ? 'streak-w' : streakCode.startsWith('L') ? 'streak-l' : '';

    return `<tr class="${isPadres ? 'padres-row' : ''}" onclick="openTeamStats(${team.id}, '${team.name}', ${isPadres})">
      <td>
        <div class="team-name-cell">
          <span class="team-abbr ${isPadres ? 'padres' : ''}">${team.abbr}</span>
          <span class="team-full">${team.name}</span>
        </div>
      </td>
      <td class="num"><div class="record">${rec.w}</div></td>
      <td class="num"><div class="record">${rec.l}</div></td>
      <td class="num"><div class="pct">${pct}</div></td>
      <td class="num hide-mobile"><div class="gb">${gb}</div></td>
      <td class="num"><div class="record">${rec.l10w}-${rec.l10l}</div></td>
      <td class="num hide-mobile"><div class="record ${streakClass}">${streakCode || '—'}</div></td>
      <td class="next-game-cell">${gameCell}</td>
    </tr>`;
  }).join('');

  $.standingsBody.innerHTML = html;
}

function buildGameCell(g, teamId) {
  if (!g) return '<div class="no-game">Off day</div>';

  const isHome  = g.homeId === teamId;
  const myAbbr  = isHome ? g.homeAbbr : g.awayAbbr;
  const oppAbbr = isHome ? g.awayAbbr : g.homeAbbr;
  const myRuns  = isHome ? g.homeRuns : g.awayRuns;
  const oppRuns = isHome ? g.awayRuns : g.homeRuns;
  const vsAt    = isHome ? 'vs' : '@';

  if (g.state === 'Live') {
    const detailLower = g.detailedState.toLowerCase();
    const isWarmup = detailLower.includes('warm')
                  || (!g.inning && !g.half)
                  || (g.inning === 1 && !g.half);
    const inningStr = isWarmup
      ? 'Warming Up'
      : g.inning ? `${g.half ?? ''} ${g.inning}${ordinalSuffix(g.inning)}` : 'Live';
    const scoreStr = isWarmup
      ? `${myAbbr} – ${oppAbbr}`
      : `${myAbbr} ${myRuns} – ${oppRuns} ${oppAbbr}`;
    return `<div class="game-live"><span class="live-dot"></span><span class="game-scoreline">${scoreStr}</span></div><div class="game-sub">${inningStr}</div>`;
  }

  if (g.state === 'Final' && g.detailedState.toLowerCase().includes('final')) {
    const won = myRuns > oppRuns;
    const myCls  = won ? 'score-team-won'  : 'score-team-lost';
    const oppCls = won ? 'score-team-lost' : 'score-team-won';
    return `<div class="game-scoreline">
      <span class="${myCls}">${myAbbr} ${myRuns}</span><span class="score-dash"> – </span><span class="${oppCls}">${oppRuns} ${oppAbbr}</span>
    </div><div class="game-sub">Final</div>`;
  }

  /* The schedule was already fetched with date=todayStr so any game here is today's. */
  return `<div class="game-time">${g.localTime}</div><div class="game-sub">${vsAt} ${oppAbbr}</div>`;
}

/* ── Padres game panel ────────────────────────────────────────── */
function buildLineupEntry(p, players, pid, i) {
  const name = p?.person?.fullName ?? `Player ${pid}`;
  const pos  = p?.position?.abbreviation ?? p?.allPositions?.[0]?.abbreviation ?? '';
  const isSub = p?.gameStatus?.isSubstitute ?? false;
  return { num: i + 1, name, last: lastName(name), pos, id: pid, isSub };
}

function getLineup(side, feed, box) {
  const feedTeam     = feed.liveData?.boxscore?.teams?.[side];
  const battingOrder = feedTeam?.battingOrder ?? [];

  if (battingOrder.length > 0) {
    const players = feedTeam?.players ?? {};
    return battingOrder.slice(0, 9).map((pid, i) =>
      buildLineupEntry(players[`ID${pid}`], players, pid, i)
    );
  }

  /* Fallback: boxscore batters */
  const batters = box.teams[side].batters ?? [];
  const players = box.teams[side].players ?? {};
  return batters.slice(0, 9).map((pid, i) =>
    buildLineupEntry(players[`ID${pid}`], players, pid, i)
  );
}

/* Find the most recent pitcher with stats and return name + pitch count. */
function getActivePitcherInfo(feedTeam) {
  const pitchers = feedTeam?.pitchers ?? [];
  const players  = feedTeam?.players ?? {};
  for (let i = pitchers.length - 1; i >= 0; i--) {
    const p = players[`ID${pitchers[i]}`];
    if (p?.stats?.pitching) {
      const s = p.stats.pitching;
      return {
        name:  p.person?.fullName ?? '—',
        count: s.pitchesThrown ?? s.numberOfPitches ?? null,
      };
    }
  }
  return { name: '—', count: null };
}

function diamondSVG(first, second, third) {
  const pad = 14, size = 80, bs = 26, cx = size / 2;
  const top   = { x: cx,              y: bs / 2 + 1 };
  const right = { x: size - bs / 2 - 1, y: cx };
  const left  = { x: bs / 2 + 1,        y: cx };
  const dim = 'rgba(200,146,42,0.7)', lit = '#E8B84B';
  const totalW = size + pad * 2, totalH = size + pad * 2;

  const baseRect = (px, py, on) => {
    const ox = px + pad, oy = py + pad;
    return `<rect x="${ox - bs / 2}" y="${oy - bs / 2}" width="${bs}" height="${bs}" fill="${on ? lit : 'transparent'}" stroke="${on ? lit : dim}" stroke-width="2.5" transform="rotate(45 ${ox} ${oy})" rx="1"/>`;
  };

  return `<svg width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" xmlns="http://www.w3.org/2000/svg">${baseRect(right.x, right.y, first)}${baseRect(top.x, top.y, second)}${baseRect(left.x, left.y, third)}</svg>`;
}

async function fetchPadresGame() {
  const todayStr = getLocalDateStr(0);
  const schedData = await fetchJSON(`${STATS_API}/schedule?sportId=1&date=${todayStr}&teamId=${PADRES_ID}&gameType=R&hydrate=linescore`);
  const games = schedData.dates?.[0]?.games ?? [];
  const liveGame = games.find(g => g.status.abstractGameState === 'Live');

  if (liveGame) {
    startGamePolling();
    return renderLiveGame(liveGame);
  }

  /* No live game — stop polling and find next scheduled game */
  stopGamePolling();
  return renderNextGame();
}

async function fetchGameThreadUrl(oppShortName) {
  try {
    const q = encodeURIComponent('[Game Thread] Padres');
    const data = await fetchJSON(
      `https://www.reddit.com/r/Padres/search.json?q=${q}&restrict_sr=1&sort=new&limit=10&type=link`
    );
    const now  = Date.now() / 1000;
    const post = (data?.data?.children ?? []).find(c => {
      const title = (c.data?.title ?? '').toLowerCase();
      const age   = now - (c.data?.created_utc ?? 0);
      return title.includes('game thread')
          && title.includes(oppShortName.toLowerCase())
          && age < 86400;
    });
    return post ? `https://reddit-stream.com/comments/${post.data.id}/` : null;
  } catch {
    return null;
  }
}

async function renderLiveGame(liveGame) {
  const [feed, box] = await Promise.all([
    fetchJSON(`${STATS_API_V11}/game/${liveGame.gamePk}/feed/live`),
    fetchJSON(`${STATS_API}/game/${liveGame.gamePk}/boxscore`),
  ]);

  const linescore = feed.liveData?.linescore ?? {};
  const play      = feed.liveData?.plays?.currentPlay ?? {};
  const matchup   = play.matchup ?? {};
  const offense   = linescore.offense ?? {};

  const detailedState = liveGame.status?.detailedState ?? '';
  const isWarmup =
       detailedState.toLowerCase().includes('warm')
    || (!play.atBatIndex && !play.matchup?.pitcher)
    || (linescore.currentInning === 1 && !feed.liveData?.plays?.allPlays?.length);

  const homeTeamId = feed.gameData?.teams?.home?.id;
  const awayId     = feed.gameData?.teams?.away?.id;
  const padresSide = homeTeamId === PADRES_ID ? 'home' : 'away';
  const oppSide    = padresSide === 'home' ? 'away' : 'home';
  const oppAbbr    = ID_TO_ABBR[padresSide === 'home' ? awayId : homeTeamId] ?? '???';

  const padresShortName = feed.gameData?.teams?.[padresSide]?.teamName ?? 'Padres';
  const oppShortName    = feed.gameData?.teams?.[oppSide]?.teamName    ?? oppAbbr;

  if (_gameThreadUrlCache === undefined)
    _gameThreadUrlCache = await fetchGameThreadUrl(oppShortName);
  const gameThreadUrl = _gameThreadUrlCache;

  const homeRuns = linescore.teams?.home?.runs ?? 0;
  const awayRuns = linescore.teams?.away?.runs ?? 0;
  const padresRuns = padresSide === 'home' ? homeRuns : awayRuns;
  const oppRuns    = padresSide === 'home' ? awayRuns : homeRuns;

  const inning = linescore.currentInning ?? 1;
  const half   = linescore.inningHalf ?? 'Top';
  const outs   = linescore.outs ?? 0;
  const onFirst  = !!offense.first;
  const onSecond = !!offense.second;
  const onThird  = !!offense.third;

  const currentBatter = matchup.batter?.fullName ?? offense.batter?.fullName ?? '—';
  const batterCount   = play.count ? `${play.count.balls}-${play.count.strikes}` : '';
  const currentBatterLast = lastName(currentBatter);

  const lastPitchDesc = (() => {
    if (isWarmup) return '';
    const batterLast = currentBatterLast !== '—' ? currentBatterLast : '';

    const pitchPhrase = (desc, count) => {
      const d = desc.toLowerCase();
      if (d === 'ball' || d === 'intent ball' || d.includes('ball in dirt') || d.includes('pitchout'))
        return `takes ball ${count?.balls ?? ''}`.trim();
      if (d === 'called strike') return `takes strike ${count?.strikes ?? ''}`.trim();
      if (d.includes('in play'))         return 'Ball in play';
      if (d.includes('swinging strike') || d === 'missed bunt') return `swings and misses for strike ${count?.strikes ?? ''}`.trim();
      if (d.includes('foul tip'))  return `fouls it off for strike ${count?.strikes ?? ''}`.trim();
      if (d.includes('foul bunt')) return `fouls off the bunt for strike ${count?.strikes ?? ''}`.trim();
      if (d.includes('foul'))      return `fouls it off for strike ${count?.strikes ?? ''}`.trim();
      return desc;
    };

    const eventPhrase = event => {
      const e = event.toLowerCase();
      if (e === 'single')                                return 'singles';
      if (e === 'double')                                return 'doubles';
      if (e === 'triple')                                return 'triples';
      if (e.includes('home run'))                        return 'homers';
      if (e.includes('strikeout'))                       return 'strikes out';
      if (e === 'walk' || e === 'intent walk')           return 'walks';
      if (e === 'hit by pitch')                          return 'hit by pitch';
      if (e.includes('groundout') || e === 'ground out') return 'grounds out';
      if (e.includes('flyout')    || e === 'fly out')    return 'flies out';
      if (e.includes('lineout')   || e === 'line out')   return 'lines out';
      if (e.includes('pop out')   || e.includes('popout')) return 'pops out';
      if (e.includes('double play'))                     return 'grounds into a double play';
      if (e.includes('triple play'))                     return 'into a triple play';
      if (e.includes('sac fly'))                         return 'hits a sac fly';
      if (e.includes('sac bunt'))                        return 'lays down a sac bunt';
      if (e.includes('fielders choice out'))             return 'into a fielder\'s choice';
      if (e.includes('fielders choice'))                 return 'reaches on fielder\'s choice';
      if (e.includes('force out'))                       return 'into a force out';
      return event;
    };

    if (play.about?.isComplete) {
      const event     = play.result?.event ?? '';
      const eventType = (play.result?.eventType ?? '').toLowerCase();
      const recordsOut = eventType.includes('out') || eventType === 'strikeout'
                      || eventType === 'double_play' || eventType === 'triple_play'
                      || eventType === 'grounded_into_double_play';

      const scorers = (play.runners ?? [])
        .filter(r => (r.movement?.end ?? '').toLowerCase() === 'score'
                  && !r.movement?.isOut
                  && lastName(r.details?.runner?.fullName ?? '') !== batterLast)
        .map(r => lastName(r.details?.runner?.fullName ?? ''))
        .filter(Boolean);

      const inningEnded = recordsOut && outs === 0;
      const label  = [batterLast, eventPhrase(event)].filter(Boolean).join(' ')
                   + (inningEnded ? ' to end the inning' : '');
      const extras = [];
      if (scorers.length) extras.push(scorers.map(s => `${s} scores`).join(', '));
      if (recordsOut && !inningEnded) extras.push(`${outs} out${outs !== 1 ? 's' : ''}`);
      return label + (extras.length ? ' · ' + extras.join(' · ') : '');
    }

    const lastPitch = [...(play.playEvents ?? [])].reverse().find(e => e.isPitch);
    const pitchDesc = lastPitch?.details?.description ?? '';
    if (!pitchDesc) return '';
    const phrase = pitchPhrase(pitchDesc, play.count);
    if (phrase === 'Ball in play') return phrase;
    return batterLast ? `${batterLast} ${phrase}` : phrase;
  })();
  if (lastPitchDesc) _lastPitchDescCache = lastPitchDesc;
  const displayPitchDesc = lastPitchDesc || _lastPitchDescCache;

  const halfIsTop  = half.toLowerCase().includes('top');
  const halfArrow = halfIsTop ? '▲' : '▼';

  const padresLineup = getLineup(padresSide, feed, box);
  const oppLineup    = getLineup(oppSide,    feed, box);

  const feedHome = feed.liveData?.boxscore?.teams?.home;
  const feedAway = feed.liveData?.boxscore?.teams?.away;
  const padresFeedTeam = padresSide === 'home' ? feedHome : feedAway;
  const oppFeedTeam    = padresSide === 'home' ? feedAway : feedHome;

  const padresPitcher = getActivePitcherInfo(padresFeedTeam);
  const oppPitcher    = getActivePitcherInfo(oppFeedTeam);
  const padresPitcherLast = lastName(padresPitcher.name);
  const oppPitcherLast    = lastName(oppPitcher.name);
  const padresPitchCount  = padresPitcher.count;
  const oppPitchCount     = oppPitcher.count;

  const lineupHTML = (lineup, side) => {
    const isBatting = halfIsTop ? side === 'away' : side === 'home';
    const isRight   = side === oppSide;
    return lineup.map(p => {
      const isCurrent = isBatting && p.last === currentBatterLast && !isWarmup;
      const subMark = p.isSub ? '<span class="sub-mark">↑</span>' : '';
      const posStr  = `<span class="pos-tag">${p.pos}</span>`;
      const inner = isRight
        ? `${posStr} ${subMark}${p.last}<span class="order-num">${p.num}.</span>`
        : `<span class="order-num">${p.num}.</span>${p.last}${subMark}${posStr}`;
      return `<li class="${isCurrent ? 'current-batter' : ''}">${inner}</li>`;
    }).join('');
  };

  const statusBlock = isWarmup
    ? `<div class="gp-warmup-badge">⚾ Warming Up</div>
       <div class="gp-inning-block">
         <div class="gp-inning-num">Pre-Game</div>
         <div class="gp-inning-word">First Pitch Soon</div>
       </div>`
    : '<div class="gp-live-badge"><span class="live-dot"></span> Live</div>';

  const inningBlock = isWarmup ? '' : `
    <div class="gp-inning-block-mid">
      <div class="gp-half-arrow-sm">${halfArrow}</div>
      <div class="gp-inning-big">${inning}${ordinalSuffix(inning)}</div>
      <div class="gp-count-big">${batterCount || '0-0'}</div>
      ${displayPitchDesc ? `<div class="gp-last-pitch">${displayPitchDesc}</div>` : ''}
      ${gameThreadUrl ? `<div class="gp-thread-link"><a href="${gameThreadUrl}" target="_blank" rel="noopener">Game Thread ↗</a></div>` : ''}
    </div>`;

  /* Trim 3-letter abbrs to 2 for score display (CHC→CH, LAD→LA) */
  const padresScoreAbbr = 'SD';
  const oppScoreAbbr = oppAbbr.length >= 3 ? oppAbbr.slice(0, -1) : oppAbbr;

  $.gamePanel.innerHTML = `${CORNERS_HTML}
    <div class="gp-body">
      <div class="gp-left">
        <div class="gp-lineup-name padres">${padresShortName}</div>
        <ul class="gp-lineup">${lineupHTML(padresLineup, padresSide)}</ul>
        <div class="gp-pitcher-footer">
          <div class="gp-pitcher-name"><span class="pos-tag">P </span>${padresPitcherLast}</div>
          ${padresPitchCount != null ? `<div class="gp-pitcher-stat">${padresPitchCount} pitches</div>` : ''}
        </div>
      </div>
      <div class="gp-mid">
        ${statusBlock}
        <div class="gp-diamond">${diamondSVG(onFirst, onSecond, onThird)}</div>
        <div class="gp-outs-col">
          <div class="gp-outs-label">Outs</div>
          <div class="outs-pips">
            <div class="out-pip ${outs >= 1 ? 'on' : ''}"></div>
            <div class="out-pip ${outs >= 2 ? 'on' : ''}"></div>
            <div class="out-pip ${outs >= 3 ? 'on' : ''}"></div>
          </div>
        </div>
        <div class="gp-center-score">
          <span class="gp-center-team padres">${padresScoreAbbr}</span>
          <span class="gp-center-runs">${padresRuns}</span>
          <span class="gp-center-dash">–</span>
          <span class="gp-center-runs">${oppRuns}</span>
          <span class="gp-center-team opp">${oppScoreAbbr}</span>
        </div>
        ${inningBlock}
      </div>
      <div class="gp-right">
        <div class="gp-lineup-name opp">${oppShortName}</div>
        <ul class="gp-lineup">${lineupHTML(oppLineup, oppSide)}</ul>
        <div class="gp-pitcher-footer">
          <div class="gp-pitcher-name">${oppPitcherLast}<span class="pos-tag"> P</span></div>
          ${oppPitchCount != null ? `<div class="gp-pitcher-stat">${oppPitchCount} pitches</div>` : ''}
        </div>
      </div>
    </div>`;

  return true; /* live game still in progress */
}

async function renderNextGame() {
  for (let offset = 0; offset <= 10; offset++) {
    const dateStr = getLocalDateStr(offset);
    const sData = await fetchJSON(`${STATS_API}/schedule?sportId=1&date=${dateStr}&teamId=${PADRES_ID}&gameType=R&hydrate=probablePitcher,lineups,broadcasts(all)`);
    const nextGames = sData.dates?.[0]?.games ?? [];
    const next = nextGames.find(g =>
         g.status.abstractGameState === 'Preview'
      || g.status.detailedState === 'Scheduled'
    );

    if (!next) continue;

    const homeId = next.teams.home.team.id;
    const awayId = next.teams.away.team.id;
    const homeAbbr = next.teams.home.team.abbreviation || ID_TO_ABBR[homeId] || '???';
    const awayAbbr = next.teams.away.team.abbreviation || ID_TO_ABBR[awayId] || '???';
    const startUTC = new Date(next.gameDate);
    const timeStr = startUTC.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
    const dateLbl = startUTC.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

    const homeProbable    = next.teams.home.probablePitcher?.fullName ?? null;
    const awayProbable    = next.teams.away.probablePitcher?.fullName ?? null;
    const homeProbableId  = next.teams.home.probablePitcher?.id ?? null;
    const awayProbableId  = next.teams.away.probablePitcher?.id ?? null;

    const padresSide    = homeId === PADRES_ID ? 'home' : 'away';
    const oppId         = padresSide === 'home' ? awayId : homeId;
    const lineupPlayers = padresSide === 'home' ? next.lineups?.homePlayers : next.lineups?.awayPlayers;
    const lineupPosted  = Array.isArray(lineupPlayers) && lineupPlayers.length > 0;

    const seriesGame  = next.seriesGameNumber ?? null;
    const seriesTotal = next.gamesInSeries ?? null;
    const venueName   = next.venue?.name ?? null;

    const tvBroadcasts = [...new Set(
      (next.broadcasts ?? []).filter(b => b.type === 'TV').map(b => {
        if (/padres[.\s]*tv/i.test(b.name)) return 'Padres.TV';
        return b.name;
      })
    )];

    /* Parallel: pitcher season stats + season series record */
    const todayStr = getLocalDateStr(0);
    const pitcherStatUrl = id =>
      `${STATS_API}/people/${id}/stats?stats=season&group=pitching&season=${SEASON}&sportId=1`;
    const [homeStatsData, awayStatsData, seriesSchedule] = await Promise.all([
      homeProbableId ? fetchJSON(pitcherStatUrl(homeProbableId)).catch(() => null) : Promise.resolve(null),
      awayProbableId ? fetchJSON(pitcherStatUrl(awayProbableId)).catch(() => null) : Promise.resolve(null),
      fetchJSON(`${STATS_API}/schedule?sportId=1&startDate=${SEASON}-03-01&endDate=${todayStr}&teamId=${PADRES_ID}&gameType=R`).catch(() => null),
    ]);

    function pitcherStatStr(data) {
      const stat = data?.stats?.[0]?.splits?.[0]?.stat;
      if (!stat) return null;
      const era = parseFloat(stat.era);
      return `${stat.wins ?? 0}-${stat.losses ?? 0}, ${isFinite(era) ? era.toFixed(2) : '—'} ERA`;
    }

    const homeStatStr = pitcherStatStr(homeStatsData);
    const awayStatStr = pitcherStatStr(awayStatsData);

    let seriesW = 0, seriesL = 0;
    if (seriesSchedule) {
      const allGames = (seriesSchedule.dates ?? []).flatMap(d => d.games ?? []);
      for (const g of allGames) {
        const hId = g.teams.home.team.id, aId = g.teams.away.team.id;
        if ((hId !== oppId && aId !== oppId) || g.status.abstractGameState !== 'Final') continue;
        const padresIsHome = hId === PADRES_ID;
        const padresRuns = padresIsHome ? (g.teams.home.score ?? 0) : (g.teams.away.score ?? 0);
        const oppRuns    = padresIsHome ? (g.teams.away.score ?? 0) : (g.teams.home.score ?? 0);
        if (padresRuns > oppRuns) seriesW++; else seriesL++;
      }
    }

    /* ── Build HTML blocks ─────────────────────────────────────── */
    const metaParts = [];
    if (seriesGame && seriesTotal) metaParts.push(`Game ${seriesGame} of ${seriesTotal}`);
    if (venueName) metaParts.push(venueName);
    const metaLine = metaParts.length
      ? `<div class="gp-next-meta">${metaParts.join(' · ')}</div>` : '';

    const pitcherBlock = (homeProbable || awayProbable) ? (() => {
      const awayName = lastName(awayProbable) || 'TBD';
      const homeName = lastName(homeProbable) || 'TBD';
      const statsLine = (awayStatStr || homeStatStr)
        ? `<div class="gp-next-pitcher-stats">${awayStatStr || '—'} &nbsp;vs&nbsp; ${homeStatStr || '—'}</div>`
        : '';
      return `
        <div class="gp-next-divider"></div>
        <div class="gp-next-pitchers">
          <div class="gp-next-pitcher-label">Probable Starters</div>
          <div class="gp-next-pitcher-matchup">${awayName} vs ${homeName}</div>
          ${statsLine}
        </div>`;
    })() : '';

    const seriesStr = (seriesW > 0 || seriesL > 0)
      ? `<div class="gp-next-series">Season series: SD ${seriesW}–${seriesL}</div>` : '';

    const broadcastStr = tvBroadcasts.length
      ? `<div class="gp-next-broadcasts">${tvBroadcasts.join(' · ')}</div>` : '';

    const lineupBadge = lineupPosted
      ? `<div class="gp-next-lineup-badge">✓ Lineup Posted</div>` : '';

    $.gamePanel.innerHTML = `${CORNERS_HTML}
      <div class="gp-next">
        <div class="gp-next-label">Next Game</div>
        ${metaLine}
        <div class="gp-next-teams">${awayAbbr} @ ${homeAbbr}</div>
        <div class="gp-next-time">${timeStr}</div>
        <div class="gp-next-date">${dateLbl}</div>
        ${pitcherBlock}
        ${seriesStr}
        ${broadcastStr}
        ${lineupBadge}
      </div>`;
    return false;
  }

  $.gamePanel.innerHTML = `${CORNERS_HTML}<div class="gp-next"><div class="gp-next-label">No upcoming games found</div></div>`;
  return false;
}

/* ── Polling ──────────────────────────────────────────────────── */
let _gamePollInterval = null;
let _standingsPollInterval = null;
let _lastPitchDescCache = '';
let _gameThreadUrlCache = undefined; /* undefined=not fetched, null=not found, string=url */

function startGamePolling() {
  if (_gamePollInterval) return;
  _gamePollInterval = setInterval(async () => {
    if (document.visibilityState === 'hidden') return; /* don't burn requests when tab is hidden */
    try {
      const isStillLive = await fetchPadresGame();
      if (!isStillLive) stopGamePolling();
    } catch { /* panel already shows error */ }
  }, GAME_POLL_MS);
}

function stopGamePolling() {
  if (_gamePollInterval) {
    clearInterval(_gamePollInterval);
    _gamePollInterval = null;
  }
  _lastPitchDescCache = '';
  _gameThreadUrlCache = undefined;
}

function startStandingsPolling() {
  if (_standingsPollInterval) return;
  _standingsPollInterval = setInterval(() => {
    if (document.visibilityState === 'hidden') return;
    fetchNLWest().catch(() => {});
  }, STANDINGS_POLL_MS);
}

/* When the tab becomes visible again, do an immediate refresh so we're
   not staring at stale data while we wait for the next interval tick. */
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  fetchNLWest().catch(() => {});
  if (_gamePollInterval) fetchPadresGame().catch(() => {});
});

/* ── Panel height locking ─────────────────────────────────────── */
/* Match game-panel height to standings-panel height (re-runs on resize). */
let _resizeTimer = null;
function lockPanelHeights() {
  if (!$.nlwestPanel || !$.gamePanel) return;
  /* Reset before measuring so we measure natural content height */
  $.nlwestPanel.style.height = '';
  $.gamePanel.style.height = '';
  const standH = $.nlwestPanel.getBoundingClientRect().height;
  const gameH  = $.gamePanel.getBoundingClientRect().height;
  const h = Math.max(standH, gameH);
  if (h > 0) {
    $.nlwestPanel.style.height    = h + 'px';
    $.nlwestPanel.style.overflowY = 'auto';
    $.gamePanel.style.height      = h + 'px';
    $.gamePanel.style.overflowY   = 'auto';
  }
}
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(lockPanelHeights, 150);
});

/* ── Render orchestration ─────────────────────────────────────── */
async function renderPromos() {
  $.headerDate.textContent = formatDisplayDate(getLocalDateStr(0));
  renderAllCards(() => ({ status: 'loading' }));

  const yesterdayStr = getLocalDateStr(-1);
  const schedData = await fetchJSON(`${STATS_API}/schedule?sportId=1&date=${yesterdayStr}&teamId=${PADRES_ID}&gameType=R&hydrate=linescore`);

  const game = schedData.dates?.[0]?.games?.find(g =>
       g.status.abstractGameState === 'Final'
    || g.status.abstractGameState === 'Live'
  );

  if (!game) {
    renderAllCards(() => ({ status: 'nogame' }));
    $.matchupLine.textContent = '';
    return;
  }

  const isLive = game.status.abstractGameState === 'Live';
  const box = await fetchJSON(`${STATS_API}/game/${game.gamePk}/boxscore`);
  const homeId = box.teams.home.team.id;
  const padresSide = homeId === PADRES_ID ? 'home' : 'away';
  const oppSide    = padresSide === 'home' ? 'away' : 'home';
  const padresRuns = box.teams[padresSide].teamStats?.batting?.runs ?? 0;
  const oppRuns    = box.teams[oppSide].teamStats?.batting?.runs ?? 0;
  const isWin = !isLive && padresRuns > oppRuns;
  const oppName = box.teams[oppSide].team.name;
  const score = { padres: padresRuns, opp: oppRuns };
  const status = isLive ? 'live' : 'final';

  const awayLabel = padresSide === 'away' ? 'Padres' : oppName;
  const homeLabel = padresSide === 'home' ? 'Padres' : oppName;
  const awayR = padresSide === 'away' ? padresRuns : oppRuns;
  const homeR = padresSide === 'home' ? padresRuns : oppRuns;

  renderAllCards(promo => {
    const { value, label } = promo.stat(box, padresSide, isWin);
    return { status, value, label, isWin, score };
  });

  $.matchupLine.innerHTML = isLive
    ? `<span class="matchup-live">● LIVE &nbsp;—&nbsp; </span>${awayLabel} ${awayR} — ${homeR} ${homeLabel}`
    : `${awayLabel} ${awayR} — ${homeR} ${homeLabel}`;
}

async function init() {
  /* All three fetches in parallel — no need to gate one on another. */
  const promosTask = renderPromos().catch(() => {
    $.grid.innerHTML = PROMOS.map(p => cardHTML(p, { status: 'nogame' })).join('');
  });
  const standingsTask = fetchNLWest().catch(err => {
    $.standingsBody.innerHTML = `<tr><td colspan="8" class="cell-error">Error loading standings: ${err.message}</td></tr>`;
  });
  const gameTask = fetchPadresGame().catch(err => {
    $.gamePanel.innerHTML = `${CORNERS_HTML}<div class="panel-error">Error: ${err.message}</div>`;
  });

  await Promise.all([promosTask, standingsTask, gameTask]);

  /* After both panels load, lock both to standingsPanel height */
  requestAnimationFrame(lockPanelHeights);

  /* Begin background polling for standings (game polling self-starts
     when a live game is detected) */
  startStandingsPolling();
}

   Strategy: capture the standings-panel height on first open, then
   pin the panel to a fixed pixel height during the stats view so
   the slide animation has stable from/to values. */

let _standingsH = 0; // captured on first open

function panelSlide(panel, fromH, toH, ms) {
  return new Promise(resolve => {
    // Must override flex:1 or the browser ignores style.height
    panel.style.flex       = 'none';
    panel.style.transition = 'none';
    panel.style.height     = fromH + 'px';
    panel.style.overflow   = 'hidden';
    panel.getBoundingClientRect(); // force reflow
    panel.style.transition = `height ${ms}ms ease`;
    panel.style.height     = toH + 'px';
    function onEnd(e) {
      if (e.propertyName !== 'height') return;
      panel.removeEventListener('transitionend', onEnd);
      panel.style.transition = '';
      resolve();
    }
    panel.addEventListener('transitionend', onEnd);
    setTimeout(resolve, ms + 100);
  });
}

async function loadStatsTab(teamId, tab) {
  if (tab === 'lastgame') {
    if (_statsData.lastgame) {
      renderLastGame();
      return;
    }
    const wrap = document.getElementById('statsTableWrap');
    if (wrap) { wrap.style.opacity = '0'; wrap.innerHTML = '<div class="stats-loading">Loading last game...</div>'; wrap.style.opacity = '1'; }
    await fetchLastGameStats(teamId);
    return;
  }

  if (_statsData[tab]) {
    renderStatsTable(tab);
    return;
  }

  const group = tab === 'hitting' ? 'hitting' : 'pitching';
  const url   = `${STATS_API}/stats?stats=season&group=${group}&season=${SEASON}&sportId=1&gameType=R&teamId=${teamId}&playerPool=ALL&limit=100`;
  const data  = await fetchJSON(url);
  const rawSplits = data.stats?.[0]?.splits ?? [];

  _statsData[tab] = rawSplits
    .filter(s => s.player?.fullName)
    .map(s => ({ name: s.player.fullName, pos: s.position?.abbreviation ?? '', ...s.stat }));

  renderStatsTable(tab);
}

function renderStatsTable(tab) {
  const cols = tab === 'hitting' ? HITTING_COLS : PITCHING_COLS;
  let rows   = [...(_statsData[tab] ?? [])];

  if (tab === 'hitting') {
    rows = rows.filter(r => (parseInt(r.plateAppearances) || 0) >= 10);
  } else {
    rows = rows.filter(r => (parseFloat(r.inningsPitched) || 0) >= 10);
  }

  const sortKey = _statsSortCol ?? (tab === 'hitting' ? 'avg' : 'era');
  rows.sort((a, b) => {
    const av = a[sortKey], bv = b[sortKey];
    if (sortKey === 'name') return _statsSortDir === 'asc'
      ? String(av).localeCompare(String(bv))
      : String(bv).localeCompare(String(av));
    const an = parseFloat(av) || 0, bn = parseFloat(bv) || 0;
    return _statsSortDir === 'asc' ? an - bn : bn - an;
  });

  const thead = cols.map(c => {
    const cls = c.key === sortKey ? ` sort-${_statsSortDir}` : '';
    return `<th class="${cls}" onclick="sortStats('${c.key}')">${c.label}</th>`;
  }).join('');

  const tbody = rows.length
    ? rows.map(r => '<tr>' + cols.map(c => {
        if (c.key === 'name') return `<td>${r.name}<span class="stat-pos">${r.pos}</span></td>`;
        const raw = r[c.key] ?? '—';
        return `<td class="stat-num">${raw !== '—' && c.fmt ? c.fmt(raw) : raw}</td>`;
      }).join('') + '</tr>').join('')
    : `<tr><td colspan="${cols.length}" class="stats-loading">No qualifying players</td></tr>`;

  const wrap = document.getElementById('statsTableWrap');
  if (!wrap) return;

  wrap.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 150, fill: 'forwards' }).finished.then(() => {
    wrap.innerHTML = `<table class="stats-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
    wrap.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 200, fill: 'forwards' });
  });
}

function sortStats(key) {
  if (_statsSortCol === key) {
    _statsSortDir = _statsSortDir === 'desc' ? 'asc' : 'desc';
  } else {
    _statsSortCol = key;
    _statsSortDir = (key === 'name' || key === 'era' || key === 'whip') ? 'asc' : 'desc';
  }
  renderStatsTable(_statsTab);
}

async function switchStatsTab(tab) {
  if (tab === _statsTab) return;
  _statsTab     = tab;
  _statsSortCol = tab === 'hitting' ? 'avg' : tab === 'pitching' ? 'era' : null;
  _statsSortDir = tab === 'pitching' ? 'asc' : 'desc';
  document.getElementById('tabLastGame')?.classList.toggle('active', tab === 'lastgame');
  document.getElementById('tabHitting')?.classList.toggle('active',  tab === 'hitting');
  document.getElementById('tabPitching')?.classList.toggle('active', tab === 'pitching');
  await loadStatsTab(_statsTeamId, tab);
}

  _statsTeamId = null;
  _statsData   = { hitting: null, pitching: null };
  document.getElementById('standingsLabel').textContent = 'NL West Standings';

  const panel    = document.getElementById('nlwestPanel');
  const currentH = parseFloat(panel.style.height) || panel.getBoundingClientRect().height;
  const toH      = _standingsH || Math.round(currentH / 2);

  // Fade out content
  const header = panel.querySelector('.stats-header');
  const wrap   = panel.querySelector('.stats-table-wrap');
  const fadeOuts = [];
  if (header) fadeOuts.push(header.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 160, fill: 'forwards' }).finished);
  if (wrap)   fadeOuts.push(wrap.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 160, fill: 'forwards' }).finished);
  await Promise.all(fadeOuts);

  // Swap HTML — this wipes all inline styles including height
  panel.innerHTML = CORNERS_HTML + STANDINGS_TABLE_HTML;
  const restoredTable = panel.querySelector('table');
  if (restoredTable) restoredTable.style.opacity = '0';

  panel.classList.remove('stats-open');

  // Start fetching the standings data immediately so it's ready in the background
  const standingsPromise = fetchNLWest().catch(() => {});

  // Re-lock height immediately after innerHTML wiped it, with no transition
  panel.style.transition = 'none';
  panel.style.height     = currentH + 'px';
  panel.style.overflow   = 'hidden';
  panel.style.flex       = 'none';
  panel.getBoundingClientRect(); // force reflow to commit

  // Now animate to standings height
  panel.style.transition = 'height 420ms ease';
  panel.style.height     = toH + 'px';

  // Fade table in while sliding
  setTimeout(() => {
    const table = panel.querySelector('table');
    if (table) table.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 280, fill: 'forwards' });
  }, 80);

  // Wait for the slide animation to finish
  await new Promise(r => setTimeout(r, 470));

  // Wait for the standings data to actually populate the DOM so the height doesn't collapse
  await standingsPromise;

  // Release back to flex
  panel.style.transition = 'none';
  panel.style.height     = '';
  panel.style.overflow   = '';
  panel.style.flex       = '';
}

/* ── Last Game stats ─────────────────────────────────────────────
   Finds the most recent completed game for the selected team,
   fetches the full boxscore, and renders hitting + pitching for both teams. */

async function fetchLastGameStats(teamId) {
  // Search back up to 10 days for most recent Final game
  let gamePk = null, homeTeamName = '', awayTeamName = '', homeId = 0;

  for (let offset = 0; offset >= -10 && !gamePk; offset--) {
    const dateStr = getLocalDateStr(offset);
    const sData   = await fetchJSON(`${STATS_API}/schedule?sportId=1&date=${dateStr}&teamId=${teamId}&gameType=R`);
    const game    = sData.dates?.[0]?.games?.find(g => g.status.abstractGameState === 'Final');
    if (game) {
      gamePk       = game.gamePk;
      homeTeamName = game.teams.home.team.name;
      awayTeamName = game.teams.away.team.name;
      homeId       = game.teams.home.team.id;
    }
  }

  if (!gamePk) {
    const wrap = document.getElementById('statsTableWrap');
    if (wrap) wrap.innerHTML = '<div class="stats-loading">No recent games found</div>';
    return;
  }

  const box    = await fetchJSON(`${STATS_API}/game/${gamePk}/boxscore`);
  const homeAbbr = box.teams.home.team.abbreviation ?? box.teams.home.team.name.split(' ').pop();
  const awayAbbr = box.teams.away.team.abbreviation ?? box.teams.away.team.name.split(' ').pop();
  const homeR  = box.teams.home.teamStats?.batting?.runs ?? 0;
  const awayR  = box.teams.away.teamStats?.batting?.runs ?? 0;

  function extractPlayers(side) {
    const players  = box.teams[side].players ?? {};
    const batters  = box.teams[side].battingOrder ?? Object.keys(players);
    const pitchers = box.teams[side].pitchers ?? [];
    return { players, batters, pitchers };
  }

  function buildHitters(side) {
    const { players, batters } = extractPlayers(side);
    return batters.map(pid => {
      const p  = players[`ID${pid}`] ?? {};
      const s  = p.stats?.batting ?? {};
      const pos = p.position?.abbreviation ?? '';
      return { name: p.person?.fullName ?? '—', pos, ...s };
    }).filter(r => r.atBats > 0 || r.walks > 0 || r.hitByPitch > 0);
  }

  function buildPitchers(side) {
    const { players, pitchers } = extractPlayers(side);
    return pitchers.map(pid => {
      const p = players[`ID${pid}`] ?? {};
      const s = p.stats?.pitching ?? {};
      return { name: p.person?.fullName ?? '—', pos: 'P', ...s };
    }).filter(r => r.inningsPitched && parseFloat(r.inningsPitched) > 0);
  }

  _statsData.lastgame = {
    gamePk,
    score:   `${awayAbbr} ${awayR} – ${homeR} ${homeAbbr}`,
    home:    { abbr: homeAbbr, name: homeTeamName, hitters: buildHitters('home'), pitchers: buildPitchers('home') },
    away:    { abbr: awayAbbr, name: awayTeamName, hitters: buildHitters('away'), pitchers: buildPitchers('away') },
  };

  renderLastGame();
}

let _lgSelectedSide = 'away'; // 'away' | 'home'

function lgStatTable(players, cols, emptyColspan) {
  const thead = cols.map(c => `<th>${c.label}</th>`).join('');
  const rows = players.map(r =>
    '<tr>' + cols.map(c =>
      c.key === 'name'
        ? `<td>${r.name}</td>`
        : `<td class="stat-num">${r[c.key] ?? 0}</td>`
    ).join('') + '</tr>'
  ).join('');
  const body = rows || `<tr><td colspan="${emptyColspan}" class="stats-loading">No data</td></tr>`;
  return `<table class="stats-table"><thead><tr>${thead}</tr></thead><tbody>${body}</tbody></table>`;
}

function lgTeamContentHTML(team) {
  return `
    <div class="lg-team-name">${team.name}</div>
    <div class="lg-section-label">Batting</div>
    ${lgStatTable(team.hitters, LAST_GAME_HITTING_COLS, LAST_GAME_HITTING_COLS.length)}
    <div class="lg-section-label">Pitching</div>
    ${lgStatTable(team.pitchers, LAST_GAME_PITCHING_COLS, LAST_GAME_PITCHING_COLS.length)}`;
}

function renderLastGame() {
  const data = _statsData.lastgame;
  const wrap = document.getElementById('statsTableWrap');
  if (!wrap || !data) return;

  wrap.innerHTML = `
    <div class="lg-score">${data.score}</div>
    <div class="lg-team-picker">
      <button class="lg-team-btn ${_lgSelectedSide === 'away' ? 'active' : ''}"
        onclick="selectLgSide('away')">${data.away.abbr}</button>
      <button class="lg-team-btn ${_lgSelectedSide === 'home' ? 'active' : ''}"
        onclick="selectLgSide('home')">${data.home.abbr}</button>
    </div>
    <div id="lgTeamContent">${lgTeamContentHTML(data[_lgSelectedSide])}</div>`;

  wrap.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 200, fill: 'forwards' });
}

function selectLgSide(side) {
  if (side === _lgSelectedSide) return;
  _lgSelectedSide = side;

  const data = _statsData.lastgame;
  if (!data) return;

  document.querySelectorAll('.lg-team-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === data[side].abbr);
  });

  const content = document.getElementById('lgTeamContent');
  if (!content) return;

  content.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 150, fill: 'forwards' }).finished.then(() => {
    content.innerHTML = lgTeamContentHTML(data[side]);
    content.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 200, fill: 'forwards' });
  });
}

/* ── Easter egg: type "wilmyers" anywhere to trigger ──────────── */
(() => {
  const SECRET = 'wilmyers';
  const SECRET_LEN = SECRET.length;
  let buffer = '';

  document.addEventListener('keydown', e => {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    /* Single-char keys only — ignore Shift, Meta, ArrowLeft, etc. */
    if (e.key.length !== 1) return;

    buffer = (buffer + e.key.toLowerCase()).slice(-SECRET_LEN);
    if (buffer === SECRET) {
      buffer = '';
      triggerWilmyers();
    }
  });

  function triggerWilmyers() {
    if (document.getElementById('wilmyers-overlay')) return;

    const overlay = document.createElement('div');
    overlay.id = 'wilmyers-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#000;opacity:0;transition:opacity 2s ease;cursor:pointer';

    const video = document.createElement('video');
    video.src = '/data/wilmyers.mp4';
    video.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover';
    video.volume = 0;
    video.autoplay = true;
    video.playsInline = true;

    overlay.appendChild(video);
    document.body.appendChild(overlay);

    /* Fade overlay in + ramp audio up over 2s */
    requestAnimationFrame(() => requestAnimationFrame(() => {
      overlay.style.opacity = '1';
      let step = 0;
      const steps = 40, interval = 2000 / steps;
      const fadeIn = setInterval(() => {
        video.volume = Math.min(1, ++step / steps);
        if (step >= steps) clearInterval(fadeIn);
      }, interval);
    }));

    const fadeOut = () => {
      video.removeEventListener('ended', fadeOut);
      overlay.removeEventListener('click', fadeOut);

      let step = 0;
      const steps = 40, interval = 2000 / steps;
      const ramp = setInterval(() => {
        video.volume = Math.max(0, 1 - (++step / steps));
        if (step >= steps) clearInterval(ramp);
      }, interval);

      overlay.style.opacity = '0';
      setTimeout(() => { video.pause(); overlay.remove(); }, 2000);
    };

    video.addEventListener('ended', fadeOut);
    overlay.addEventListener('click', fadeOut);
  }
})();
</script>
