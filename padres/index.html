<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/data/favicon/padres/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/data/favicon/padres/favicon.svg" />
<link rel="shortcut icon" href="/data/favicon/padres/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/data/favicon/padres/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="ideo.zip" />
<link rel="manifest" href="/data/favicon/padres/site.webmanifest" />
<title>Padres Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@800&family=IBM+Plex+Mono:wght@400;700&display=swap');

  @font-face {
    font-family: 'RTDyansBasic';
    src: url('/fonts/RTDyansBasic.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  :root {
    --brown: #2D1A0E;
    --brown-mid: #4A2C17;
    --gold: #C8922A;
    --gold-bright: #E8B84B;
    --gold-pale: #F5D98A;
    --cream: #F5EDD8;
    --cream-muted: rgba(245,237,216,0.5);
    --yes: #7EB648;
    --no: #C0392B;
    --live: #E8B84B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 150%; }

  body {
    background: var(--brown);
    color: var(--cream);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.67rem 1.33rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(-50deg, transparent, transparent 55px, rgba(200,146,42,0.06) 55px, rgba(200,146,42,0.06) 57px);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(200,146,42,0.1) 0%, transparent 60%);
    pointer-events: none;
  }

  .header { text-align: center; margin-bottom: 1.6rem; position: relative; z-index: 1; animation: fadeUp 0.4s ease both; }
  .header-eyebrow { font-family: 'RTDyansBasic', sans-serif; font-size: 0.8rem; letter-spacing: 0.2rem; color: var(--gold-bright); margin-bottom: 0.18rem; }
  .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.27rem; letter-spacing: 0.33rem; line-height: 1; color: var(--cream); }
  .header-date { font-size: 0.49rem; letter-spacing: 0.2rem; color: var(--cream-muted); margin-top: 0.44rem; }
  .header-divider { width: 2.67rem; height: 2px; background: var(--gold); margin: 0.62rem auto 0; }

  .grid {
    display: grid; grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0.71rem; width: 100%; max-width: 73.33rem;
    position: relative; z-index: 1; animation: fadeUp 0.5s ease 0.1s both;
  }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  @media (max-width: 520px)  { .grid { grid-template-columns: 1fr; } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(1.07rem); } to { opacity:1; transform:translateY(0); } }

  .matchup-line { font-size: 0.44rem; letter-spacing: 0.09rem; color: var(--cream-muted); margin-top: 0.4rem; text-align: center; position: relative; z-index: 1; }

  .promo-heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.25rem;
    color: var(--gold-bright);
    text-align: center;
    width: 100%;
    max-width: 73.33rem;
    position: relative;
    z-index: 1;
    margin: 1.4rem 0 0.8rem;
    animation: fadeUp 0.5s ease 0.15s both;
  }

  .section-divider {
    width: 100%; max-width: 73.33rem; margin: 1.8rem 0 1.2rem;
    position: relative; z-index: 1; display: flex; align-items: center; gap: 0.8rem;
    animation: fadeUp 0.5s ease 0.2s both;
  }
  .section-divider-line { flex: 1; height: 1px; background: rgba(200,146,42,0.25); }
  .section-divider-label { font-family: 'Bebas Neue', sans-serif; font-size: 0.6rem; letter-spacing: 0.4rem; color: var(--gold-bright); white-space: nowrap; }

  .nlwest-panel {
    width: 100%; background: var(--brown-mid);
    border: 2px solid var(--gold); border-radius: 6px;
    position: relative; z-index: 1; overflow: hidden;
    animation: fadeUp 0.5s ease 0.25s both; margin-bottom: 1.6rem;
    flex: 1;
  }
  .panel-corner { position: absolute; width: 0.53rem; height: 0.53rem; border-color: var(--gold-bright); border-style: solid; }
  .panel-corner.tl { top:.31rem; left:.31rem;   border-width:1.5px 0 0 1.5px; }
  .panel-corner.tr { top:.31rem; right:.31rem;  border-width:1.5px 1.5px 0 0; }
  .panel-corner.bl { bottom:.31rem; left:.31rem;  border-width:0 0 1.5px 1.5px; }
  .panel-corner.br { bottom:.31rem; right:.31rem; border-width:0 1.5px 1.5px 0; }

  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table thead tr { border-bottom: 1px solid rgba(200,146,42,0.3); }
  .standings-table th { font-size: 0.5rem; letter-spacing: 0.15rem; color: var(--cream-muted); text-transform: uppercase; padding: 0.35rem 0.8rem; text-align: left; font-weight: 400; border-right: 1px solid rgba(200,146,42,0.25); }
  .standings-table th:last-child { border-right: none; }
  .standings-table th.num { text-align: center; }
  .standings-table tbody tr { border-bottom: 1px solid rgba(200,146,42,0.1); transition: background 0.15s; }
  .standings-table tbody tr:last-child { border-bottom: none; }
  .standings-table tbody tr:hover { background: rgba(200,146,42,0.05); }
  .standings-table tbody tr.padres-row { background: rgba(200,146,42,0.07); }
  .standings-table td { padding: 0.3rem 0.8rem; vertical-align: middle; border-right: 1px solid rgba(200,146,42,0.15); }
  .standings-table td:last-child { border-right: none; }
  .standings-table td.num { text-align: center; }

  .rank-num { font-family:'Bebas Neue',sans-serif; font-size:0.6rem; color:var(--cream-muted); width:1.2rem; text-align:center; }
  .team-name-cell { display:flex; align-items:center; gap:0.5rem; }
  .team-abbr { font-family:'Bebas Neue',sans-serif; font-size:0.9rem; letter-spacing:0.05rem; color:var(--cream); min-width:2.2rem; }
  .team-abbr.padres { color: var(--gold-bright); }
  .team-full { font-size:0.62rem; color:var(--cream); letter-spacing:0.03rem; white-space:nowrap; }
  .record { font-size:0.65rem; color:var(--cream); }
  .gb  { font-size:0.65rem; color:var(--cream); }
  .pct { font-size:0.65rem; color:var(--cream); }

  .next-game-cell { text-align:right; width:28%; padding:0.3rem 1.4rem 0.3rem 0; }
  .game-live { display:inline-flex; align-items:center; gap:0.3rem; }
  .live-dot { display:inline-block; width:0.31rem; height:0.31rem; background:var(--live); border-radius:50%; animation:pulse 1.2s ease-in-out infinite; flex-shrink:0; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.65)} }

  /* Score line: ABB R – R ABB */
  .game-scoreline { font-family:'Bebas Neue',sans-serif; font-size:0.72rem; color:var(--gold-bright); letter-spacing:0.06rem; }
  .game-scoreline.final-w { color: var(--yes); }
  .game-scoreline.final-l { color: var(--no); }

  .game-sub { font-size:0.5rem; color:rgba(245,237,216,0.75); letter-spacing:0.04rem; margin-top:0.1rem; }
  .game-time { font-size:0.56rem; color:var(--cream); letter-spacing:0.04rem; }
  .no-game   { font-size:0.38rem; color:rgba(245,237,216,0.25); letter-spacing:0.04rem; }

  /* Promo cards */
  .card { background:var(--brown-mid); border:2px solid var(--gold); border-radius:6px; padding:0.82rem 1.07rem 0.72rem; display:flex; flex-direction:column; align-items:center; text-align:center; position:relative; gap:0.35rem; }
  .card-corner { position:absolute; width:0.53rem; height:0.53rem; border-color:var(--gold-bright); border-style:solid; }
  .card-corner.tl{top:.31rem;left:.31rem;border-width:1.5px 0 0 1.5px}
  .card-corner.tr{top:.31rem;right:.31rem;border-width:1.5px 1.5px 0 0}
  .card-corner.bl{bottom:.31rem;left:.31rem;border-width:0 0 1.5px 1.5px}
  .card-corner.br{bottom:.31rem;right:.31rem;border-width:0 1.5px 1.5px 0}
  .card-brand-block{display:flex;flex-direction:column;align-items:center;gap:0.12rem}
  .card-icon{font-size:1.3rem;line-height:1}
  .card-brand{font-family:'Bebas Neue',sans-serif;font-size:0.7rem;letter-spacing:0.18rem;color:var(--gold-bright)}
  .card-trigger-label{font-size:0.4rem;letter-spacing:0.2rem;color:var(--cream-muted);text-transform:uppercase}
  .card-trigger{font-family:'Bebas Neue',sans-serif;font-size:0.89rem;letter-spacing:0.09rem;color:var(--cream);line-height:1.2}
  .card-divider{width:100%;height:1px;background:rgba(200,146,42,0.2)}
  .result-area{width:100%;padding:0.53rem 0.62rem;border-radius:4px;display:flex;flex-direction:column;align-items:center;gap:0.15rem}
  .result-area.yes    {background:rgba(126,182,72,0.12);border:1px solid var(--yes)}
  .result-area.no     {background:rgba(192,57,43,0.12);border:1px solid var(--no)}
  .result-area.live   {background:rgba(232,184,75,0.08);border:1px solid var(--live)}
  .result-area.nogame {background:rgba(200,146,42,0.08);border:1px solid var(--gold)}
  .result-area.loading{background:transparent;border:1px solid rgba(200,146,42,0.2)}
  .result-stat      {font-family:'Bebas Neue',sans-serif;font-size:1.65rem;line-height:1;color:var(--gold-bright)}
  .result-stat-label{font-size:0.4rem;letter-spacing:0.2rem;color:var(--cream-muted);text-transform:uppercase}
  .result-game-label{font-family:'Bebas Neue',sans-serif;font-size:1.65rem;line-height:1;color:var(--gold-bright);word-break:break-word}
  .result-verdict{font-family:'Bebas Neue',sans-serif;font-size:0.88rem;letter-spacing:0.09rem;line-height:1}
  .result-verdict.yes   {color:var(--yes)}
  .result-verdict.no    {color:var(--no)}
  .result-verdict.live  {color:var(--live);font-size:0.65rem}
  .result-verdict.nogame{color:var(--gold-pale);font-size:0.53rem}
  .result-sub{font-size:0.44rem;letter-spacing:0.07rem;color:var(--cream-muted)}
  .result-sub span{color:var(--cream);font-weight:700}
  .card-reward{font-size:0.44rem;letter-spacing:0.04rem;color:var(--cream-muted);line-height:1.3}
  .card-reward a{color:var(--gold-bright);text-decoration:none}
  .card-reward a:hover{text-decoration:underline}
  .loading-blink{font-size:0.53rem;letter-spacing:0.2rem;color:var(--gold-bright);animation:blink 0.9s step-end infinite;padding:0.35rem 0}
  @keyframes blink{50%{opacity:0}}
</style>
</head>
<body>

<style>
  .top-bar {
    width: 100%;
    max-width: 73.33rem;
    display: flex;
    align-items: center;
    padding-bottom: 0.6rem;
    position: relative;
    z-index: 10;
  }
  .home-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    background: none;
    border: 1px solid rgba(200,146,42,0.4);
    color: var(--gold-bright);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.4rem;
    letter-spacing: 0.15rem;
    padding: 0.35rem 0.65rem;
    border-radius: 3px;
    text-decoration: none;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .home-btn:hover {
    background: rgba(200,146,42,0.1);
    border-color: var(--gold-bright);
  }

  /* ── Mobile standings ── */
  @media (max-width: 600px) {
    .gp-body { justify-content: center; }
    .team-full { display: none; }
    .standings-table th.hide-mobile,
    .standings-table td.hide-mobile { display: none; }
    .standings-table th { font-size: 0.32rem; padding: 0.5rem 0.4rem; }
    .standings-table td { padding: 0.45rem 0.4rem; }
    .team-abbr { font-size: 0.75rem; min-width: unset; }
    .team-name-cell { gap: 0; }
    .team-th { width: auto !important; }
    .rank-num  { font-size: 0.5rem; }
    .record    { font-size: 0.58rem; }
    .pct       { font-size: 0.52rem; }
    .gb        { font-size: 0.52rem; }
    .game-scoreline { font-size: 0.55rem; }
    .game-sub       { font-size: 0.42rem; }
    .game-time      { font-size: 0.48rem; }
    .next-game-cell { min-width: unset; padding-right: 0.5rem; }
  }
</style>

</div>

<div class="bottom-row">

      <div class="gpc tl"></div><div class="gpc tr"></div>

  <div class="bottom-right">
    <div class="bottom-label">NL West Standings</div>

  <table class="standings-table">
    <thead>
      <tr>
        <th class="team-th" style="width:35%">Team</th>

    </thead>
    <tbody id="standingsBody">

<style>
  .bottom-row {
    display: flex;
    align-items: stretch;
    gap: 1rem;
    width: 100%;
    max-width: 73.33rem;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease 0.2s both;
    margin-bottom: 0;
    justify-content: center;
  }
  .bottom-left  { display: flex; flex-direction: column; flex-shrink: 0; flex: 1; min-width: 0; }
  .bottom-right { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .bottom-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 0.6rem; letter-spacing: 0.4rem;
    color: var(--gold-bright); white-space: nowrap;
    margin-bottom: 0.6rem; text-align: center;
    text-transform: uppercase;
  }
  /* CSS: narrow screens OR touch/pointer devices (phones/tablets) */
  @media (max-width: 700px), (pointer: coarse) and (max-width: 1024px) {
    .bottom-row { flex-direction: column; }
    .bottom-left, .bottom-right { width: 100%; }
    .gp-left, .gp-right { display: none !important; }
    .gp-mid { flex: 1 !important; padding: 0.6rem !important; }
  }
  /* JS-applied class for phones detected via userAgent */
  body.is-phone .gp-left,
  body.is-phone .gp-right { display: none !important; }
  body.is-phone .gp-mid { flex: 1 !important; padding: 0.6rem !important; }
  body.is-phone .bottom-row { flex-direction: column; }
  body.is-phone .bottom-left,
  body.is-phone .bottom-right { width: 100%; }

  /* ── Game Panel ── */
  .game-panel {
    background: var(--brown-mid);
    border: 2px solid var(--gold); border-radius: 6px;
    padding: 0.5rem 1rem 0.9rem;
    position: relative;
    width: 100%;
    flex: 1;
    margin-bottom: 1.6rem;
    display: flex;
    flex-direction: column;
  }
  @media (max-width: 700px) { .game-panel { width: 100%; } }

  .gpc { position: absolute; width: 0.53rem; height: 0.53rem; border-color: var(--gold-bright); border-style: solid; }
  .gpc.tl{top:.31rem;left:.31rem;border-width:1.5px 0 0 1.5px}
  .gpc.tr{top:.31rem;right:.31rem;border-width:1.5px 1.5px 0 0}
  .gpc.bl{bottom:.31rem;left:.31rem;border-width:0 0 1.5px 1.5px}
  .gpc.br{bottom:.31rem;right:.31rem;border-width:0 1.5px 1.5px 0}

  /* ── Game panel inner layout ── */
  .gp-body { display:flex; gap:0; align-items:stretch; flex:1; }

  /* Three equal columns */
  .gp-left, .gp-mid, .gp-right { flex:1; min-width:0; display:flex; flex-direction:column; }
  .gp-left  { border-right:1px solid rgba(200,146,42,0.2); padding-right:0.7rem; }
  .gp-mid   { align-items:center; padding:0 0.6rem; }
  .gp-right { border-left:1px solid rgba(200,146,42,0.2); padding-left:0.7rem; text-align:right; }

  .gp-team-header { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:0.08rem; line-height:1; margin-bottom:0.35rem; }
  .gp-team-header.padres { color:var(--gold-bright); }
  .gp-team-header.opp    { color:var(--cream); }
  .gp-team-score { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; line-height:1; color:var(--cream); }
  .gp-team-topline { display:flex; align-items:baseline; gap:0.45rem; margin-bottom:0.35rem; }
  .gp-right .gp-team-topline { justify-content:flex-end; }

  /* Lineup — bigger and full cream */
  .gp-lineup { list-style:none; flex:0; }
  .gp-lineup li { font-size:0.6rem; line-height:1.7; color:var(--cream); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .gp-lineup li.current-batter { color:var(--gold-bright); font-weight:700; }
  .gp-lineup li .order-num { color:rgba(200,146,42,0.5); font-size:0.45rem; margin-right:0.2rem; }
  .gp-right .gp-lineup li .order-num { margin-right:0; margin-left:0.2rem; }
  .gp-lineup li .pos-tag { font-size:0.4rem; color:rgba(200,146,42,0.55); margin-left:0.2rem; }
  .gp-lineup li .sub-mark { font-size:0.38rem; color:var(--yes); margin-left:0.15rem; vertical-align:super; }
  /* Shared pos-tag style for use outside lineup (e.g. pitcher footer) */
  .pos-tag { font-family:'IBM Plex Mono',monospace; font-size:0.4rem; color:rgba(200,146,42,0.55); }

  /* Middle status */
  .gp-inning-block { text-align:center; margin-bottom:0.3rem; }
  .gp-half-arrow  { font-size:0.55rem; color:var(--gold-bright); line-height:1; }
  .gp-inning-num  { font-family:'Bebas Neue',sans-serif; font-size:1.0rem; color:var(--cream); line-height:1; letter-spacing:0.05rem; }
  .gp-inning-word { font-size:0.33rem; letter-spacing:0.18rem; color:var(--cream-muted); text-transform:uppercase; }

  .gp-live-badge { display:flex; align-items:center; gap:0.2rem; font-size:0.38rem; letter-spacing:0.12rem; color:var(--gold-bright); margin-bottom:0.1rem; justify-content:center; }
  .gp-warmup-badge { display:flex; align-items:center; gap:0.2rem; font-size:0.38rem; letter-spacing:0.12rem; color:var(--cream-muted); margin-bottom:0.1rem; justify-content:center; }

  .gp-divider { height:1px; background:rgba(200,146,42,0.2); margin:0.2rem 0; width:100%; }

  /* Diamond SVG */
  .gp-diamond { flex-shrink:0; margin:0; }
  .gp-diamond svg { display:block; }
  .base { display:none; } /* bases handled by SVG now */
  .base-line { display:none; }

  /* Outs */
  .gp-outs-col { display:flex; flex-direction:column; align-items:center; gap:0.2rem; margin-top:-0.9rem; margin-bottom:0.35rem; }
  .gp-outs-label { font-size:0.33rem; letter-spacing:0.18rem; color:var(--cream-muted); text-transform:uppercase; padding-left:0.3rem; }
  .outs-pips { display:flex; gap:0.25rem; }
  .out-pip { width:0.55rem; height:0.55rem; border-radius:50%; border:1.5px solid rgba(200,146,42,0.75); background:transparent; transition:background 0.2s; }
  .out-pip.on { background:var(--no); border-color:var(--no); box-shadow:0 0 0 1.5px #000; }

  /* Score display in center column */
  .gp-center-score {
    display:flex; align-items:baseline; justify-content:center;
    gap:0.5rem; margin-top:0.15rem;
  }
  .gp-center-team {
    font-family:'Bebas Neue',sans-serif; font-size:1.6rem;
    letter-spacing:0.05rem; line-height:1;
  }
  .gp-center-team.padres { color:var(--gold-bright); }
  .gp-center-team.opp    { color:var(--cream); }
  .gp-center-runs {

  .gp-pitcher-name .pos-tag { font-family:'IBM Plex Mono',monospace; font-size:0.4rem; color:rgba(200,146,42,0.55); margin-left:0.2rem; }
  .gp-right .gp-pitcher-name .pos-tag { margin-left:0; margin-right:0.2rem; }
  .gp-pitcher-stat  { font-size:0.45rem; color:var(--cream-muted); }
  .gp-right .gp-pitcher-footer { text-align:right; }

  /* next game */
  .gp-next { text-align:center; padding:0.8rem 0; width:100%; }
  .gp-next-label { font-size:0.4rem; letter-spacing:0.2rem; color:var(--cream-muted); text-transform:uppercase; margin-bottom:0.5rem; }
  .gp-next-teams { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:0.1rem; color:var(--cream); margin-bottom:0.25rem; }
  .gp-next-time  { font-family:'Bebas Neue',sans-serif; font-size:0.85rem; color:var(--gold-bright); letter-spacing:0.08rem; }
  .gp-next-date  { font-size:0.42rem; color:var(--cream-muted); letter-spacing:0.1rem; margin-top:0.2rem; }
  .gp-loading    { font-size:0.44rem; letter-spacing:0.2rem; color:var(--gold-bright); animation:blink 0.9s step-end infinite; text-align:center; padding:0.8rem 0; }
</style>
<script>
const PADRES_ID = 135;

/* NL West — stable MLB team IDs + abbreviations (no API needed) */
const NL_WEST = [
  { id: 119, abbr: 'LAD', name: 'Los Angeles Dodgers'  },
  { id: 135, abbr: 'SD',  name: 'San Diego Padres'     },
  { id: 109, abbr: 'AZ',  name: 'Arizona Diamondbacks' },
  { id: 137, abbr: 'SF',  name: 'San Francisco Giants' },
  { id: 115, abbr: 'COL', name: 'Colorado Rockies'     },
];

/* Master ID → abbreviation map, seeded with all 30 teams we know */
const ID_TO_ABBR = {
  108:'LAA', 109:'AZ',  110:'BAL', 111:'BOS', 112:'CHC',
  113:'CIN', 114:'CLE', 115:'COL', 116:'DET', 117:'HOU',
  118:'KC',  119:'LAD', 120:'WSH', 121:'NYM', 133:'ATH',
  134:'PIT', 135:'SD',  136:'SEA', 137:'SF',  138:'STL',
  139:'TB',  140:'TEX', 141:'TOR', 142:'MIN', 143:'PHI',
  144:'ATL', 145:'CWS', 146:'MIA', 158:'MIL', 137:'SF',
};

const NL_WEST_IDS = new Set(NL_WEST.map(t => t.id));

const PROMOS = [
  {
    id:'strikeouts', icon:'🐾', brand:'Petco',
    trigger:'K-9 or more strikeouts',
    reward:'25% off your total purchase at participating Petco locations with loyalty membership. Ask for "Padres K-9 Promotion" at checkout.',
    rewardLink:{ text:'Petco.com/PadresK9', href:'https://www.petco.com/PadresK-9' },
    stat:(box,side)=>{
      const ps=box.teams[side].teamStats?.pitching;
      if(ps?.strikeOuts!==undefined) return{value:ps.strikeOuts,label:'Strikeouts'};
      const pitchers=box.teams[side].pitchers||[],players=box.teams[side].players;
      let k=0; for(const pid of pitchers) k+=players[`ID${pid}`]?.stats?.pitching?.strikeOuts??0;
      return{value:k,label:'Strikeouts'};
    },
    check:v=>v>=9, liveMsg:v=>v>=9?'Already achieved':`Need ${9-v} more`,
  },
  {
    id:'homerun', icon:'🍔', brand:'Jack in the Box',
    trigger:'Any Padres home run',
    reward:'Free Jumbo Jack with large drink purchase the day after. San Diego Jack in the Box locations or Jack App with code GOPADRES26.',
    stat:(box,side)=>{
      const batters=box.teams[side].batters||[],players=box.teams[side].players;
      let hrs=0; for(const pid of batters) hrs+=players[`ID${pid}`]?.stats?.batting?.homeRuns??0;
      return{value:hrs,label:'Home Runs'};
    },
    check:v=>v>=1, liveMsg:v=>v>=1?'Already hit one!':'None yet',
  },
  {
    id:'win', icon:'🍟', brand:"McDonald's",
    trigger:'Padres win',
    reward:"Free medium fries with $2 purchase the day after a Padres win. Only on the app at participating McDonald's locations.",
    stat:(box,side,isWin)=>({value:isWin?1:0,label:isWin?'Win':'Loss'}),
    check:v=>v===1,
    liveMsg:(v,score)=>score.padres>score.opp?'Currently winning':score.padres<score.opp?'Currently losing':'Tied',
    isWinCard:true,
  },
  {
    id:'stolenbase', icon:'🛵', brand:'Uber Eats',
    trigger:'Any Padres stolen base',
    reward:'Look out for a special Uber Eats code for a deal on contactless delivery for restaurant takeout, groceries and more.',
    stat:(box,side)=>{
      const bs=box.teams[side].teamStats?.batting;
      if(bs?.stolenBases!==undefined) return{value:bs.stolenBases,label:'Stolen Bases'};
      const batters=box.teams[side].batters||[],players=box.teams[side].players;
      let sb=0; for(const pid of batters) sb+=players[`ID${pid}`]?.stats?.batting?.stolenBases??0;
      return{value:sb,label:'Stolen Bases'};
    },
    check:v=>v>=1, liveMsg:v=>v>=1?'Already stolen one!':'None yet',
  },
];

function getLocalDateStr(offset=0){
  const d=new Date(); d.setDate(d.getDate()+offset);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDisplayDate(s){
  const [y,m,day]=s.split('-');
  return `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]} ${parseInt(day)}, ${y}`;
}

/* Pull abbreviation from every possible location in a game object team node */
function extractAbbr(teamNode, fallbackId) {
  return teamNode?.team?.abbreviation
    || teamNode?.abbreviation
    || ID_TO_ABBR[fallbackId]
    || '???';
}

function cardHTML(promo, state){
  const corners=`<div class="card-corner tl"></div><div class="card-corner tr"></div><div class="card-corner bl"></div><div class="card-corner br"></div>`;
  let resultHTML='';
  if(state.status==='loading'){
    resultHTML=`<div class="result-area loading"><div class="loading-blink">Loading ▋</div></div>`;
  } else if(state.status==='nogame'){
    resultHTML=`<div class="result-area nogame"><div class="result-verdict nogame">No game</div><div class="result-sub">Padres had the day off</div></div>`;
  } else {
    const achieved=promo.check(state.value,state);
    const cls=state.status==='live'?'live':(achieved?'yes':'no');
    let verdictText,subText,topContent;
    if(state.status==='live'){
      verdictText=promo.isWinCard?promo.liveMsg(state.value,state.score):(achieved?'Yes ✓':'In Progress');
      subText=`<span>${promo.liveMsg?promo.liveMsg(state.value,state.score):''}</span>`;
      topContent=promo.isWinCard
        ?`<div class="result-game-label">${state.score.padres>state.score.opp?'Padres Lead!':state.score.padres<state.score.opp?'Padres Trail':'Tied Game'}</div>`
        :`<div class="result-stat">${state.value}</div><div class="result-stat-label">${state.label}</div>`;
    } else {
      verdictText=achieved?'Yes ✓':'No ✗';
      subText=achieved?'<span>Promo active today!</span>':'<span>No promo today</span>';
      topContent=promo.isWinCard
        ?`<div class="result-game-label">${achieved?'Padres Won!':'Padres Lost :('}</div><div class="result-stat-label">${achieved?'Free Fries! 🍟':'No Free Fries for You'}</div>`
        :`<div class="result-stat">${state.value}</div><div class="result-stat-label">${state.label}</div>`;
    }
    const liveDot=state.status==='live'?`<span class="live-dot" style="margin-right:.22rem;vertical-align:middle;position:relative;top:-.04rem"></span>`:'';
    resultHTML=`<div class="result-area ${cls}">${topContent}<div class="result-verdict ${cls}">${liveDot}${verdictText}</div><div class="result-sub">${subText}</div></div>`;
  }
  const rewardLink=promo.rewardLink?` <a href="${promo.rewardLink.href}" target="_blank">${promo.rewardLink.text}</a>`:'';
  return `<div class="card">${corners}<div class="card-brand-block"><div class="card-icon">${promo.icon}</div><div class="card-brand">${promo.brand}</div></div><div class="card-trigger-label">Promo triggers on</div><div class="card-trigger">${promo.trigger}</div><div class="card-divider"></div>${resultHTML}<div class="card-reward">${promo.reward}${rewardLink}</div></div>`;
}

async function fetchNLWest(){
  const todayStr=getLocalDateStr(0);

  const [standRes, schedRes] = await Promise.all([
    fetch('https://statsapi.mlb.com/api/v1/standings?leagueId=104&season=2026&standingsTypes=regularSeason'),
    fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${todayStr}&gameType=R&hydrate=linescore`)
  ]);
  const standData=await standRes.json();
  const schedData=await schedRes.json();

  /* W/L map by team ID */
  const wlMap={};
  for(const record of standData.records||[]){
    for(const tr of record.teamRecords||[]){
      const l10 = tr.records?.splitRecords?.find(s=>s.type==='lastTen');
      wlMap[tr.team.id]={w:tr.wins, l:tr.losses, l10w: l10?.wins??'-', l10l: l10?.losses??'-'};
    }
  }

  /* Enrich ID_TO_ABBR with whatever the API returns */
  for(const dateObj of schedData.dates||[]){
    for(const g of dateObj.games||[]){
      const hId=g.teams?.home?.team?.id, hAbbr=g.teams?.home?.team?.abbreviation;
      const aId=g.teams?.away?.team?.id, aAbbr=g.teams?.away?.team?.abbreviation;
      if(hId && hAbbr) ID_TO_ABBR[hId]=hAbbr;
      if(aId && aAbbr) ID_TO_ABBR[aId]=aAbbr;
    }
  }

  /* Build today-game map keyed by NL West team ID */
  const todayGames={};
  for(const dateObj of schedData.dates||[]){
    for(const g of dateObj.games||[]){
      const homeId=g.teams?.home?.team?.id;
      const awayId=g.teams?.away?.team?.id;
      if(!NL_WEST_IDS.has(homeId) && !NL_WEST_IDS.has(awayId)) continue;

      const state=g.status?.abstractGameState;
      const startUTC=new Date(g.gameDate);
      const localTime=startUTC.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'});

      /* Scores — try multiple paths */
      const homeRuns = g.teams?.home?.score ?? g.linescore?.teams?.home?.runs ?? 0;
      const awayRuns = g.teams?.away?.score ?? g.linescore?.teams?.away?.runs ?? 0;

      const inning=g.linescore?.currentInning??null;
      const half=g.linescore?.inningHalf??null;

      /* Abbreviations — use enriched map, fall back to hardcoded */
      const homeAbbr = g.teams?.home?.team?.abbreviation || ID_TO_ABBR[homeId] || '???';
      const awayAbbr = g.teams?.away?.team?.abbreviation || ID_TO_ABBR[awayId] || '???';

      const info={state,detailedState:g.status?.detailedState??'',localTime,homeId,awayId,homeRuns,awayRuns,inning,half,homeAbbr,awayAbbr};
      if(NL_WEST_IDS.has(homeId)) todayGames[homeId]=info;
      if(NL_WEST_IDS.has(awayId)) todayGames[awayId]=info;
    }
  }

  /* Sort NL West */
  const sorted=[...NL_WEST].sort((a,b)=>{
    const wa=wlMap[a.id]?.w??0, wb=wlMap[b.id]?.w??0;
    const la=wlMap[a.id]?.l??0, lb=wlMap[b.id]?.l??0;
    return wb!==wa?wb-wa:la-lb;
  });
  const leaderRec=wlMap[sorted[0].id]??{w:0,l:0};

  const suffix=n=>[,'st','nd','rd'][n]||'th';

  let html='';
  sorted.forEach((team,idx)=>{
    const rec=wlMap[team.id]??{w:0,l:0};
    const isPadres=team.id===PADRES_ID;
    const pct=rec.w+rec.l>0?(rec.w/(rec.w+rec.l)).toFixed(3).replace(/^0/,''):'.000';
    let gb='—';
    if(idx>0){
      const n=((leaderRec.w-rec.w)+(rec.l-leaderRec.l))/2;
      gb=n<=0?'—':n%1===0?String(n):n.toFixed(1);
    }

    const g=todayGames[team.id];
    let gameCell=`<div class="no-game">Off day</div>`;

    if(g){
      const isHome  = g.homeId===team.id;
      const myAbbr  = isHome ? g.homeAbbr : g.awayAbbr;
      const oppAbbr = isHome ? g.awayAbbr : g.homeAbbr;
      const myRuns  = isHome ? g.homeRuns : g.awayRuns;
      const oppRuns = isHome ? g.awayRuns : g.homeRuns;
      const vsAt    = isHome ? 'vs' : '@';

      if(g.state==='Live'){
        const isWarmup = g.detailedState.toLowerCase().includes('warm')
                      || (!g.inning && !g.half)
                      || (g.inning === 1 && !g.half);
        const inningStr = isWarmup
          ? 'Warming Up'
          : g.inning ? `${g.half??''} ${g.inning}${suffix(g.inning)}` : 'Live';
        const scoreStr = isWarmup
          ? `${myAbbr} – ${oppAbbr}`
          : `${myAbbr} ${myRuns} – ${oppRuns} ${oppAbbr}`;
        gameCell=`
          <div class="game-live">
            <span class="live-dot"></span>
            <span class="game-scoreline">${scoreStr}</span>
          </div>
          <div class="game-sub">${inningStr}</div>`;
      } else if(g.state==='Final'){
        const won=myRuns>oppRuns;
        const myColor  = won ? 'var(--cream)' : 'var(--no)';
        const oppColor = won ? 'var(--no)'   : 'var(--cream)';
        gameCell=`
          <div class="game-scoreline">
            <span style="color:${myColor}">${myAbbr} ${myRuns}</span>
            <span style="color:var(--cream-muted)"> – </span>
            <span style="color:${oppColor}">${oppRuns} ${oppAbbr}</span>
          </div>
          <div class="game-sub">Final</div>`;
      } else {
        gameCell=`
          <div class="game-time">${g.localTime}</div>
          <div class="game-sub">${vsAt} ${oppAbbr}</div>`;
      }
    }

    html+=`
      <tr class="${isPadres?'padres-row':''}">
        <td>
          <div class="team-name-cell">
            <span class="team-abbr ${isPadres?'padres':''}">${team.abbr}</span>
            <span class="team-full">${team.name}</span>
          </div>
        </td>
        <td class="num"><div class="record">${rec.w}</div></td>
        <td class="num"><div class="record">${rec.l}</div></td>
        <td class="num"><div class="pct">${pct}</div></td>
        <td class="num hide-mobile"><div class="gb">${gb}</div></td>
        <td class="num"><div class="record">${rec.l10w}-${rec.l10l}</div></td>
        <td class="next-game-cell">${gameCell}</td>
      </tr>`;
  });

  document.getElementById('standingsBody').innerHTML=html;
}

async function render(){
  document.getElementById('headerDate').textContent=formatDisplayDate(getLocalDateStr(0));
  document.getElementById('grid').innerHTML=PROMOS.map(p=>cardHTML(p,{status:'loading'})).join('');

  const yesterdayStr=getLocalDateStr(-1);
  const schedRes=await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${yesterdayStr}&teamId=${PADRES_ID}&gameType=R&hydrate=linescore`);
  const schedData=await schedRes.json();

  const game=schedData.dates?.[0]?.games?.find(g=>
    g.status.abstractGameState==='Final'||g.status.abstractGameState==='Live'
  );

  if(!game){
    document.getElementById('grid').innerHTML=PROMOS.map(p=>cardHTML(p,{status:'nogame'})).join('');
    document.getElementById('matchupLine').textContent='';
  } else {
    const isLive=game.status.abstractGameState==='Live';
    const boxRes=await fetch(`https://statsapi.mlb.com/api/v1/game/${game.gamePk}/boxscore`);
    const box=await boxRes.json();
    const homeId=box.teams.home.team.id;
    const padresSide=homeId===PADRES_ID?'home':'away';
    const oppSide=padresSide==='home'?'away':'home';
    const padresRuns=box.teams[padresSide].teamStats?.batting?.runs??0;
    const oppRuns=box.teams[oppSide].teamStats?.batting?.runs??0;
    const isWin=!isLive&&padresRuns>oppRuns;
    const oppName=box.teams[oppSide].team.name;
    const score={padres:padresRuns,opp:oppRuns};
    const status=isLive?'live':'final';

    const awayLabel=padresSide==='away'?'Padres':oppName;
    const homeLabel=padresSide==='home'?'Padres':oppName;
    const awayR=padresSide==='away'?padresRuns:oppRuns;
    const homeR=padresSide==='home'?padresRuns:oppRuns;

    document.getElementById('grid').innerHTML=PROMOS.map(promo=>{
      const{value,label}=promo.stat(box,padresSide,isWin);
      return cardHTML(promo,{status,value,label,isWin,score});
    }).join('');

    document.getElementById('matchupLine').innerHTML=isLive
      ?`<span style="color:var(--gold-bright)">● LIVE &nbsp;—&nbsp; </span>${awayLabel} ${awayR} — ${homeR} ${homeLabel}`
      :`${awayLabel} ${awayR} — ${homeR} ${homeLabel}`;
  }

  // After both panels load, lock both to standingsPanel height
  Promise.all([
    fetchNLWest().catch(err=>{
      document.getElementById('standingsBody').innerHTML=
        `<tr><td colspan="7" style="text-align:center;padding:1rem;color:var(--no);font-size:0.44rem">Error loading standings: ${err.message}</td></tr>`;
    }),
    fetchPadresGame().catch(err=>{
      document.getElementById('gamePanel').innerHTML=
        `<div class="gpc tl"></div><div class="gpc tr"></div><div class="gpc bl"></div><div class="gpc br"></div>
         <div style="text-align:center;padding:0.8rem;color:var(--no);font-size:0.4rem">Error: ${err.message}</div>`;
    })
  ]).then(() => {
    // Small defer to let DOM paint
    requestAnimationFrame(() => {
      const standings = document.querySelector('.nlwest-panel');
      const gamePanel = document.getElementById('gamePanel');
      if (!standings || !gamePanel) return;
      // Use standings height as the fixed height for both
      const h = standings.getBoundingClientRect().height;
      if (h > 0) {
        standings.style.height = h + 'px';
        standings.style.overflowY = 'auto';
        gamePanel.style.height = h + 'px';
        gamePanel.style.overflowY = 'hidden';
      }
    });
  });
}

/* ── Phone detection ── */
(function() {
  const ua = navigator.userAgent || '';
  const isPhone = /Android|webOS|iPhone|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua)
    || (navigator.maxTouchPoints > 1 && window.innerWidth < 1024);
  if (isPhone) document.body.classList.add('is-phone');
})();

render();

/* ── Auto-refresh game panel every 15s when a game is live ── */
let _gamePollInterval = null;

function startGamePolling() {
  if (_gamePollInterval) return; // already running
  _gamePollInterval = setInterval(async () => {
    try {
      const isStillLive = await fetchPadresGame();
      // fetchPadresGame returns true if live, false/undefined if not
      if (!isStillLive) stopGamePolling();
    } catch (e) { /* silent — panel already shows error from fetchPadresGame */ }
  }, 15000);
}

function stopGamePolling() {
  if (_gamePollInterval) { clearInterval(_gamePollInterval); _gamePollInterval = null; }
}

/* ── Padres live game / next game panel ── */
async function fetchPadresGame() {
  const todayStr = getLocalDateStr(0);
  const panel    = document.getElementById('gamePanel');
  const corners  = `<div class="gpc tl"></div><div class="gpc tr"></div><div class="gpc bl"></div><div class="gpc br"></div>`;

  const schedRes  = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${todayStr}&teamId=${PADRES_ID}&gameType=R&hydrate=linescore`);
  const schedData = await schedRes.json();
  const games     = schedData.dates?.[0]?.games ?? [];
  const liveGame  = games.find(g => g.status.abstractGameState === 'Live');

  if (liveGame) {
    startGamePolling(); // kick off or keep polling
    // Fetch live feed + boxscore in parallel
    const [feedRes, boxRes] = await Promise.all([
      fetch(`https://statsapi.mlb.com/api/v1.1/game/${liveGame.gamePk}/feed/live`),
      fetch(`https://statsapi.mlb.com/api/v1/game/${liveGame.gamePk}/boxscore`)
    ]);
    const feed = await feedRes.json();
    const box  = await boxRes.json();

    const linescore = feed.liveData?.linescore ?? {};
    const play      = feed.liveData?.plays?.currentPlay ?? {};
    const matchup   = play.matchup ?? {};
    const offense   = linescore.offense ?? {};
    const defense   = linescore.defense ?? {};

    // Warmup = game is "Live" but no pitches have been thrown yet
    // detailedState will be "Warmup" or currentInningOrdinal will be missing
    const detailedState  = liveGame.status?.detailedState ?? '';
    const isWarmup       = detailedState.toLowerCase().includes('warm')
                        || !play.atBatIndex && !play.matchup?.pitcher
                        || (linescore.currentInning === 1 && !feed.liveData?.plays?.allPlays?.length);

    const homeTeamId  = feed.gameData?.teams?.home?.id;
    const padresSide  = homeTeamId === PADRES_ID ? 'home' : 'away';
    const oppSide     = padresSide === 'home' ? 'away' : 'home';
    const awayId      = feed.gameData?.teams?.away?.id;
    const oppAbbr     = ID_TO_ABBR[padresSide === 'home' ? awayId : homeTeamId] ?? '???';

    // Short team names (no city) — e.g. "Padres", "Cubs"
    const padresShortName = feed.gameData?.teams?.[padresSide]?.teamName ?? 'Padres';
    const oppShortName    = feed.gameData?.teams?.[oppSide]?.teamName    ?? oppAbbr;

    const homeRuns    = linescore.teams?.home?.runs ?? 0;
    const awayRuns    = linescore.teams?.away?.runs ?? 0;
    const padresRuns  = padresSide === 'home' ? homeRuns : awayRuns;
    const oppRuns     = padresSide === 'home' ? awayRuns : homeRuns;

    const inning      = linescore.currentInning ?? 1;
    const half        = linescore.inningHalf ?? 'Top';
    const outs        = linescore.outs ?? 0;
    const onFirst     = !!offense.first;
    const onSecond    = !!offense.second;
    const onThird     = !!offense.third;

    const currentBatter  = matchup.batter?.fullName  ?? offense.batter?.fullName  ?? '—';
    const batterCount    = play.count ? `${play.count.balls}-${play.count.strikes}` : '';

    // Returns last name respecting Jr./Sr./II/III/IV suffixes
    function lastName(fullName) {
      const parts = fullName.split(' ');
      const suffixes = ['jr.','sr.','ii','iii','iv','v'];
      if (parts.length >= 3 && suffixes.includes(parts[parts.length - 1].toLowerCase())) {
        return parts[parts.length - 2] + ' ' + parts[parts.length - 1];
      }
      return parts[parts.length - 1];
    }

    function getLineup(side) {
      // Use the live feed's battingOrder — this updates in real time with substitutions
      // Fall back to boxscore batters if live feed data isn't available
      const feedTeam    = feed.liveData?.boxscore?.teams?.[side];
      const feedPlayers = feedTeam?.players ?? {};
      const battingOrder = feedTeam?.battingOrder ?? [];

      if (battingOrder.length > 0) {
        return battingOrder.slice(0, 9).map((pid, i) => {
          const key  = `ID${pid}`;
          const p    = feedPlayers[key] ?? {};
          const name = p.person?.fullName ?? `Player ${pid}`;
          const pos  = p.position?.abbreviation ?? p.allPositions?.[0]?.abbreviation ?? '';
          const parts = name.split(' ');
          const suffixes = ['jr.','sr.','ii','iii','iv','v'];
          let last;
          if (parts.length >= 3 && suffixes.includes(parts[parts.length - 1].toLowerCase())) {
            last = parts[parts.length - 2] + ' ' + parts[parts.length - 1];
          } else {
            last = parts[parts.length - 1];
          }
          const isSub = p.gameStatus?.isSubstitute ?? false;
          return { num: i + 1, name, last, pos, id: pid, isSub };
        });
      }

      // Fallback: boxscore batters list
      const batters  = box.teams[side].batters ?? [];
      const players  = box.teams[side].players ?? {};
      return batters.slice(0, 9).map((pid, i) => {
        const p    = players[`ID${pid}`] ?? {};
        const name = p.person?.fullName ?? `Player ${pid}`;
        const pos  = p.position?.abbreviation ?? '';
        const parts = name.split(' ');
        const suffixes = ['jr.','sr.','ii','iii','iv','v'];
        let last;
        if (parts.length >= 3 && suffixes.includes(parts[parts.length - 1].toLowerCase())) {
          last = parts[parts.length - 2] + ' ' + parts[parts.length - 1];
        } else {
          last = parts[parts.length - 1];
        }
        return { num: i + 1, name, last, pos, id: pid, isSub: false };
      });
    }

    const padresLineup = getLineup(padresSide);
    const oppLineup    = getLineup(oppSide);
    const currentBatterLast  = lastName(currentBatter);
    const suffix    = n => [,'st','nd','rd'][n] || 'th';
    const halfArrow = half.toLowerCase().includes('top') ? '▲' : '▼';
    const halfWord  = half.toLowerCase().includes('top') ? 'Top' : 'Bot';

    function lineupHTML(lineup, side) {
      const isBatting  = half.toLowerCase().includes('top') ? side === oppSide : side === padresSide;
      const isRight    = side === oppSide;
      return lineup.map(p => {
        const isCurrent = isBatting && p.last === currentBatterLast && !isWarmup;
        const subMark   = p.isSub ? `<span class="sub-mark">↑</span>` : '';
        const posStr    = `<span class="pos-tag">${p.pos}</span>`;

        let inner;
        if (isRight) {
          // Right: POS[space] Name↑ .num
          inner = `${posStr} ${subMark}${p.last}<span class="order-num">${p.num}.</span>`;
        } else {
          // Left: num. Name↑ POS
          inner = `<span class="order-num">${p.num}.</span>${p.last}${subMark}${posStr}`;
        }
        return `<li class="${isCurrent ? 'current-batter' : ''}">${inner}</li>`;
      }).join('');
    }

    // Middle column status block
    const statusBlock = isWarmup
      ? `<div class="gp-warmup-badge">⚾ Warming Up</div>
         <div class="gp-inning-block">
           <div class="gp-inning-num">Pre-Game</div>
           <div class="gp-inning-word">First Pitch Soon</div>
         </div>`
      : `<div class="gp-live-badge"><span class="live-dot"></span> Live</div>`;

    // Get the opposing team's current pitcher too
    const oppDefense     = feed.liveData?.linescore?.[oppSide === 'home' ? 'defense' : 'offense'] ?? {};
    // More reliable: pull from boxscore current pitcher for each side
    const feedHome       = feed.liveData?.boxscore?.teams?.home;
    const feedAway       = feed.liveData?.boxscore?.teams?.away;
    const padresFeedTeam = padresSide === 'home' ? feedHome : feedAway;
    const oppFeedTeam    = padresSide === 'home' ? feedAway : feedHome;

    // Current pitcher for each team = the pitcher listed in their pitchers array who is currently active
    function getActivePitcher(feedTeam) {
      const pitchers = feedTeam?.pitchers ?? [];
      const players  = feedTeam?.players ?? {};
      // Last pitcher in the array is current
      for (let i = pitchers.length - 1; i >= 0; i--) {
        const p = players[`ID${pitchers[i]}`];
        if (p?.stats?.pitching) return p.person?.fullName ?? '—';
      }
      return '—';
    }

    const padresPitcher = getActivePitcher(padresFeedTeam);
    const oppPitcher    = getActivePitcher(oppFeedTeam);
    const padresPitcherLast = lastName(padresPitcher);
    const oppPitcherLast    = lastName(oppPitcher);

    // Pitch count for each active pitcher
    function getPitchCount(feedTeam) {
      const pitchers = feedTeam?.pitchers ?? [];
      const players  = feedTeam?.players ?? {};
      for (let i = pitchers.length - 1; i >= 0; i--) {
        const p = players[`ID${pitchers[i]}`];
        if (p?.stats?.pitching) return p.stats.pitching.pitchesThrown ?? p.stats.pitching.numberOfPitches ?? null;
      }
      return null;
    }

    const padresPitchCount = getPitchCount(padresFeedTeam);
    const oppPitchCount    = getPitchCount(oppFeedTeam);

    const inningBlock = isWarmup ? '' : `
      <div class="gp-inning-block-mid">
        <div class="gp-half-arrow-sm">${halfArrow}</div>
        <div class="gp-inning-big">${inning}${suffix(inning)}</div>
        <div class="gp-count-big">${batterCount || '0-0'}</div>
      </div>`;

    function diamondSVG(first, second, third) {
      const pad  = 14, size = 80, bs = 26, cx = size / 2;
      const top   = { x: cx,               y: bs/2 + 1 };
      const right = { x: size - bs/2 - 1,  y: cx       };
      const left  = { x: bs/2 + 1,         y: cx       };
      const dim = 'rgba(200,146,42,0.7)', lit = '#E8B84B';
      const totalW = size + pad*2, totalH = size + pad*2;
      function baseRect(px, py, on) {
        const ox = px+pad, oy = py+pad;
        return `<rect x="${ox-bs/2}" y="${oy-bs/2}" width="${bs}" height="${bs}"
          fill="${on?lit:'transparent'}" stroke="${on?lit:dim}" stroke-width="2.5"
          transform="rotate(45 ${ox} ${oy})" rx="1"/>`;
      }
      return `<svg width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" xmlns="http://www.w3.org/2000/svg">
        ${baseRect(right.x,right.y,first)}${baseRect(top.x,top.y,second)}${baseRect(left.x,left.y,third)}
      </svg>`;
    }

    // Trim 3-letter abbrs to 2 for score display (e.g. CHC→CH, LAD→LA)
    const padresScoreAbbr = 'SD'; // Padres always SD (2 letters, no change)
    const oppScoreAbbr    = oppAbbr.length >= 3 ? oppAbbr.slice(0, -1) : oppAbbr;

    panel.innerHTML = `${corners}
      <div class="gp-body">

        <!-- LEFT: Padres -->
        <div class="gp-left">
          <div class="gp-lineup-name padres">${padresShortName}</div>
          <ul class="gp-lineup">${lineupHTML(padresLineup, padresSide)}</ul>
          <div class="gp-pitcher-footer">
            <div class="gp-pitcher-name"><span class="pos-tag">P </span>${padresPitcherLast}</div>
            ${padresPitchCount != null ? `<div class="gp-pitcher-stat">${padresPitchCount} pitches</div>` : ''}
          </div>
        </div>

        <!-- MIDDLE: game state -->
        <div class="gp-mid">
          ${statusBlock}
          <div class="gp-diamond">${diamondSVG(onFirst, onSecond, onThird)}</div>
          <div class="gp-outs-col">
            <div class="gp-outs-label">Outs</div>
            <div class="outs-pips">
              <div class="out-pip ${outs >= 1 ? 'on' : ''}"></div>
              <div class="out-pip ${outs >= 2 ? 'on' : ''}"></div>
              <div class="out-pip ${outs >= 3 ? 'on' : ''}"></div>
            </div>
          </div>
          <div class="gp-center-score">
            <span class="gp-center-team padres">${padresScoreAbbr}</span>
            <span class="gp-center-runs">${padresRuns}</span>
            <span class="gp-center-dash">–</span>
            <span class="gp-center-runs">${oppRuns}</span>
            <span class="gp-center-team opp">${oppScoreAbbr}</span>
          </div>
          ${inningBlock}
        </div>

        <!-- RIGHT: Opponent -->
        <div class="gp-right">
          <div class="gp-lineup-name opp">${oppShortName}</div>
          <ul class="gp-lineup">${lineupHTML(oppLineup, oppSide)}</ul>
          <div class="gp-pitcher-footer">
            <div class="gp-pitcher-name">${oppPitcherLast}<span class="pos-tag"> P</span></div>
            ${oppPitchCount != null ? `<div class="gp-pitcher-stat">${oppPitchCount} pitches</div>` : ''}
          </div>
        </div>

      </div>`;
    return true; // live game still in progress
  }

  // No live game — stop polling and find next scheduled game
  stopGamePolling();
  for (let offset = 0; offset <= 10; offset++) {
    const dateStr   = getLocalDateStr(offset);
    const sRes      = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${dateStr}&teamId=${PADRES_ID}&gameType=R`);
    const sData     = await sRes.json();
    const nextGames = sData.dates?.[0]?.games ?? [];
    const next      = nextGames.find(g => g.status.abstractGameState === 'Preview' || g.status.detailedState === 'Scheduled');

    if (next) {
      const homeId   = next.teams.home.team.id;
      const awayId   = next.teams.away.team.id;
      const homeAbbr = next.teams.home.team.abbreviation || ID_TO_ABBR[homeId] || '???';
      const awayAbbr = next.teams.away.team.abbreviation || ID_TO_ABBR[awayId] || '???';
      const startUTC = new Date(next.gameDate);
      const timeStr  = startUTC.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', timeZoneName:'short' });
      const dateLbl  = startUTC.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });

      panel.innerHTML = `${corners}
        <div class="gp-next">
          <div class="gp-next-label">Next Game</div>
          <div class="gp-next-teams">${awayAbbr} @ ${homeAbbr}</div>
          <div class="gp-next-time">${timeStr}</div>
          <div class="gp-next-date">${dateLbl}</div>
        </div>`;
      return false;
    }
  }

  panel.innerHTML = `${corners}<div class="gp-next"><div class="gp-next-label">No upcoming games found</div></div>`;
  return false;
}

/* ── Easter egg: type "wilmyers" anywhere to trigger ── */
(function() {
  const SECRET = 'wilmyers';
  let buffer = '';

  document.addEventListener('keydown', e => {
    if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
    buffer += e.key.toLowerCase();
    if (buffer.length > SECRET.length) buffer = buffer.slice(-SECRET.length);
    if (buffer === SECRET) { buffer = ''; triggerWilmyers(); }
  });

  function triggerWilmyers() {
    if (document.getElementById('wilmyers-overlay')) return;

    const overlay = document.createElement('div');
    overlay.id = 'wilmyers-overlay';
    overlay.style.cssText = `
      position:fixed; inset:0; z-index:9999;
      background:#000; opacity:0;
      transition:opacity 2s ease;
      cursor:pointer;
    `;

    const video = document.createElement('video');
    video.src = '/data/wilmyers.mp4';
    video.style.cssText = `
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:cover;
    `;
    video.volume = 0;
    video.autoplay = true;
    video.playsInline = true;

    overlay.appendChild(video);
    document.body.appendChild(overlay);

    // Fade overlay in + ramp audio up over 2s
    requestAnimationFrame(() => requestAnimationFrame(() => {
      overlay.style.opacity = '1';
      let step = 0;
      const steps = 40, interval = 2000 / steps;
      const fadeIn = setInterval(() => {
        video.volume = Math.min(1, ++step / steps);
        if (step >= steps) clearInterval(fadeIn);
      }, interval);
    }));

    video.addEventListener('ended', fadeOut);
    overlay.addEventListener('click', fadeOut);

    function fadeOut() {
      video.removeEventListener('ended', fadeOut);
      overlay.removeEventListener('click', fadeOut);

      // Ramp audio down over 2s
      let step = 0;
      const steps = 40, interval = 2000 / steps;
      const ramp = setInterval(() => {
        video.volume = Math.max(0, 1 - (++step / steps));
        if (step >= steps) clearInterval(ramp);
      }, interval);

      // Fade overlay out over 2s then remove
      overlay.style.transition = 'opacity 2s ease';
      overlay.style.opacity = '0';
      setTimeout(() => { video.pause(); overlay.remove(); }, 2000);
    }
  }
})();
</script>
