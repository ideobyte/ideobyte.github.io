name: Fetch Padres Highlights

on:
  schedule:
    - cron: '*/30 3-8 * * *'  # Every 30 min, ~9pm-midnight PT
  workflow_dispatch:           # Allow manual trigger from GitHub UI

jobs:
  fetch-highlights:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get dates in PT
        id: date
        run: |
          echo "today=$(TZ='America/Los_Angeles' date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "yesterday=$(TZ='America/Los_Angeles' date -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Check caches
        id: cache
        run: |
          TODAY="${{ steps.date.outputs.today }}"
          YESTERDAY="${{ steps.date.outputs.yesterday }}"
          check() {
            local file="$1" date="$2"
            [ -f "$file" ] && D=$(jq -r '.date//"" ' "$file") && V=$(jq -r '.videoId//"" ' "$file")
            [ "${D:-}" = "$date" ] && [ -n "${V:-}" ] && echo "true" || echo "false"
          }
          echo "today_hit=$(check padres/highlights.json $TODAY)" >> $GITHUB_OUTPUT
          echo "yesterday_hit=$(check padres/highlights-yesterday.json $YESTERDAY)" >> $GITHUB_OUTPUT

      - name: Check today's game status
        if: steps.cache.outputs.today_hit == 'false'
        id: today_game
        run: |
          RESP=$(curl -s "https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${{ steps.date.outputs.today }}&teamId=135&gameType=R")
          ABSTRACT=$(echo "$RESP" | jq -r '.dates[0].games[0].status.abstractGameState // ""')
          DETAILED=$(echo "$RESP" | jq -r '.dates[0].games[0].status.detailedState // ""')
          HOME_ID=$(echo "$RESP" | jq -r '.dates[0].games[0].teams.home.team.id // ""')
          AWAY=$(echo "$RESP" | jq -r '.dates[0].games[0].teams.away.team.name // ""')
          HOME=$(echo "$RESP" | jq -r '.dates[0].games[0].teams.home.team.name // ""')
          if [ "$ABSTRACT" = "Final" ] && [[ "$DETAILED" != *"Postponed"* ]] && [[ "$DETAILED" != *"Cancelled"* ]]; then
            [ "$HOME_ID" = "135" ] && OPP="$AWAY" || OPP="$HOME"
            echo "final=true" >> $GITHUB_OUTPUT
            echo "opp=$OPP" >> $GITHUB_OUTPUT
          else
            echo "final=false" >> $GITHUB_OUTPUT
          fi

      - name: Check yesterday's game status
        if: steps.cache.outputs.yesterday_hit == 'false'
        id: yesterday_game
        run: |
          RESP=$(curl -s "https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${{ steps.date.outputs.yesterday }}&teamId=135&gameType=R")
          ABSTRACT=$(echo "$RESP" | jq -r '.dates[0].games[0].status.abstractGameState // ""')
          DETAILED=$(echo "$RESP" | jq -r '.dates[0].games[0].status.detailedState // ""')
          HOME_ID=$(echo "$RESP" | jq -r '.dates[0].games[0].teams.home.team.id // ""')
          AWAY=$(echo "$RESP" | jq -r '.dates[0].games[0].teams.away.team.name // ""')
          HOME=$(echo "$RESP" | jq -r '.dates[0].games[0].teams.home.team.name // ""')
          if [ "$ABSTRACT" = "Final" ] && [[ "$DETAILED" != *"Postponed"* ]] && [[ "$DETAILED" != *"Cancelled"* ]]; then
            [ "$HOME_ID" = "135" ] && OPP="$AWAY" || OPP="$HOME"
            echo "final=true" >> $GITHUB_OUTPUT
            echo "opp=$OPP" >> $GITHUB_OUTPUT
          else
            echo "final=false" >> $GITHUB_OUTPUT
          fi

      - name: Search YouTube for today's highlights
        if: steps.today_game.outputs.final == 'true'
        id: today_yt
        run: |
          Q=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "Padres ${{ steps.today_game.outputs.opp }} Highlights")
          RESP=$(curl -s -H "Referer: https://ideo.zip" "https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=UCoLrcjPV5PbUrUyXq5mjc_A&q=${Q}&type=video&order=date&maxResults=1&key=${{ secrets.YT_API_KEY }}")
          echo "videoId=$(echo "$RESP" | jq -r '.items[0].id.videoId // ""')" >> $GITHUB_OUTPUT

      - name: Search YouTube for yesterday's highlights
        if: steps.yesterday_game.outputs.final == 'true'
        id: yesterday_yt
        run: |
          Q=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "Padres ${{ steps.yesterday_game.outputs.opp }} Highlights")
          PUB_AFTER="${{ steps.date.outputs.yesterday }}T08:00:00Z"
          PUB_BEFORE="${{ steps.date.outputs.today }}T08:00:00Z"
          RESP=$(curl -s -H "Referer: https://ideo.zip" "https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=UCoLrcjPV5PbUrUyXq5mjc_A&q=${Q}&type=video&order=date&publishedAfter=${PUB_AFTER}&publishedBefore=${PUB_BEFORE}&maxResults=1&key=${{ secrets.YT_API_KEY }}")
          echo "videoId=$(echo "$RESP" | jq -r '.items[0].id.videoId // ""')" >> $GITHUB_OUTPUT

      - name: Write cache files and commit
        run: |
          CHANGED=false
          TODAY_ID="${{ steps.today_yt.outputs.videoId }}"
          YESTERDAY_ID="${{ steps.yesterday_yt.outputs.videoId }}"
          if [ -n "$TODAY_ID" ]; then
            echo "{\"date\":\"${{ steps.date.outputs.today }}\",\"videoId\":\"$TODAY_ID\"}" > padres/highlights.json
            CHANGED=true
          fi
          if [ -n "$YESTERDAY_ID" ]; then
            echo "{\"date\":\"${{ steps.date.outputs.yesterday }}\",\"videoId\":\"$YESTERDAY_ID\"}" > padres/highlights-yesterday.json
            CHANGED=true
          fi
          if [ "$CHANGED" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add padres/highlights*.json
            git diff --staged --quiet || git commit -m "Update Padres highlights for ${{ steps.date.outputs.today }}"
            git push
          fi
