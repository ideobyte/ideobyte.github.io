<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ideo.zip</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

    :root {
      --green: #00ff41;
      --green-dim: #00c832;
      --green-faint: #003b0f;
      --green-glow: rgba(0, 255, 65, 0.35);
      --bg: #020b02;
      --scanline: rgba(0, 0, 0, 0.18);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
    }

    /* ── CRT scanlines overlay ── */
    body::before {
      content: '';
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        var(--scanline) 3px,
        var(--scanline) 4px
      );
    }

    /* ── CRT screen-edge vignette ── */
    body::after {
      content: '';
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 99;
      background: radial-gradient(
        ellipse at center,
        transparent 55%,
        rgba(0, 0, 0, 0.75) 100%
      );
    }

    /* ── Tape-noise flicker ── */
    @keyframes flicker {
      0%   { opacity: 1; }
      92%  { opacity: 1; }
      93%  { opacity: 0.82; }
      94%  { opacity: 1; }
      96%  { opacity: 0.91; }
      100% { opacity: 1; }
    }

    @keyframes noise-shift {
      0%   { transform: translateY(0); }
      10%  { transform: translateY(-2px); }
      20%  { transform: translateY(1px); }
      100% { transform: translateY(0); }
    }

    @keyframes scanbar {
      0%   { top: -8%; }
      100% { top: 108%; }
    }

    /* Moving VHS tracking bar */
    .tracking-bar {
      pointer-events: none;
      position: fixed;
      left: 0; right: 0;
      height: 6px;
      background: rgba(0,255,65,0.07);
      z-index: 101;
      animation: scanbar 6s linear infinite;
    }

    .screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      gap: 2.5rem;
      animation: flicker 8s infinite;
      position: relative;
    }

    /* ── REC badge ── */
    .rec-badge {
      position: fixed;
      top: 1.4rem;
      left: 1.6rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: #ff2e2e;
      text-shadow: 0 0 8px rgba(255,46,46,0.8);
      z-index: 102;
    }

    .rec-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #ff2e2e;
      box-shadow: 0 0 8px #ff2e2e;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Timecode ── */
    .timecode {
      position: fixed;
      bottom: 1.4rem;
      right: 1.6rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--green-dim);
      text-shadow: 0 0 6px var(--green-glow);
      z-index: 102;
    }

    /* ── Hero title ── */
    .hero {
      text-align: center;
      line-height: 1;
    }

    .title {
      font-family: 'VT323', monospace;
      font-size: clamp(5rem, 18vw, 11rem);
      color: var(--green);
      text-shadow:
        0 0 8px  var(--green),
        0 0 20px var(--green),
        0 0 45px var(--green-glow),
        0 0 80px var(--green-glow);
      letter-spacing: 0.03em;
      position: relative;
      display: inline-block;
      animation: glitch-idle 7s infinite;
    }

    /* Subtle glitch on the title */
    @keyframes glitch-idle {
      0%,  94%, 100% { text-shadow: 0 0 8px var(--green), 0 0 20px var(--green), 0 0 45px var(--green-glow), 0 0 80px var(--green-glow); transform: none; }
      95%  { text-shadow: -3px 0 rgba(255,0,80,0.6), 3px 0 rgba(0,255,255,0.6), 0 0 20px var(--green); transform: skewX(-1.5deg); }
      96%  { text-shadow: 3px 0 rgba(255,0,80,0.6), -3px 0 rgba(0,255,255,0.6), 0 0 20px var(--green); transform: skewX(1.5deg); }
      97%  { text-shadow: 0 0 8px var(--green), 0 0 20px var(--green), 0 0 45px var(--green-glow); transform: none; }
    }

    /* ── Tagline / prompt ── */
    .prompt {
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      color: var(--green-dim);
      text-transform: uppercase;
      text-shadow: 0 0 6px var(--green-glow);
    }

    .cursor {
      display: inline-block;
      width: 0.6em; height: 1em;
      background: var(--green);
      vertical-align: text-bottom;
      box-shadow: 0 0 6px var(--green);
      animation: blink 0.9s step-end infinite;
      margin-left: 2px;
    }

    /* ── Nav links ── */
    .nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      max-width: 380px;
    }

    .nav-item {
      width: 100%;
      border: 1px solid var(--green-dim);
      padding: 0.65rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      color: var(--green);
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      background: transparent;
      box-shadow: inset 0 0 0px var(--green-glow);
      transition: background 0.15s, box-shadow 0.15s, text-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    .nav-item::before {
      content: '▶';
      color: var(--green);
      opacity: 0;
      transition: opacity 0.1s;
      font-size: 0.7rem;
      flex-shrink: 0;
    }

    .nav-item:hover {
      background: rgba(0, 255, 65, 0.06);
      box-shadow: inset 0 0 18px var(--green-glow), 0 0 12px var(--green-glow);
      text-shadow: 0 0 8px var(--green);
    }

    .nav-item:hover::before {
      opacity: 1;
    }

    .nav-item .label {
      flex: 1;
    }

    .nav-item .track-num {
      font-size: 0.7rem;
      color: var(--green-dim);
      letter-spacing: 0.05em;
    }

    /* placeholder/disabled style */
    .nav-item.placeholder {
      opacity: 0.28;
      pointer-events: none;
      border-style: dashed;
    }

    /* ── Footer ── */
    .footer {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      color: rgba(0,255,65,0.3);
      text-transform: uppercase;
    }

    /* ── Custom cursor (desktop only, applied via JS) ── */
    body.custom-cursor-active * { cursor: none !important; }

    #cursor-dot {
      pointer-events: none;
      position: fixed;
      z-index: 200;
      width: 20px;
      height: 24px;
      filter:
        drop-shadow(0 0 3px rgba(0,255,65,0.95))
        drop-shadow(0 0 8px rgba(0,255,65,0.45));
    }

    /* ── Grid canvas (behind everything) ── */
    #grid-canvas {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 0;
    }
  </style>
</head>
<body>

  <canvas id="grid-canvas"></canvas>
  <div id="cursor-dot">
    <svg width="20" height="24" viewBox="0 0 20 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 2 L2 20 L6.5 15.5 L10.5 22 L13 21 L9 14.5 L16 14.5 Z"
            fill="#00ff41" stroke="#003a10" stroke-width="1.2" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="tracking-bar"></div>

  <div class="rec-badge">
    <div class="rec-dot"></div>
    REC
  </div>

  <div class="timecode" id="timecode">00:00:00:00</div>

  <main class="screen">

    <div class="hero">
      <div class="title">ideo.zip</div>
    </div>

    <div class="prompt">select a channel<span class="cursor"></span></div>

    <nav class="nav">
      <!-- ── Add your links below. Duplicate a .nav-item block for each new page. ── -->

      <!-- Example active link (uncomment and edit href when ready):
      <a href="/about" class="nav-item">
        <span class="label">about</span>
        <span class="track-num">T-01</span>
      </a>
      -->

      <a href="padres.html" class="nav-item">
        <span class="label">Padres Promo Status</span>
        <span class="track-num">T-01</span>
      </a>

      <a href="page2.html" class="nav-item">
        <span class="label">coming soon</span>
        <span class="track-num">T-02</span>
      </a>

      <a href="page3.html" class="nav-item">
        <span class="label">coming soon</span>
        <span class="track-num">T-03</span>
      </a>

    </nav>

    <div class="footer">be kind, rewind</div>

  </main>

  <script>
    // ── Timecode counter (cosmetic) ──
    const tc = document.getElementById('timecode');
    let frames = 0;
    setInterval(() => {
      frames++;
      const f  = frames % 30;
      const s  = Math.floor(frames / 30) % 60;
      const m  = Math.floor(frames / 1800) % 60;
      const h  = Math.floor(frames / 108000) % 24;
      tc.textContent = [h, m, s].map(n => String(n).padStart(2,'0')).join(':')
                       + ':' + String(f).padStart(2,'0');
    }, 1000 / 30);

    // ── Glowing cursor (desktop only) ──
    const dot = document.getElementById('cursor-dot');
    const isMobile = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
      || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)
      || navigator.maxTouchPoints > 2;
    let mx = -999, my = -999;

    if (!isMobile) {
      document.body.classList.add('custom-cursor-active');
      document.addEventListener('mousemove', e => {
        mx = e.clientX; my = e.clientY;
        dot.style.left = mx + 'px';
        dot.style.top  = my + 'px';
      });
    } else {
      dot.style.display = 'none';
    }

    // ── Grid canvas ──
    const canvas = document.getElementById('grid-canvas');
    const ctx = canvas.getContext('2d');
    const CELL = 40;
    const RADIUS = 150;
    const FADE = 0.08;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function drawGrid() {
      const w = canvas.width, h = canvas.height;
      ctx.fillStyle = `rgba(2, 11, 2, ${FADE})`;
      ctx.fillRect(0, 0, w, h);

      const cols = Math.ceil(w / CELL) + 1;
      const rows = Math.ceil(h / CELL) + 1;

      // Grid lines
      ctx.shadowBlur = 0;
      for (let c = 0; c <= cols; c++) {
        const x = c * CELL;
        if (Math.abs(x - mx) > RADIUS) continue;
        for (let r = 0; r < rows; r++) {
          const y1 = r * CELL, y2 = y1 + CELL;
          const d1 = Math.hypot(x - mx, y1 - my);
          const d2 = Math.hypot(x - mx, y2 - my);
          const alpha = Math.pow(1 - Math.min(d1, d2) / RADIUS, 2.5) * 0.09;
          if (alpha <= 0) continue;
          ctx.strokeStyle = `rgba(0, 255, 65, ${alpha})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(x, y1); ctx.lineTo(x, y2);
          ctx.stroke();
        }
      }
      for (let r = 0; r <= rows; r++) {
        const y = r * CELL;
        if (Math.abs(y - my) > RADIUS) continue;
        for (let c = 0; c < cols; c++) {
          const x1 = c * CELL, x2 = x1 + CELL;
          const d1 = Math.hypot(x1 - mx, y - my);
          const d2 = Math.hypot(x2 - mx, y - my);
          const alpha = Math.pow(1 - Math.min(d1, d2) / RADIUS, 2.5) * 0.09;
          if (alpha <= 0) continue;
          ctx.strokeStyle = `rgba(0, 255, 65, ${alpha})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(x1, y); ctx.lineTo(x2, y);
          ctx.stroke();
        }
      }

      // Intersection dots
      for (let c = 0; c <= cols; c++) {
        const x = c * CELL;
        if (Math.abs(x - mx) > RADIUS) continue;
        for (let r = 0; r <= rows; r++) {
          const y = r * CELL;
          const dist = Math.hypot(x - mx, y - my);
          if (dist > RADIUS) continue;
          const alpha = Math.pow(1 - dist / RADIUS, 2.5) * 0.28;
          ctx.fillStyle = `rgba(0, 255, 65, ${alpha})`;
          ctx.shadowColor = 'transparent';
          ctx.shadowBlur = 0;
          ctx.beginPath();
          ctx.arc(x, y, 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      requestAnimationFrame(drawGrid);
    }
    drawGrid();
  </script>

</body>
</html>
