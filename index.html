<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ideo.zip</title>
<link rel="icon" type="image/png" href="/data/favicon/main/favicon-96x96.png" sizes="96x96">
<link rel="icon" type="image/svg+xml" href="/data/favicon/main/favicon.svg">
<link rel="shortcut icon" href="/data/favicon/main/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/data/favicon/main/apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="ideo.zip">
<link rel="manifest" href="/data/favicon/main/site.webmanifest">

<style>
  /* ── FONTS ─────────────────────────────────────────────── */
  @font-face {
    font-family: 'Share Tech Mono';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url("fonts/ShareTechMono-latin.woff2") format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: 'VT323';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url("fonts/VT323-vietnamese.woff2") format('woff2');
    unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;
  }
  @font-face {
    font-family: 'VT323';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url("fonts/VT323-latin-ext.woff2") format('woff2');
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }
  @font-face {
    font-family: 'VT323';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url("fonts/VT323-latin.woff2") format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  /* ── RESET & TOKENS ────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff41;
    --green-dim: #00c032;
    --green-glow: #00ff4180;
    --bg: #020d06;
    --grid: #0a1f0e;
    --mono: 'Share Tech Mono', monospace;
    --display: 'VT323', monospace;
    --wordmark-size: clamp(80px, 14vw, 160px);
  }

  body {
    cursor: none;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 20vh;
    min-height: 100vh;
    overflow: hidden;
    font-family: var(--mono);
  }

  /* ── BACKGROUND LAYERS ─────────────────────────────────── */
  #grid-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 2;
    animation: scanroll 8s linear infinite;
    will-change: background-position;
  }
  @keyframes scanroll { to { background-position: 0 100vh; } }

  #text-scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 12;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.45) 3px,
      rgba(0,0,0,0.45) 5px
    );
    animation: scanshift 2s linear infinite;
    will-change: background-position;
  }
  @keyframes scanshift { to { background-position: 0 60px; } }

  .scanbeam {
    position: fixed;
    left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to bottom,
      transparent,
      rgba(0,255,65,0.08) 50%,
      transparent
    );
    pointer-events: none;
    z-index: 3;
    animation: beam 4s linear infinite;
    will-change: top;
  }
  @keyframes beam {
    from { top: -10px; }
    to   { top: 100vh; }
  }

  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 50%,
      rgba(0,0,0,0.7) 100%
    );
    pointer-events: none;
    z-index: 4;
  }

  /* ── LOGO ──────────────────────────────────────────────── */
  .logo-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    user-select: none;
  }

  .top-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 10px;
    opacity: 0;
    animation: fadein 0.3s 0.2s forwards;
  }

  .top-bar-line {
    height: 1px;
    width: 80px;
    background: var(--green-dim);
    box-shadow: 0 0 4px var(--green);
  }

  .top-bar-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--green-dim);
    text-shadow: 0 0 6px var(--green);
    white-space: nowrap;
  }

  .wordmark {
    font-family: var(--display);
    font-size: var(--wordmark-size);
    color: oklch(80% 0.28 142);
    letter-spacing: 0.04em;
    line-height: 1;
    text-shadow:
      0 0 3px #fff,
      0 0 8px oklch(92% 0.28 142),
      0 0 18px oklch(80% 0.28 142 / 0.95),
      0 0 40px oklch(72% 0.26 142 / 0.75),
      0 0 80px oklch(65% 0.24 142 / 0.45),
      0 0 140px oklch(60% 0.20 142 / 0.2);
    position: relative;
    /* Was 0.01s (≈100fps target). Sparse 10s keyframes give the same visible flicker far cheaper. */
    animation: textflicker 10s steps(1, end) infinite;
  }

  .wordmark::before,
  .wordmark::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    font-size: inherit;
    letter-spacing: inherit;
    line-height: inherit;
  }

  .wordmark::before {
    color: rgba(255, 0, 60, 0.25);
    transform: translateX(-2px);
    mix-blend-mode: screen;
    text-shadow: none;
    animation: ghostleft 6s ease-in-out infinite;
  }

  .wordmark::after {
    color: rgba(0, 200, 255, 0.2);
    transform: translateX(2px);
    mix-blend-mode: screen;
    text-shadow: none;
    animation: ghostright 6s ease-in-out infinite;
  }

  @keyframes ghostleft {
    0%, 100% { transform: translateX(-2px) translateY(0);  opacity: 0.8; }
    30%      { transform: translateX(-4px) translateY(1px); opacity: 0.4; }
    60%      { transform: translateX(-1px) translateY(-1px); opacity: 1; }
  }
  @keyframes ghostright {
    0%, 100% { transform: translateX(2px) translateY(0);   opacity: 0.7; }
    30%      { transform: translateX(3px) translateY(-1px); opacity: 1; }
    60%      { transform: translateX(1px) translateY(1px);  opacity: 0.4; }
  }

  @keyframes textflicker {
    0%, 92%, 94%, 100% { opacity: 1; }
    93%                { opacity: 0.95; }
    97%                { opacity: 1; }
    98%                { opacity: 0.9; }
  }

  .wordmark-glitch { position: relative; overflow: visible; }
  .wordmark-inner  { position: relative; animation: glitchcontainer 8s infinite; }

  @keyframes glitchcontainer {
    0%, 89%  { clip-path: none; transform: none; }
    90%      { clip-path: inset(30% 0 55% 0); transform: translateX(-4px); }
    90.5%    { clip-path: inset(60% 0 10% 0); transform: translateX(4px); }
    91%      { clip-path: none; transform: none; }
    95%      { clip-path: inset(45% 0 40% 0); transform: translateX(3px) scaleY(1.02); }
    95.5%    { clip-path: none; transform: none; }
  }

  /* ── DIVIDER / TAGLINE / STATUS ────────────────────────── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
    opacity: 0;
    animation: fadein 0.4s 1.2s forwards;
  }

  .divider-line {
    height: 1px;
    width: 120px;
    background: linear-gradient(to right, transparent, var(--green-dim), transparent);
    box-shadow: 0 0 4px var(--green-glow);
  }

  .divider-icon {
    width: 14px;
    height: 14px;
    border: 1px solid var(--green-dim);
    transform: rotate(45deg);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 6px var(--green),  inset 0 0 4px rgba(0,255,65,0.2); }
    50%      { box-shadow: 0 0 12px var(--green), inset 0 0 8px rgba(0,255,65,0.4); }
  }

  .tagline {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.25em;
    color: var(--green-dim);
    text-shadow: 0 0 8px var(--green);
    margin-top: 12px;
    white-space: nowrap;
    opacity: 0;
    animation: fadein 0.4s 1.6s forwards, blink-cursor 1s 2s step-end 4;
  }

  .status-row {
    display: flex;
    gap: 24px;
    margin-top: 20px;
    opacity: 0;
    animation: fadein 0.3s 2s forwards;
  }

  .status-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 1.4s ease-in-out infinite;
  }
  .status-dot:nth-child(1) { animation-delay: 0s; }
  .status-dot:nth-child(2) { animation-delay: 0.5s; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.2; }
  }

  .status-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--green-dim);
    opacity: 0.7;
  }

  /* ── REVEAL CANVAS ─────────────────────────────────────── */
  #reveal-canvas {
    position: fixed;
    inset: 0;
    z-index: 200;
    pointer-events: none;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── CORNERS / TIMESTAMP / REC ─────────────────────────── */
  .corner {
    position: fixed;
    width: 40px;
    height: 40px;
    z-index: 10;
    opacity: 0.5;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner path { stroke: var(--green); stroke-width: 1.5; fill: none; }
  .corner.tl { top: 20px; left: 20px; }
  .corner.tr { top: 20px; right: 20px; transform: scaleX(-1); }
  .corner.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
  .corner.br { bottom: 20px; right: 20px; transform: scale(-1); }

  .timestamp {
    position: fixed;
    bottom: 22px;
    right: 22px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green-dim);
    opacity: 0.6;
    letter-spacing: 0.15em;
    z-index: 10;
  }

  .rec-badge {
    position: fixed;
    top: 30px;
    left: 30px;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 10;
    opacity: 0.7;
  }

  .rec-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ff2244;
    box-shadow: 0 0 8px #ff2244;
    animation: blink 0.9s ease-in-out infinite;
  }

  .rec-text {
    font-family: var(--mono);
    font-size: 11px;
    color: #ff2244;
    text-shadow: 0 0 6px #ff2244;
    letter-spacing: 0.2em;
  }

  .scanline-text { position: relative; display: inline-block; }

  /* ── CHANNEL BUTTONS ───────────────────────────────────── */
  .channels {
    position: relative;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 52px;
    width: min(480px, calc(100vw - 32px));
  }

  .channel-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    white-space: nowrap;
    border: 1px solid var(--green-dim);
    background: transparent;
    color: var(--green-dim);
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.2em;
    text-decoration: none;
    box-shadow: 0 0 6px rgba(0,255,65,0.08), inset 0 0 12px rgba(0,255,65,0.03);
    /* Was `transition: all` — bad practice, transitions every property change incl. layout. */
    transition: color 0.15s ease, border-color 0.15s ease,
                box-shadow 0.15s ease, text-shadow 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .channel-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,255,65,0.04);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .channel-btn:hover {
    color: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 14px rgba(0,255,65,0.2), inset 0 0 16px rgba(0,255,65,0.06);
    text-shadow: 0 0 8px var(--green);
  }
  .channel-btn:hover::before { opacity: 1; }

  .channel-tag {
    font-size: 11px;
    opacity: 0.5;
    letter-spacing: 0.15em;
  }

  .glitch-slice {
    position: absolute;
    top: 0; left: 0;
    font-family: var(--display);
    font-size: var(--wordmark-size);
    letter-spacing: 0.04em;
    line-height: 1;
    pointer-events: none;
    opacity: 0;
    /* Was `mix-blend-mode: screen` — forced a blend pass per slice per frame.
       On a near-black bg, screen-blend and plain alpha look near-identical here.
       Boosted text-shadow slightly to keep the neon glow read. */
    white-space: nowrap;
    /* Promote each slice to its own compositor layer so transforms/opacity
       updates don't repaint the underlying wordmark. */
    will-change: transform, clip-path, opacity;
  }
  .glitch-slice.cyan    { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
  .glitch-slice.magenta { color: #ff00cc; text-shadow: 0 0 10px #ff00cc; }
  .glitch-slice.yellow  { color: #ffff00; text-shadow: 0 0 10px #ffff00; }

  /* ── RESPONSIVE ────────────────────────────────────────── */
  @media (max-width: 600px) {
    :root { --wordmark-size: clamp(52px, 18vw, 96px); }
    body { padding-top: 12vh; overflow-x: hidden; }
    .top-bar { gap: 8px; }
    .top-bar-line { width: 40px; }
    .top-bar-label {
      font-size: 9px; letter-spacing: 0.12em;
      overflow: hidden; text-overflow: ellipsis;
      max-width: calc(100vw - 120px);
    }
    .divider-line { width: 60px; }
    .tagline { font-size: 10px; letter-spacing: 0.15em; }
    .status-row { gap: 16px; margin-top: 14px; }
    .channels { width: min(480px, calc(100vw - 32px)); margin-top: 32px; padding: 0 16px; }
    .channel-btn { padding: 10px 14px; font-size: 11px; letter-spacing: 0.13em; }
    .corner { width: 24px; height: 24px; }
    .corner.tl { top: 10px; left: 10px; }
    .corner.tr { top: 10px; right: 10px; }
    .corner.bl { bottom: 10px; left: 10px; }
    .corner.br { bottom: 10px; right: 10px; }
    .rec-badge { top: 16px; left: 16px; }
    .timestamp { bottom: 12px; right: 12px; font-size: 9px; }
  }
  @media (max-width: 400px) {
    :root { --wordmark-size: clamp(40px, 20vw, 64px); }
    body { padding-top: 8vh; }
    .channel-btn { font-size: 10px; padding: 9px 12px; }
    .top-bar-label { font-size: 8px; letter-spacing: 0.07em; }
  }

  /* ── CUSTOM CURSOR ─────────────────────────────────────── */
  body.custom-cursor-active * { cursor: none !important; }
  #cursor-dot {
    pointer-events: none;
    position: fixed;
    top: 0; left: 0;
    z-index: 200;
    width: 20px;
    height: 24px;
    /* translate3d → compositor-only updates (no layout/paint per move). */
    transform: translate3d(-999px, -999px, 0);
    will-change: transform;
    filter:
      drop-shadow(0 0 3px rgba(0,255,65,0.95))
      drop-shadow(0 0 8px rgba(0,255,65,0.45));
  }

  /* ── REDUCED MOTION ────────────────────────────────────── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001s !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001s !important;
    }
  }
</style>
</head>
<body>

<div id="cursor-dot">
  <svg width="20" height="24" viewBox="0 0 20 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 2 L2 20 L6.5 15.5 L10.5 22 L13 21 L9 14.5 L16 14.5 Z"
          fill="#00ff41" stroke="#003a10" stroke-width="1.2" stroke-linejoin="round"/>
  </svg>
</div>

<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <defs>
    <filter id="warp" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence id="turb" type="turbulence" baseFrequency="0.02 0.08" numOctaves="3" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" id="disp"/>
    </filter>
  </defs>
</svg>

<canvas id="reveal-canvas"></canvas>
<canvas id="grid-canvas"></canvas>
<canvas id="band-canvas"></canvas>

<div class="scanlines"></div>
<div id="text-scanlines"></div>
<div class="scanbeam"></div>
<div class="vignette"></div>

<div class="corner tl"><svg viewBox="0 0 40 40"><path d="M 0 20 L 0 0 L 20 0"/></svg></div>
<div class="corner tr"><svg viewBox="0 0 40 40"><path d="M 0 20 L 0 0 L 20 0"/></svg></div>
<div class="corner bl"><svg viewBox="0 0 40 40"><path d="M 0 20 L 0 0 L 20 0"/></svg></div>
<div class="corner br"><svg viewBox="0 0 40 40"><path d="M 0 20 L 0 0 L 20 0"/></svg></div>

<div class="rec-badge">
  <div class="rec-dot"></div>
  <span class="rec-text">REC</span>
</div>

<div class="timestamp" id="ts">--:--:--</div>

<div class="logo-wrap">
  <div class="top-bar">
    <div class="top-bar-line"></div>
    <span class="top-bar-label">SIGNAL / ARCHIVE / CHANNEL</span>
    <div class="top-bar-line"></div>
  </div>

  <div class="wordmark-glitch">
    <div class="wordmark-inner">
      <div class="wordmark" id="wordmark" data-text="ideo.zip"><span class="scanline-text">ideo.zip</span></div>
      <div class="glitch-slice cyan"    id="gs-cyan">ideo.zip</div>
      <div class="glitch-slice magenta" id="gs-magenta">ideo.zip</div>
      <div class="glitch-slice yellow"  id="gs-yellow">ideo.zip</div>
    </div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-icon"></div>
    <div class="divider-line"></div>
  </div>

  <div class="tagline">BE KIND. REWIND.</div>

  <div class="status-row">
    <div class="status-item">
      <div class="status-dot"></div>
      <span class="status-label">LIVE</span>
    </div>
    <div class="status-item">
      <div class="status-dot" style="animation-delay:0.3s"></div>
      <span class="status-label">SYNC</span>
    </div>
    <div class="status-item">
      <div class="status-dot" style="animation-delay:0.7s"></div>
      <span class="status-label">TAPE</span>
    </div>
  </div>
</div>

<div class="channels">
  <a class="channel-btn" href="padres">
    <span>PADRES DASHBOARD</span>
    <span class="channel-tag">T-01</span>
  </a>
  <a class="channel-btn" href="brickbreaker">
    <span>BRICK BREAKER</span>
    <span class="channel-tag">T-02</span>
  </a>
  <a class="channel-btn" href="tetris">
    <span>TETRIS</span>
    <span class="channel-tag">T-03</span>
  </a>
</div>

<script>
(() => {
  'use strict';

  // ── SHARED HELPERS ──────────────────────────────────────────
  const rand = (a, b) => a + Math.random() * (b - a);
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Cached viewport metrics — recomputed only on resize, not per-mousemove.
  let vw = window.innerWidth, vh = window.innerHeight;
  let vcx = vw / 2, vcy = vh / 2;

  // Single shared mouse state — written by ONE listener, read by all consumers.
  // Was: two separate mousemove listeners, each recomputing center coords.
  const mouse = { x: -9999, y: -9999, nx: 0, ny: 0, dist: 0 };

  // Page-visibility gate — halt rAF loops when the tab is hidden.
  let pageVisible = !document.hidden;

  // ── REVEAL CANVAS (one-shot) ───────────────────────────────
  const rc = document.getElementById('reveal-canvas');
  const rctx = rc.getContext('2d');
  const RCELL = 40;
  const DELAY_PER_DIST = 16;
  const FLIP_DUR = 110;

  rc.width = vw; rc.height = vh;

  const rCols = Math.ceil(vw / RCELL) + 2;
  const rRows = Math.ceil(vh / RCELL) + 2;
  const rCx = vcx / RCELL;
  const rCy = vcy / RCELL;

  // Was: dead `maxDelay = Math.max(...revealCells.map(c => c.delay))` — never read. Removed.
  const revealCells = [];
  for (let c = -1; c <= rCols; c++) {
    for (let r = -1; r <= rRows; r++) {
      const dc = c - rCx, dr = r - rCy;
      revealCells.push({ c, r, delay: Math.sqrt(dc * dc + dr * dr) * DELAY_PER_DIST });
    }
  }

  const revealStart = performance.now();
  const REVEAL_BG = '#020d06';

  function drawReveal(now) {
    const elapsed = now - revealStart;
    rctx.clearRect(0, 0, rc.width, rc.height);

    let anyVisible = false;
    rctx.fillStyle = REVEAL_BG;

    for (let i = 0, n = revealCells.length; i < n; i++) {
      const cell = revealCells[i];
      const t = (elapsed - cell.delay) / FLIP_DUR;
      if (t >= 1) continue;
      anyVisible = true;

      const x = cell.c * RCELL;
      const y = cell.r * RCELL;

      if (t < 0) {
        rctx.fillRect(x, y, RCELL, RCELL);
      } else {
        const sx = Math.cos(t * Math.PI * 0.5);
        const w  = RCELL * (sx > 0 ? sx : 0);
        const cx = x + RCELL / 2;
        rctx.fillRect(cx - w / 2, y, w, RCELL);
        if (t > 0.3 && t < 0.7) {
          const flash = Math.sin((t - 0.3) / 0.4 * Math.PI) * 0.25;
          rctx.fillStyle = `rgba(0,220,52,${flash})`;
          rctx.fillRect(cx - w / 2, y, w, RCELL);
          rctx.fillStyle = REVEAL_BG;
        }
      }
    }

    if (anyVisible) {
      requestAnimationFrame(drawReveal);
    } else {
      // Was display:none — actually remove so it's not retained, and free the cell array.
      rc.remove();
      revealCells.length = 0;
      resizeGrid();
    }
  }
  requestAnimationFrame(drawReveal);

  // ── TIMESTAMP ──────────────────────────────────────────────
  // Was 50ms (20Hz). 100ms is visually indistinguishable for hundredths-of-a-second display
  // and halves the DOM writes.
  const tsEl = document.getElementById('ts');
  const swStart = Date.now();
  function tick() {
    const elapsed = Date.now() - swStart;
    const h  = String(Math.floor(elapsed / 3600000)).padStart(2, '0');
    const m  = String(Math.floor((elapsed % 3600000) / 60000)).padStart(2, '0');
    const s  = String(Math.floor((elapsed % 60000) / 1000)).padStart(2, '0');
    const ms = String(Math.floor((elapsed % 1000) / 10)).padStart(2, '0');
    tsEl.textContent = `${h}:${m}:${s}.${ms}`;
  }
  tick();
  setInterval(tick, 100);

  // ── DYNAMIC GRID ───────────────────────────────────────────
  const gc = document.getElementById('grid-canvas');
  const gctx = gc.getContext('2d');
  const CELL = 40;

  // Cached static grid lines — drawn ONCE per resize, blitted via drawImage each frame.
  // Was: rebuilding the entire grid path 60 times per second.
  const gridBg = document.createElement('canvas');
  const gbctx = gridBg.getContext('2d');

  let gridOffX = 0, gridOffY = 0;
  let excludeRect = null;
  let lastCellKey = null;

  const cellFlips   = new Map();
  const cellShimmer = new Map();

  function resizeGrid() {
    gc.width  = vw;
    gc.height = vh;
    gridBg.width  = vw;
    gridBg.height = vh;

    const ch = document.querySelector('.channels');
    if (ch) {
      const r = ch.getBoundingClientRect();
      excludeRect = r;
      gridOffX = r.left % CELL;
      gridOffY = r.top  % CELL;
    }

    // Pre-render the static grid into the offscreen canvas.
    gbctx.clearRect(0, 0, vw, vh);
    gbctx.strokeStyle = 'rgba(0,255,65,0.08)';
    gbctx.lineWidth = 1;
    gbctx.beginPath();
    const cols = Math.ceil(vw / CELL) + 1;
    const rows = Math.ceil(vh / CELL) + 1;
    for (let c = 0; c <= cols; c++) {
      const x = c * CELL + gridOffX + 0.5; // crisper 1px lines on integer pixels
      gbctx.moveTo(x, 0); gbctx.lineTo(x, vh);
    }
    for (let r = 0; r <= rows; r++) {
      const y = r * CELL + gridOffY + 0.5;
      gbctx.moveTo(0, y); gbctx.lineTo(vw, y);
    }
    gbctx.stroke();

    requestGridFrame();
  }

  function isBehindChannels(col, row) {
    if (!excludeRect) return false;
    const x = col * CELL + gridOffX;
    const y = row * CELL + gridOffY;
    return x + CELL > excludeRect.left && x < excludeRect.right &&
           y + CELL > excludeRect.top  && y < excludeRect.bottom;
  }

  function triggerFlip(col, row, strength) {
    const key = col + ',' + row;
    const existing = cellFlips.get(key);
    if (!existing || existing.phase < 0.3) {
      cellFlips.set(key, { phase: 1.0, strength, col, row });
    }
    requestGridFrame();
  }

  // Self-parking grid loop: only schedules a frame when there's actual work to do.
  // Was: rAF chain every frame regardless of whether anything changed.
  let gridFrameId = 0;
  function requestGridFrame() {
    if (gridFrameId || !pageVisible) return;
    gridFrameId = requestAnimationFrame(drawGrid);
  }

  function drawGrid() {
    gridFrameId = 0;
    gctx.clearRect(0, 0, vw, vh);
    gctx.drawImage(gridBg, 0, 0); // single blit — cached static grid

    // Shimmers
    cellShimmer.forEach((s, key) => {
      s.phase += s.dir * s.speed;
      if (s.phase >= 1) { s.phase = 1; s.dir = -1; }
      if (s.phase <= 0) { cellShimmer.delete(key); return; }
      const a = s.phase * s.strength;
      const x = s.col * CELL + gridOffX;
      const y = s.row * CELL + gridOffY;
      const grd = gctx.createRadialGradient(
        x + CELL / 2, y + CELL / 2, 0,
        x + CELL / 2, y + CELL / 2, CELL * 0.8
      );
      grd.addColorStop(0, `rgba(0,255,65,${a})`);
      grd.addColorStop(1, 'rgba(0,255,65,0)');
      gctx.fillStyle = grd;
      gctx.fillRect(x, y, CELL, CELL);
    });

    // Flips
    cellFlips.forEach((s, key) => {
      const x = s.col * CELL + gridOffX;
      const y = s.row * CELL + gridOffY;
      const scaleX = Math.abs(Math.cos(s.phase * Math.PI));
      const inverted = s.phase > 0.5;
      const cx = x + CELL / 2;
      const w2 = (CELL - 2) * scaleX * 0.5;
      const alpha = s.phase * s.strength;

      if (inverted) {
        gctx.fillStyle   = `rgba(0,255,65,${alpha * 0.9})`;
        gctx.fillRect(cx - w2, y + 1, w2 * 2, CELL - 2);
        gctx.strokeStyle = `rgba(0,255,65,${alpha})`;
        gctx.lineWidth = 1;
        gctx.strokeRect(cx - w2, y + 1, w2 * 2, CELL - 2);
      } else {
        gctx.strokeStyle = `rgba(0,255,65,${alpha * 0.8})`;
        gctx.lineWidth = 1;
        gctx.strokeRect(cx - w2, y + 1, w2 * 2, CELL - 2);
      }

      s.phase -= 0.018;
      if (s.phase <= 0) cellFlips.delete(key);
    });

    // Park if nothing's animating; the next interaction will wake us.
    if (cellShimmer.size > 0 || cellFlips.size > 0) requestGridFrame();
  }

  // Ambient shimmer — schedules itself, but spawns wake the grid loop.
  function scheduleShimmer() {
    if (reducedMotion) return;
    const cols = Math.ceil(vw / CELL);
    const rows = Math.ceil(vh / CELL);
    const col = Math.floor(Math.random() * cols);
    const row = Math.floor(Math.random() * rows);
    const key = col + ',' + row;
    if (!cellShimmer.has(key) && !isBehindChannels(col, row)) {
      cellShimmer.set(key, {
        col, row, phase: 0, dir: 1,
        strength: rand(0.04, 0.10),
        speed: rand(0.003, 0.009)
      });
      requestGridFrame();
    }
    setTimeout(scheduleShimmer, rand(200, 600));
  }
  scheduleShimmer();

  // ── CYBERPUNK GLITCH ──────────────────────────────────────
  // PERF NOTE: The original implementation applied `filter: url(#warp)` driven by
  // <feTurbulence numOctaves="3"> + <feDisplacementMap>. Turbulence is computed
  // PER PIXEL, on the CPU, on the main thread, in both Firefox and Chrome — it
  // cannot be GPU-accelerated. With a `clamp(80px, 14vw, 160px)` wordmark and a
  // 140%×140% filter region, that's ~300k+ pixels × 3 octaves recomputed every
  // time `seed`/`baseFrequency`/`scale` changed (every 25-150ms during a burst).
  // That's the source of the hitching even on an M4.
  //
  // Fix: drop the SVG filter entirely. The chromatic-slice layers do most of the
  // visible glitch work already; we add a tiny compositor-only "wobble" by
  // translating the slices off-axis. Net cost: ~zero — it's all on the GPU.
  //
  // `USE_SVG_WARP` is left as a flag so you can re-enable for an A/B test.
  const USE_SVG_WARP = false;

  const wordmark  = document.getElementById('wordmark');
  const disp      = document.getElementById('disp');
  const turb      = document.getElementById('turb');
  const sliceEls  = [
    document.getElementById('gs-cyan'),
    document.getElementById('gs-magenta'),
    document.getElementById('gs-yellow')
  ];
  // Per-slice base offset ranges (matches the original visual amplitudes).
  const sliceRanges = [
    { dxR: 18, dyR: 3 }, // cyan
    { dxR: 14, dyR: 2 }, // magenta
    { dxR: 10, dyR: 4 }  // yellow
  ];

  function sliceClip() {
    const top = rand(0, 80);
    const bot = rand(top + 5, Math.min(top + 40, 100));
    return `inset(${top}% 0 ${100 - bot}% 0)`;
  }

  function runGlitch() {
    if (reducedMotion) return;
    // Clamp step interval to >=33ms (≈30fps). Was producing intervals as low as
    // ~22ms (200/9), guaranteeing missed frames during a burst.
    const duration = rand(220, 600);
    const steps    = Math.floor(rand(4, 8));
    const stepMs   = Math.max(33, duration / steps);
    let step = 0;
    let lastStepTs = 0;
    let burstRaf = 0;

    if (USE_SVG_WARP) wordmark.style.filter = 'url(#warp)';

    function burstFrame(ts) {
      if (!lastStepTs) lastStepTs = ts;
      if (ts - lastStepTs >= stepMs) {
        lastStepTs = ts;

        if (USE_SVG_WARP) {
          disp.setAttribute('scale', rand(6, 28));
          turb.setAttribute('seed', Math.floor(rand(1, 99)));
          turb.setAttribute('baseFrequency', `${rand(0.01, 0.06)} ${rand(0.04, 0.14)}`);
        }

        // Shared wobble for this step — mimics the warp's sub-pixel jitter at
        // a fraction of the cost. Combined with each slice's own random offset
        // for the chromatic-aberration look.
        const wx = rand(-2, 2);
        const wy = rand(-1, 1);

        for (let i = 0; i < sliceEls.length; i++) {
          const el = sliceEls[i];
          const r  = sliceRanges[i];
          const dx = rand(-r.dxR, r.dxR) + wx;
          const dy = rand(-r.dyR, r.dyR) + wy;
          // translate3d → forces compositor layer, no layout/repaint per change.
          el.style.transform = `translate3d(${dx}px, ${dy}px, 0)`;
          el.style.clipPath  = sliceClip();
          el.style.opacity   = rand(0.5, 0.95);
        }

        if (++step >= steps) {
          if (USE_SVG_WARP) {
            wordmark.style.filter = '';
            disp.setAttribute('scale', 0);
          }
          for (let i = 0; i < sliceEls.length; i++) {
            const el = sliceEls[i];
            el.style.opacity   = 0;
            el.style.transform = '';
            el.style.clipPath  = '';
          }
          return; // burst over — don't schedule next frame
        }
      }
      burstRaf = requestAnimationFrame(burstFrame);
    }
    burstRaf = requestAnimationFrame(burstFrame);

    setTimeout(runGlitch, rand(2500, 6000));
  }
  setTimeout(runGlitch, 3000);

  // ── TEXT TILT ─────────────────────────────────────────────
  // Note: original file ALSO had `animateTilt` for the whole .logo-wrap that was
  // defined but never invoked. Dead code. Removed entirely.
  const wordmarkWrap = document.querySelector('.wordmark-glitch');
  const MAX_TEXT_TILT = 28;
  let tiltRX = 0, tiltRY = 0, tiltAngle = 0;
  let lastTiltTransform = '';

  function animateText() {
    if (!pageVisible) return; // restarts on visibilitychange
    const tx =  mouse.ny;
    const ty = -mouse.nx;
    const td = mouse.dist * -MAX_TEXT_TILT;

    tiltRX    += (tx - tiltRX)    * 0.08;
    tiltRY    += (ty - tiltRY)    * 0.08;
    tiltAngle += (td - tiltAngle) * 0.08;

    let next;
    if (Math.abs(tiltAngle) < 0.05) {
      next = 'none';
    } else {
      const len = Math.hypot(tiltRX, tiltRY) || 1;
      next = `perspective(700px) rotate3d(${tiltRX/len}, ${tiltRY/len}, 0, ${tiltAngle}deg)`;
    }
    // Avoid pointless style writes when the value hasn't changed.
    if (next !== lastTiltTransform) {
      wordmarkWrap.style.transform = next;
      lastTiltTransform = next;
    }
    requestAnimationFrame(animateText);
  }

  // ── VHS BANDS ─────────────────────────────────────────────
  const bandCanvas = document.getElementById('band-canvas');
  bandCanvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:3;';
  const bctx = bandCanvas.getContext('2d');

  const vhsBands = [
    { y: 0.05, h: 0.04,  opacity: 0.07, speed: 0.00018 },
    { y: 0.28, h: 0.02,  opacity: 0.05, speed: 0.00012 },
    { y: 0.55, h: 0.06,  opacity: 0.09, speed: 0.00022 },
    { y: 0.72, h: 0.015, opacity: 0.04, speed: 0.00015 },
    { y: 0.88, h: 0.03,  opacity: 0.06, speed: 0.00010 }
  ];

  function resizeBands() { bandCanvas.width = vw; bandCanvas.height = vh; }

  function drawBands() {
    if (!pageVisible) return; // restarts on visibilitychange
    bctx.clearRect(0, 0, vw, vh);
    for (let i = 0; i < vhsBands.length; i++) {
      const b = vhsBands[i];
      b.y = (b.y + b.speed) % 1.1;
      const y  = b.y * vh;
      const bh = b.h * vh;
      const grd = bctx.createLinearGradient(0, y, 0, y + bh);
      grd.addColorStop(0,   'rgba(0,255,65,0)');
      grd.addColorStop(0.3, `rgba(0,255,65,${b.opacity})`);
      grd.addColorStop(0.7, `rgba(0,255,65,${b.opacity})`);
      grd.addColorStop(1,   'rgba(0,255,65,0)');
      bctx.fillStyle = grd;
      bctx.fillRect(0, y, vw, bh);
    }
    requestAnimationFrame(drawBands);
  }

  // ── UNIFIED LISTENERS ─────────────────────────────────────
  // ONE mousemove listener instead of three.
  document.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.nx = (e.clientX - vcx) / vcx;
    mouse.ny = (e.clientY - vcy) / vcy;
    const d = Math.hypot(mouse.nx, mouse.ny);
    mouse.dist = d > 1 ? 1 : d;

    // Per-cell hover flip
    const col = Math.floor((mouse.x - gridOffX) / CELL);
    const row = Math.floor((mouse.y - gridOffY) / CELL);
    const key = col + ',' + row;
    if (key !== lastCellKey) {
      lastCellKey = key;
      if (!isBehindChannels(col, row)) triggerFlip(col, row, 0.35);
    }
  }, { passive: true });

  document.addEventListener('mouseleave', () => {
    mouse.x = -9999; mouse.y = -9999;
    mouse.nx = 0; mouse.ny = 0; mouse.dist = 0;
    lastCellKey = null;
  }, { passive: true });

  // Click ripple — same logic as before, single setTimeout chain.
  document.addEventListener('click', (e) => {
    const originCol = Math.floor((e.clientX - gridOffX) / CELL);
    const originRow = Math.floor((e.clientY - gridOffY) / CELL);
    const maxRing = 7;
    let ring = 0;
    const stepRing = () => {
      for (let dc = -ring; dc <= ring; dc++) {
        for (let dr = -ring; dr <= ring; dr++) {
          if (Math.round(Math.sqrt(dc*dc + dr*dr)) !== ring) continue;
          const col = originCol + dc;
          const row = originRow + dr;
          if (!isBehindChannels(col, row)) {
            const str = Math.max(0.08, 0.3 * (1 - ring / maxRing));
            triggerFlip(col, row, str);
          }
        }
      }
      ring++;
      if (ring <= maxRing) setTimeout(stepRing, 60);
    };
    stepRing();
  }, { passive: true });

  // ── UNIFIED RESIZE ────────────────────────────────────────
  // Single rAF-coalesced handler updates cached metrics, then notifies subsystems.
  // Was: 3 separate resize listeners doing similar work.
  let resizeRaf = 0;
  window.addEventListener('resize', () => {
    if (resizeRaf) return;
    resizeRaf = requestAnimationFrame(() => {
      resizeRaf = 0;
      vw = window.innerWidth;
      vh = window.innerHeight;
      vcx = vw / 2;
      vcy = vh / 2;
      if (rc.isConnected) { rc.width = vw; rc.height = vh; }
      resizeGrid();
      resizeBands();
    });
  }, { passive: true });

  // ── VISIBILITY GATE ───────────────────────────────────────
  // Halt heavy loops when the tab is hidden; resume on focus.
  document.addEventListener('visibilitychange', () => {
    const wasHidden = !pageVisible;
    pageVisible = !document.hidden;
    if (pageVisible && wasHidden) {
      requestGridFrame();
      if (!reducedMotion) {
        requestAnimationFrame(drawBands);
        requestAnimationFrame(animateText);
      }
    }
  });

  // ── BOOT ──────────────────────────────────────────────────
  resizeBands();
  resizeGrid();
  setTimeout(resizeGrid, 1500); // re-align after intro animations settle
  if (!reducedMotion) {
    requestAnimationFrame(drawBands);
    requestAnimationFrame(animateText);
  }

  // ── CURSOR DOT ────────────────────────────────────────────
  const dot = document.getElementById('cursor-dot');
  const isMobile =
    /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
    || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)
    || navigator.maxTouchPoints > 2;

  if (!isMobile) {
    document.body.classList.add('custom-cursor-active');
    let cursorRaf = 0;
    let cdx = -999, cdy = -999;
    document.addEventListener('mousemove', (e) => {
      cdx = e.clientX; cdy = e.clientY;
      if (cursorRaf) return;
      cursorRaf = requestAnimationFrame(() => {
        cursorRaf = 0;
        // translate3d on a will-change'd layer → compositor only.
        // Was: dot.style.left/top (`top`/`left` triggers layout each move).
        dot.style.transform = `translate3d(${cdx}px, ${cdy}px, 0)`;
      });
    }, { passive: true });
    document.documentElement.addEventListener('mouseleave', () => { dot.style.display = 'none'; });
    document.documentElement.addEventListener('mouseenter', () => { dot.style.display = ''; });
  } else {
    dot.style.display = 'none';
  }
})();
</script>

</body>
</html>
