document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>ideo.zip<\u002Ftitle>\n<style>\n  /* latin */\n@font-face {\n  font-family: 'Share Tech Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"547e6851-cf0a-491a-9298-8e6c4ad10dc9\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"996e4a15-6d07-44cd-8f27-77ac1bfffe4a\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"d44e6da7-4293-436a-af36-01561a7b5537\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"08e69cec-29ac-4ddc-b62c-79812c059381\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n  :root {\n    --green: #00ff41;\n    --green-dim: #00c032;\n    --green-glow: #00ff4180;\n    --bg: #020d06;\n    --grid: #0a1f0e;\n  }\n\n  body {\n    background: var(--bg);\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: flex-start;\n    padding-top: 20vh;\n    min-height: 100vh;\n    overflow: hidden;\n    font-family: 'Share Tech Mono', monospace;\n  }\n\n  /* Grid now canvas-drawn (proximity reveal) */\n  #grid-canvas {\n    position: fixed;\n    inset: 0;\n    pointer-events: none;\n    z-index: 1;\n  }\n\n  /* Scanline sweep */\n  .scanlines {\n    position: fixed;\n    inset: 0;\n    background: repeating-linear-gradient(\n      to bottom,\n      transparent 0px,\n      transparent 3px,\n      rgba(0,0,0,0.18) 3px,\n      rgba(0,0,0,0.18) 4px\n    );\n    pointer-events: none;\n    z-index: 2;\n    animation: scanroll 8s linear infinite;\n  }\n\n  @keyframes scanroll {\n    0%   { background-position: 0 0; }\n    100% { background-position: 0 100vh; }\n  }\n\n  /* Moving bright scanline */\n  .scanbeam {\n    position: fixed;\n    left: 0; right: 0;\n    height: 3px;\n    background: linear-gradient(to bottom,\n      transparent,\n      rgba(0,255,65,0.08) 50%,\n      transparent\n    );\n    pointer-events: none;\n    z-index: 3;\n    animation: beam 4s linear infinite;\n  }\n\n\n\n  @keyframes beam {\n    0%   { top: -10px; }\n    100% { top: 100vh; }\n  }\n\n  /* CRT vignette */\n  .vignette {\n    position: fixed;\n    inset: 0;\n    background: radial-gradient(ellipse at center,\n      transparent 50%,\n      rgba(0,0,0,0.7) 100%\n    );\n    pointer-events: none;\n    z-index: 4;\n  }\n\n  /* Main logo container */\n  .logo-wrap {\n    position: relative;\n    z-index: 10;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 0;\n    user-select: none;\n  }\n\n  /* ── TOP BAR ── */\n  .top-bar {\n    display: flex;\n    align-items: center;\n    gap: 16px;\n    margin-bottom: 10px;\n    opacity: 0;\n    animation: fadein 0.3s 0.2s forwards;\n  }\n\n  .top-bar-line {\n    height: 1px;\n    width: 80px;\n    background: var(--green-dim);\n    box-shadow: 0 0 4px var(--green);\n  }\n\n  .top-bar-label {\n    font-family: 'Share Tech Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.2em;\n    color: var(--green-dim);\n    text-shadow: 0 0 6px var(--green);\n    white-space: nowrap;\n  }\n\n  /* ── MAIN WORDMARK ── */\n  .wordmark {\n    font-family: 'VT323', monospace;\n    font-size: clamp(80px, 14vw, 160px);\n    color: oklch(80% 0.28 142);\n    letter-spacing: 0.04em;\n    line-height: 1;\n    text-shadow:\n      0 0 3px #fff,\n      0 0 8px oklch(92% 0.28 142),\n      0 0 18px oklch(80% 0.28 142 / 0.95),\n      0 0 40px oklch(72% 0.26 142 / 0.75),\n      0 0 80px oklch(65% 0.24 142 / 0.45),\n      0 0 140px oklch(60% 0.20 142 / 0.2);\n    position: relative;\n    animation: textflicker 0.01s infinite;\n    cursor: default;\n  }\n\n  /* Fragment canvas — removed */\n\n  /* Ghost/chromatic aberration layers */\n  .wordmark::before,\n  .wordmark::after {\n    content: attr(data-text);\n    position: absolute;\n    top: 0; left: 0;\n    font-size: inherit;\n    letter-spacing: inherit;\n    line-height: inherit;\n  }\n\n  .wordmark::before {\n    color: rgba(255, 0, 60, 0.25);\n    transform: translateX(-2px);\n    mix-blend-mode: screen;\n    text-shadow: none;\n    animation: ghostleft 6s ease-in-out infinite;\n  }\n\n  .wordmark::after {\n    color: rgba(0, 200, 255, 0.2);\n    transform: translateX(2px);\n    mix-blend-mode: screen;\n    text-shadow: none;\n    animation: ghostright 6s ease-in-out infinite;\n  }\n\n  @keyframes ghostleft {\n    0%, 100% { transform: translateX(-2px) translateY(0); opacity: 0.8; }\n    30% { transform: translateX(-4px) translateY(1px); opacity: 0.4; }\n    60% { transform: translateX(-1px) translateY(-1px); opacity: 1; }\n  }\n\n  @keyframes ghostright {\n    0%, 100% { transform: translateX(2px) translateY(0); opacity: 0.7; }\n    30% { transform: translateX(3px) translateY(-1px); opacity: 1; }\n    60% { transform: translateX(1px) translateY(1px); opacity: 0.4; }\n  }\n\n  @keyframes textflicker {\n    0%   { opacity: 1; }\n    92%  { opacity: 1; }\n    93%  { opacity: 0.95; }\n    94%  { opacity: 1; }\n    97%  { opacity: 1; }\n    98%  { opacity: 0.9; }\n    100% { opacity: 1; }\n  }\n\n  /* VHS glitch horizontal tear — on inner wrapper so JS tilt isn't overridden */\n  .wordmark-glitch {\n    position: relative;\n    overflow: visible;\n  }\n  .wordmark-inner {\n    position: relative;\n    animation: glitchcontainer 8s infinite;\n  }\n\n  @keyframes glitchcontainer {\n    0%, 89%  { clip-path: none; transform: none; }\n    90%      { clip-path: inset(30% 0 55% 0); transform: translateX(-4px); }\n    90.5%    { clip-path: inset(60% 0 10% 0); transform: translateX(4px); }\n    91%      { clip-path: none; transform: none; }\n    95%      { clip-path: inset(45% 0 40% 0); transform: translateX(3px) scaleY(1.02); }\n    95.5%    { clip-path: none; transform: none; }\n  }\n\n  /* ── DIVIDER ── */\n  .divider {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    margin-top: 8px;\n    opacity: 0;\n    animation: fadein 0.4s 1.2s forwards;\n  }\n\n  .divider-line {\n    height: 1px;\n    width: 120px;\n    background: linear-gradient(to right, transparent, var(--green-dim), transparent);\n    box-shadow: 0 0 4px var(--green-glow);\n  }\n\n  .divider-icon {\n    width: 14px;\n    height: 14px;\n    border: 1px solid var(--green-dim);\n    transform: rotate(45deg);\n    box-shadow: 0 0 6px var(--green);\n    animation: pulse 2s ease-in-out infinite;\n  }\n\n  @keyframes pulse {\n    0%, 100% { box-shadow: 0 0 6px var(--green), inset 0 0 4px rgba(0,255,65,0.2); }\n    50%       { box-shadow: 0 0 12px var(--green), inset 0 0 8px rgba(0,255,65,0.4); }\n  }\n\n  /* ── TAGLINE ── */\n  .tagline {\n    font-family: 'Share Tech Mono', monospace;\n    font-size: 12px;\n    letter-spacing: 0.25em;\n    color: var(--green-dim);\n    text-shadow: 0 0 8px var(--green);\n    margin-top: 12px;\n    white-space: nowrap;\n    opacity: 0;\n    animation: fadein 0.4s 1.6s forwards, blink-cursor 1s 2s step-end 4;\n  }\n\n  /* ── STATUS ROW ── */\n  .status-row {\n    display: flex;\n    gap: 24px;\n    margin-top: 20px;\n    opacity: 0;\n    animation: fadein 0.3s 2s forwards;\n  }\n\n  .status-item {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 4px;\n  }\n\n  .status-dot {\n    width: 6px;\n    height: 6px;\n    border-radius: 50%;\n    background: var(--green);\n    box-shadow: 0 0 8px var(--green);\n    animation: blink 1.4s ease-in-out infinite;\n  }\n\n  .status-dot:nth-child(1) { animation-delay: 0s; }\n  .status-dot:nth-child(2) { animation-delay: 0.5s; }\n\n  @keyframes blink {\n    0%, 100% { opacity: 1; }\n    50%       { opacity: 0.2; }\n  }\n\n  .status-label {\n    font-size: 9px;\n    letter-spacing: 0.2em;\n    color: var(--green-dim);\n    opacity: 0.7;\n  }\n\n  /* ── GRID FLIP REVEAL ── */\n  #reveal-canvas {\n    position: fixed;\n    inset: 0;\n    z-index: 200;\n    pointer-events: none;\n  }\n\n  /* Shared fade */\n  @keyframes fadein {\n    from { opacity: 0; transform: translateY(4px); }\n    to   { opacity: 1; transform: translateY(0); }\n  }\n\n  /* ── CORNER DECORATIONS ── */\n  .corner {\n    position: fixed;\n    width: 40px;\n    height: 40px;\n    z-index: 10;\n    opacity: 0.5;\n  }\n\n  .corner svg { width: 100%; height: 100%; }\n  .corner path { stroke: var(--green); stroke-width: 1.5; fill: none; }\n  .corner.tl { top: 20px; left: 20px; }\n  .corner.tr { top: 20px; right: 20px; transform: scaleX(-1); }\n  .corner.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }\n  .corner.br { bottom: 20px; right: 20px; transform: scale(-1); }\n\n  /* ── TIMESTAMP ── */\n  .timestamp {\n    position: fixed;\n    bottom: 22px;\n    right: 22px;\n    font-family: 'Share Tech Mono', monospace;\n    font-size: 11px;\n    color: var(--green-dim);\n    opacity: 0.6;\n    letter-spacing: 0.15em;\n    z-index: 10;\n  }\n\n  .rec-badge {\n    position: fixed;\n    top: 30px;\n    left: 30px;\n    display: flex;\n    align-items: center;\n    gap: 6px;\n    z-index: 10;\n    opacity: 0.7;\n  }\n\n  .rec-dot {\n    width: 8px;\n    height: 8px;\n    border-radius: 50%;\n    background: #ff2244;\n    box-shadow: 0 0 8px #ff2244;\n    animation: blink 0.9s ease-in-out infinite;\n  }\n\n  .rec-text {\n    font-family: 'Share Tech Mono', monospace;\n    font-size: 11px;\n    color: #ff2244;\n    text-shadow: 0 0 6px #ff2244;\n    letter-spacing: 0.2em;\n  }\n\n  /* Horizontal scanlines on wordmark — fixed overlay, not tied to text layer */\n  .scanline-text {\n    position: relative;\n    display: inline-block;\n  }\n  #text-scanlines {\n    position: fixed;\n    inset: 0;\n    pointer-events: none;\n    z-index: 12;\n    background: repeating-linear-gradient(\n      to bottom,\n      transparent 0px,\n      transparent 3px,\n      rgba(0,0,0,0.45) 3px,\n      rgba(0,0,0,0.45) 5px\n    );\n    animation: scanshift 2s linear infinite;\n  }\n  @keyframes scanshift {\n    from { background-position: 0 0; }\n    to   { background-position: 0 60px; }\n  }\n\n  /* ── CHANNEL BUTTONS ── */\n  .channels {\n    position: relative;\n    z-index: 20;\n    display: flex;\n    flex-direction: column;\n    gap: 10px;\n    margin-top: 52px;\n    width: min(480px, calc(100vw - 32px));\n  }\n\n  .channel-btn {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 12px 20px;\n    white-space: nowrap;\n    border: 1px solid var(--green-dim);\n    background: transparent;\n    color: var(--green-dim);\n    font-family: 'Share Tech Mono', monospace;\n    font-size: 13px;\n    letter-spacing: 0.2em;\n    cursor: pointer;\n    text-decoration: none;\n    box-shadow: 0 0 6px rgba(0,255,65,0.08), inset 0 0 12px rgba(0,255,65,0.03);\n    transition: all 0.15s ease;\n    position: relative;\n    overflow: hidden;\n  }\n\n  .channel-btn::before {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background: rgba(0,255,65,0.04);\n    opacity: 0;\n    transition: opacity 0.15s;\n  }\n\n  .channel-btn:hover {\n    color: var(--green);\n    border-color: var(--green);\n    box-shadow: 0 0 14px rgba(0,255,65,0.2), inset 0 0 16px rgba(0,255,65,0.06);\n    text-shadow: 0 0 8px var(--green);\n  }\n\n  .channel-btn:hover::before { opacity: 1; }\n\n  .channel-tag {\n    font-size: 11px;\n    opacity: 0.5;\n    letter-spacing: 0.15em;\n  }\n\n  /* Cyberpunk slice glitch layers */\n  .glitch-slice {\n    position: absolute;\n    top: 0; left: 0;\n    font-family: 'VT323', monospace;\n    font-size: clamp(80px, 14vw, 160px);\n    letter-spacing: 0.04em;\n    line-height: 1;\n    pointer-events: none;\n    opacity: 0;\n    mix-blend-mode: screen;\n    white-space: nowrap;\n  }\n  .glitch-slice.cyan  { color: #00ffff; text-shadow: 0 0 8px #00ffff; }\n  .glitch-slice.magenta { color: #ff00cc; text-shadow: 0 0 8px #ff00cc; }\n  .glitch-slice.yellow  { color: #ffff00; text-shadow: 0 0 8px #ffff00; }\n  @media (max-width: 600px) {\\n    body { padding-top: 12vh; overflow-x: hidden; }\\n    .top-bar { gap: 8px; }\\n    .top-bar-line { width: 40px; }\\n    .top-bar-label { font-size: 9px; letter-spacing: 0.12em; overflow: hidden; text-overflow: ellipsis; max-width: calc(100vw - 120px); }\\n    .wordmark { font-size: clamp(52px, 18vw, 96px); }\\n    .glitch-slice { font-size: clamp(52px, 18vw, 96px); }\\n    .divider-line { width: 60px; }\\n    .tagline { font-size: 10px; letter-spacing: 0.15em; }\\n    .status-row { gap: 16px; margin-top: 14px; }\\n    .channels { margin-top: 32px; padding: 0 16px; }\\n    .channel-btn { padding: 10px 14px; font-size: 11px; letter-spacing: 0.13em; }\\n    .corner { width: 24px; height: 24px; }\\n    .corner.tl { top: 10px; left: 10px; }\\n    .corner.tr { top: 10px; right: 10px; }\\n    .corner.bl { bottom: 10px; left: 10px; }\\n    .corner.br { bottom: 10px; right: 10px; }\\n    .rec-badge { top: 16px; left: 16px; }\\n    .timestamp { bottom: 12px; right: 12px; font-size: 9px; }\\n  }\\n  @media (max-width: 400px) {\\n    body { padding-top: 8vh; }\\n    .wordmark, .glitch-slice { font-size: clamp(40px, 20vw, 64px); }\\n    .channel-btn { font-size: 10px; padding: 9px 12px; }\\n    .top-bar-label { font-size: 8px; letter-spacing: 0.07em; }\\n  }\\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<!-- SVG filter for text warp -->\n<svg style=\"position:absolute;width:0;height:0;overflow:hidden\">\n  <defs>\n    <filter id=\"warp\" x=\"-20%\" y=\"-20%\" width=\"140%\" height=\"140%\">\n      <feTurbulence id=\"turb\" type=\"turbulence\" baseFrequency=\"0.02 0.08\" numOctaves=\"3\" seed=\"2\" result=\"noise\"><\u002FfeTurbulence>\n      <feDisplacementMap in=\"SourceGraphic\" in2=\"noise\" scale=\"0\" xChannelSelector=\"R\" yChannelSelector=\"G\" id=\"disp\"><\u002FfeDisplacementMap>\n    <\u002Ffilter>\n  <\u002Fdefs>\n<\u002Fsvg>\n\n<!-- Grid flip reveal -->\n<canvas id=\"reveal-canvas\"><\u002Fcanvas>\n\n<!-- Grid + effects -->\n<canvas id=\"grid-canvas\"><\u002Fcanvas>\n<div class=\"scanlines\"><\u002Fdiv>\n<div id=\"text-scanlines\"><\u002Fdiv>\n<div class=\"scanbeam\"><\u002Fdiv>\n<div class=\"vignette\"><\u002Fdiv>\n\n<!-- Corner brackets -->\n<div class=\"corner tl\"><svg viewBox=\"0 0 40 40\"><path d=\"M 0 20 L 0 0 L 20 0\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n<div class=\"corner tr\"><svg viewBox=\"0 0 40 40\"><path d=\"M 0 20 L 0 0 L 20 0\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n<div class=\"corner bl\"><svg viewBox=\"0 0 40 40\"><path d=\"M 0 20 L 0 0 L 20 0\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n<div class=\"corner br\"><svg viewBox=\"0 0 40 40\"><path d=\"M 0 20 L 0 0 L 20 0\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n\n<!-- REC badge -->\n<div class=\"rec-badge\">\n  <div class=\"rec-dot\"><\u002Fdiv>\n  <span class=\"rec-text\">REC<\u002Fspan>\n<\u002Fdiv>\n\n<!-- Timestamp -->\n<div class=\"timestamp\" id=\"ts\">--:--:--<\u002Fdiv>\n\n<!-- Logo -->\n<div class=\"logo-wrap\">\n  <div class=\"top-bar\">\n    <div class=\"top-bar-line\"><\u002Fdiv>\n    <span class=\"top-bar-label\">SIGNAL / ARCHIVE / CHANNEL<\u002Fspan>\n    <div class=\"top-bar-line\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"wordmark-glitch\" style=\"position:relative\">\n    <div class=\"wordmark-inner\">\n      <div class=\"wordmark\" id=\"wordmark\" data-text=\"ideo.zip\"><span class=\"scanline-text\">ideo.zip<\u002Fspan><\u002Fdiv>\n      <div class=\"glitch-slice cyan\" id=\"gs-cyan\">ideo.zip<\u002Fdiv>\n      <div class=\"glitch-slice magenta\" id=\"gs-magenta\">ideo.zip<\u002Fdiv>\n      <div class=\"glitch-slice yellow\" id=\"gs-yellow\">ideo.zip<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"divider\">\n    <div class=\"divider-line\"><\u002Fdiv>\n    <div class=\"divider-icon\"><\u002Fdiv>\n    <div class=\"divider-line\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tagline\">BE KIND. REWIND.<\u002Fdiv>\n\n  <div class=\"status-row\">\n    <div class=\"status-item\">\n      <div class=\"status-dot\"><\u002Fdiv>\n      <span class=\"status-label\">LIVE<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"status-item\">\n      <div class=\"status-dot\" style=\"animation-delay:0.3s\"><\u002Fdiv>\n      <span class=\"status-label\">SYNC<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"status-item\">\n      <div class=\"status-dot\" style=\"animation-delay:0.7s\"><\u002Fdiv>\n      <span class=\"status-label\">TAPE<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"channels\">\n  <a class=\"channel-btn\" href="\padres">\n    <span>PADRES DASHBOARD<\u002Fspan>\n    <span class=\"channel-tag\">T-01<\u002Fspan>\n  <\u002Fa>\n  <a class=\"channel-btn\" href=\"#\">\n    <span>COMING SOON<\u002Fspan>\n    <span class=\"channel-tag\">T-02<\u002Fspan>\n  <\u002Fa>\n  <a class=\"channel-btn\" href=\"#\">\n    <span>COMING SOON<\u002Fspan>\n    <span class=\"channel-tag\">T-03<\u002Fspan>\n  <\u002Fa>\n<\u002Fdiv>\n\n<script>\n  // ── GRID FLIP REVEAL ─────────────────────────────────────────\n  const rc = document.getElementById('reveal-canvas');\n  const rctx = rc.getContext('2d');\n  const RCELL = 40;\n  const DELAY_PER_DIST = 16;  // ms per unit distance from center\n  const FLIP_DUR = 110;       // ms for each cell to flip\n\n  rc.width  = window.innerWidth;\n  rc.height = window.innerHeight;\n  window.addEventListener('resize', () => { rc.width = window.innerWidth; rc.height = window.innerHeight; });\n\n  const cols = Math.ceil(rc.width  / RCELL) + 2;\n  const rows = Math.ceil(rc.height / RCELL) + 2;\n  const centerCol = rc.width  / 2 / RCELL;\n  const centerRow = rc.height / 2 / RCELL;\n\n  // Build cell list with distances\n  const revealCells = [];\n  for (let c = -1; c <= cols; c++) {\n    for (let r = -1; r <= rows; r++) {\n      const dist = Math.sqrt((c - centerCol) ** 2 + (r - centerRow) ** 2);\n      revealCells.push({ c, r, dist, delay: dist * DELAY_PER_DIST });\n    }\n  }\n  const maxDelay = Math.max(...revealCells.map(c => c.delay));\n\n  const revealStart = performance.now();\n\n  function drawReveal(now) {\n    const elapsed = now - revealStart;\n    rctx.clearRect(0, 0, rc.width, rc.height);\n\n    let anyVisible = false;\n    for (const cell of revealCells) {\n      const t = (elapsed - cell.delay) / FLIP_DUR;\n      if (t >= 1) continue; // fully revealed\n      anyVisible = true;\n\n      const x = cell.c * RCELL;\n      const y = cell.r * RCELL;\n\n      if (t < 0) {\n        // Not started yet — solid black\n        rctx.fillStyle = '#020d06';\n        rctx.fillRect(x, y, RCELL, RCELL);\n      } else {\n        // Flipping: scaleX goes 1→0 (cos curve for smooth flip feel)\n        const scaleX = Math.max(0, Math.cos(t * Math.PI * 0.5));\n        const cx = x + RCELL / 2;\n        const w  = RCELL * scaleX;\n        // Black face collapsing\n        rctx.fillStyle = '#020d06';\n        rctx.fillRect(cx - w / 2, y, w, RCELL);\n        // Brief green flash at peak flip\n        if (t > 0.3 && t < 0.7) {\n          const flash = Math.sin((t - 0.3) / 0.4 * Math.PI) * 0.25;\n          rctx.fillStyle = `rgba(0,220,52,${flash})`;\n          rctx.fillRect(cx - w / 2, y, w, RCELL);\n        }\n      }\n    }\n\n    if (anyVisible) requestAnimationFrame(drawReveal);\n    else {\n      rc.style.display = 'none'; // done, hide canvas\n      // Trigger grid realign after reveal\n      resizeGrid();\n    }\n  }\n  requestAnimationFrame(drawReveal);\n\n  // Stopwatch from 0\n  const swStart = Date.now();\n  function tick() {\n    const elapsed = Date.now() - swStart;\n    const h  = String(Math.floor(elapsed / 3600000)).padStart(2,'0');\n    const m  = String(Math.floor((elapsed % 3600000) / 60000)).padStart(2,'0');\n    const s  = String(Math.floor((elapsed % 60000) / 1000)).padStart(2,'0');\n    const ms = String(Math.floor((elapsed % 1000) / 10)).padStart(2,'0');\n    document.getElementById('ts').textContent = `${h}:${m}:${s}.${ms}`;\n  }\n  tick();\n  setInterval(tick, 50);\n\n  function rand(a, b) { return a + Math.random() * (b - a); }\n\n  // ── DYNAMIC GRID WITH CELL FLIPS ─────────────────────────────\n  const gc = document.getElementById('grid-canvas');\n  const gctx = gc.getContext('2d');\n  const CELL = 40;\n  let mouseX = -9999, mouseY = -9999;\n  let lastCellKey = null;\n  let gridOffX = 0, gridOffY = 0; // alignment offsets\n  let excludeRect = null; // bounding rect of .channels\n\n  const cellFlips = new Map();\n  const cellShimmer = new Map();\n\n  function resizeGrid() {\n    gc.width = window.innerWidth;\n    gc.height = window.innerHeight;\n    // Align grid to channels box left edge\n    const ch = document.querySelector('.channels');\n    if (ch) {\n      const r = ch.getBoundingClientRect();\n      excludeRect = r;\n      gridOffX = r.left % CELL;\n      gridOffY = r.top  % CELL;\n    }\n  }\n  resizeGrid();\n  window.addEventListener('resize', resizeGrid);\n  // Re-align after boot screen fades (layout may shift)\n  setTimeout(resizeGrid, 1500);\n\n  function isBehindChannels(col, row) {\n    if (!excludeRect) return false;\n    const x = col * CELL + gridOffX;\n    const y = row * CELL + gridOffY;\n    return x + CELL > excludeRect.left && x < excludeRect.right &&\n           y + CELL > excludeRect.top  && y < excludeRect.bottom;\n  }\n\n  document.addEventListener('mousemove', e => {\n    mouseX = e.clientX; mouseY = e.clientY;\n    const col = Math.floor((mouseX - gridOffX) / CELL);\n    const row = Math.floor((mouseY - gridOffY) / CELL);\n    const key = `${col},${row}`;\n    if (key !== lastCellKey) {\n      lastCellKey = key;\n      if (!isBehindChannels(col, row)) triggerFlip(col, row, 0.35);\n    }\n  });\n  document.addEventListener('mouseleave', () => { mouseX = -9999; mouseY = -9999; lastCellKey = null; });\n\n  // Water drop click ripple\n  document.addEventListener('click', e => {\n    const originCol = Math.floor((e.clientX - gridOffX) / CELL);\n    const originRow = Math.floor((e.clientY - gridOffY) / CELL);\n    const maxRing = 7;\n    for (let ring = 0; ring <= maxRing; ring++) {\n      const delay = ring * 60;\n      setTimeout(() => {\n        for (let dc = -ring; dc <= ring; dc++) {\n          for (let dr = -ring; dr <= ring; dr++) {\n            if (Math.round(Math.sqrt(dc*dc + dr*dr)) !== ring) continue;\n            const col = originCol + dc;\n            const row = originRow + dr;\n            if (!isBehindChannels(col, row)) {\n              const str = Math.max(0.08, 0.3 * (1 - ring / maxRing));\n              triggerFlip(col, row, str);\n            }\n          }\n        }\n      }, delay);\n    }\n  });\n\n  function triggerFlip(col, row, strength) {\n    const key = `${col},${row}`;\n    const existing = cellFlips.get(key);\n    if (!existing || existing.phase < 0.3) {\n      cellFlips.set(key, { phase: 1.0, strength, col, row });\n    }\n  }\n\n  // Ambient slow glow\n  function scheduleShimmer() {\n    const cols = Math.ceil(window.innerWidth  / CELL);\n    const rows = Math.ceil(window.innerHeight / CELL);\n    const col = Math.floor(rand(0, cols));\n    const row = Math.floor(rand(0, rows));\n    const key = `${col},${row}`;\n    if (!cellShimmer.has(key) && !isBehindChannels(col, row)) {\n      cellShimmer.set(key, { col, row, phase: 0, dir: 1, strength: rand(0.04, 0.10), speed: rand(0.003, 0.009) });\n    }\n    setTimeout(scheduleShimmer, rand(200, 600));\n  }\n  scheduleShimmer();\n\n  function drawGrid() {\n    const W = gc.width, H = gc.height;\n    gctx.clearRect(0, 0, W, H);\n\n    const cols = Math.ceil(W / CELL) + 1;\n    const rows = Math.ceil(H / CELL) + 1;\n    const BASE = 0.08;\n\n    // Draw base grid lines with alignment offset\n    gctx.strokeStyle = `rgba(0,255,65,${BASE})`;\n    gctx.lineWidth = 1;\n    gctx.beginPath();\n    for (let c = 0; c <= cols; c++) { const x = c * CELL + gridOffX; gctx.moveTo(x, 0); gctx.lineTo(x, H); }\n    for (let r = 0; r <= rows; r++) { const y = r * CELL + gridOffY; gctx.moveTo(0, y); gctx.lineTo(W, y); }\n    gctx.stroke();\n\n    // Draw shimmer fills — slow breathe\n    cellShimmer.forEach((s, key) => {\n      s.phase += s.dir * s.speed;\n      if (s.phase >= 1) { s.phase = 1; s.dir = -1; }\n      if (s.phase <= 0) { cellShimmer.delete(key); return; }\n      const a = s.phase * s.strength;\n      const x = s.col * CELL + gridOffX, y = s.row * CELL + gridOffY;\n      const grd = gctx.createRadialGradient(\n        x + CELL/2, y + CELL/2, 0,\n        x + CELL/2, y + CELL/2, CELL * 0.8\n      );\n      grd.addColorStop(0, `rgba(0,255,65,${a})`);\n      grd.addColorStop(1, `rgba(0,255,65,0)`);\n      gctx.fillStyle = grd;\n      gctx.fillRect(x, y, CELL, CELL);\n    });\n\n    // Draw flip cells\n    cellFlips.forEach((s, key) => {\n      const x = s.col * CELL + gridOffX, y = s.row * CELL + gridOffY;\n      // Flip = squeeze horizontally then expand (simulated 3D flip)\n      const scaleX = Math.abs(Math.cos(s.phase * Math.PI));\n      const inverted = s.phase > 0.5; // first half: original, second: flipped color\n      const cx = x + CELL / 2;\n      const w2 = (CELL - 2) * scaleX * 0.5;\n      const alpha = s.phase * s.strength;\n\n      gctx.save();\n      if (inverted) {\n        gctx.fillStyle = `rgba(0,255,65,${alpha * 0.9})`;\n        gctx.fillRect(cx - w2, y + 1, w2 * 2, CELL - 2);\n        // bright border\n        gctx.strokeStyle = `rgba(0,255,65,${alpha})`;\n        gctx.lineWidth = 1;\n        gctx.strokeRect(cx - w2, y + 1, w2 * 2, CELL - 2);\n      } else {\n        gctx.strokeStyle = `rgba(0,255,65,${alpha * 0.8})`;\n        gctx.lineWidth = 1;\n        gctx.strokeRect(cx - w2, y + 1, w2 * 2, CELL - 2);\n      }\n      gctx.restore();\n\n      s.phase -= 0.018;\n      if (s.phase <= 0) cellFlips.delete(key);\n    });\n\n    requestAnimationFrame(drawGrid);\n  }\n  drawGrid();\n\n  // ── CYBERPUNK GLITCH ──────────────────────────────────────────\n  const wordmark  = document.getElementById('wordmark');\n  const gsCyan    = document.getElementById('gs-cyan');\n  const gsMagenta = document.getElementById('gs-magenta');\n  const gsYellow  = document.getElementById('gs-yellow');\n  const disp      = document.getElementById('disp');\n  const turb      = document.getElementById('turb');\n\n  function runGlitch() {\n    const duration = rand(200, 600);\n    const steps    = Math.floor(rand(4, 10));\n    let   step     = 0;\n\n    // Enable SVG warp filter\n    wordmark.style.filter = 'url(#warp)';\n\n    const interval = setInterval(() => {\n      // Randomise turbulence seed + displacement scale for warping\n      const scale = rand(6, 28);\n      disp.setAttribute('scale', scale);\n      turb.setAttribute('seed', Math.floor(rand(1, 99)));\n      turb.setAttribute('baseFrequency', `${rand(0.01,0.06)} ${rand(0.04,0.14)}`);\n\n      // Slice offsets — different for each colour layer\n      const slices = [\n        { el: gsCyan,    dx: rand(-18, 18), dy: rand(-3, 3),  clip: sliceClip() },\n        { el: gsMagenta, dx: rand(-14, 14), dy: rand(-2, 2),  clip: sliceClip() },\n        { el: gsYellow,  dx: rand(-10, 10), dy: rand(-4, 4),  clip: sliceClip() },\n      ];\n      slices.forEach(({ el, dx, dy, clip }) => {\n        el.style.transform   = `translate(${dx}px, ${dy}px)`;\n        el.style.clipPath    = clip;\n        el.style.opacity     = rand(0.5, 0.95);\n      });\n\n      step++;\n      if (step >= steps) {\n        clearInterval(interval);\n        // Clean up\n        wordmark.style.filter = '';\n        disp.setAttribute('scale', 0);\n        [gsCyan, gsMagenta, gsYellow].forEach(el => {\n          el.style.opacity  = 0;\n          el.style.transform = '';\n          el.style.clipPath  = '';\n        });\n      }\n    }, duration / steps);\n\n    // Schedule next glitch\n    setTimeout(runGlitch, rand(2500, 6000));\n  }\n\n  function sliceClip() {\n    // random horizontal band\n    const top = rand(0, 80);\n    const bot = rand(top + 5, Math.min(top + 40, 100));\n    return `inset(${top}% 0 ${100 - bot}% 0)`;\n  }\n\n  setTimeout(runGlitch, 3000);\n\n  // ── MOUSE TILT ────────────────────────────────────────────────\n  const logoWrap = document.querySelector('.logo-wrap');\n  let targetRX = 0, targetRY = 0;\n  let currentRX = 0, currentRY = 0;\n  const MAX_TILT = 20;\n  let bufferedRX = 0, bufferedRY = 0;\n\n  document.addEventListener('mousemove', (e) => {\n    const cx = window.innerWidth  / 2;\n    const cy = window.innerHeight / 2;\n    const dx = (e.clientX - cx) / cx;\n    const dy = (e.clientY - cy) / cy;\n    targetRY =  dx * MAX_TILT;\n    targetRX = -dy * MAX_TILT;\n  });\n\n  document.addEventListener('mouseleave', () => { targetRX = 0; targetRY = 0; });\n\n  function animateTilt() {\n    bufferedRX += (targetRX  - bufferedRX)  * 0.06;\n    bufferedRY += (targetRY  - bufferedRY)  * 0.06;\n    currentRX  += (bufferedRX - currentRX)  * 0.10;\n    currentRY  += (bufferedRY - currentRY)  * 0.10;\n    logoWrap.style.transform =\n      `perspective(900px) rotateX(${currentRX}deg) rotateY(${currentRY}deg)`;\n    requestAnimationFrame(animateTilt);\n  }\n  // ── TEXT TILT ──────────────────────────────────────────────\n  const wordmarkWrap = document.querySelector('.wordmark-glitch');\n  let tiltRX = 0, tiltRY = 0, tiltAngle = 0;\n  let tiltTargetX = 0, tiltTargetY = 0, tiltDist = 0;\n  const MAX_TEXT_TILT = 28;\n\n  document.addEventListener('mousemove', e => {\n    const cx = window.innerWidth  / 2;\n    const cy = window.innerHeight / 2;\n    const dx = (e.clientX - cx) / (window.innerWidth  / 2);\n    const dy = (e.clientY - cy) / (window.innerHeight / 2);\n    const dist = Math.sqrt(dx*dx + dy*dy);\n    // Axis perpendicular to mouse direction: (dy, -dx) in CSS 3D space\n    tiltTargetX =  dy;\n    tiltTargetY = -dx;\n    tiltDist = Math.min(dist, 1) * -MAX_TEXT_TILT;\n  });\n\n  document.addEventListener('mouseleave', () => {\n    tiltTargetX = 0; tiltTargetY = 0; tiltDist = 0;\n  });\n\n  function animateText() {\n    tiltRX    += (tiltTargetX - tiltRX)    * 0.08;\n    tiltRY    += (tiltTargetY - tiltRY)    * 0.08;\n    tiltAngle += (tiltDist    - tiltAngle) * 0.08;\n    const len = Math.sqrt(tiltRX*tiltRX + tiltRY*tiltRY) || 1;\n    if (Math.abs(tiltAngle) < 0.05) {\n      wordmarkWrap.style.transform = 'none';\n    } else {\n      wordmarkWrap.style.transform =\n        `perspective(700px) rotate3d(${tiltRX/len}, ${tiltRY/len}, 0, ${tiltAngle}deg)`;\n    }\n    requestAnimationFrame(animateText);\n  }\n  animateText();\n\n  // ── SMOOTH VHS BANDS ─────────────────────────────────────────\n  // A few semi-transparent bands that drift slowly downward, looping\n  const vhsBands = [\n    { y: 0.05, h: 0.04, opacity: 0.07, speed: 0.00018 },\n    { y: 0.28, h: 0.02, opacity: 0.05, speed: 0.00012 },\n    { y: 0.55, h: 0.06, opacity: 0.09, speed: 0.00022 },\n    { y: 0.72, h: 0.015,opacity: 0.04, speed: 0.00015 },\n    { y: 0.88, h: 0.03, opacity: 0.06, speed: 0.00010 },\n  ];\n\n  const bandCanvas = document.createElement('canvas');\n  bandCanvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:3;';\n  document.body.appendChild(bandCanvas);\n  const bctx = bandCanvas.getContext('2d');\n\n  function resizeBands() { bandCanvas.width = window.innerWidth; bandCanvas.height = window.innerHeight; }\n  resizeBands();\n  window.addEventListener('resize', resizeBands);\n\n  function drawBands(ts) {\n    bctx.clearRect(0, 0, bandCanvas.width, bandCanvas.height);\n    const H = bandCanvas.height;\n    const W = bandCanvas.width;\n    vhsBands.forEach(b => {\n      b.y = (b.y + b.speed) % 1.1; // loop back to top\n      const y  = b.y * H;\n      const bh = b.h * H;\n      const grd = bctx.createLinearGradient(0, y, 0, y + bh);\n      grd.addColorStop(0,   `rgba(0,255,65,0)`);\n      grd.addColorStop(0.3, `rgba(0,255,65,${b.opacity})`);\n      grd.addColorStop(0.7, `rgba(0,255,65,${b.opacity})`);\n      grd.addColorStop(1,   `rgba(0,255,65,0)`);\n      bctx.fillStyle = grd;\n      bctx.fillRect(0, y, W, bh);\n    });\n    requestAnimationFrame(drawBands);\n  }\n  requestAnimationFrame(drawBands);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
